<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>愿与愁 · Wish & Sorrow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1210;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════
//  愿与愁 — 罗斯科（Rothko）色域绘画
//  两大色块呼吸膨胀，诗句在交界处若隐若现
// ══════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, time = 0;
let mouseX = -1, mouseY = -1;

function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Rothko色域参数
let splitY = 0.5; // 分割线位置（0~1）
let targetSplit = 0.5;

// 上区（愿）：暖金/深橙/绛红
const WARM = {
  colors: [[180,100,30],[210,130,40],[160,60,30],[200,120,50],[170,80,25]],
  particles: [],
};
// 下区（愁）：深蓝/靛/冷紫
const COLD = {
  colors: [[20,30,80],[15,20,70],[30,25,90],[10,15,60],[25,35,100]],
  particles: [],
};

// 萤火虫粒子（暖区，向上飘）
for (let i = 0; i < 40; i++) {
  WARM.particles.push({
    x: Math.random(), y: Math.random(),
    r: 2 + Math.random() * 3,
    vx: (Math.random() - 0.5) * 0.001,
    vy: -0.0005 - Math.random() * 0.001,
    phase: Math.random() * Math.PI * 2,
  });
}
// 雨滴粒子（冷区，向下坠）
for (let i = 0; i < 50; i++) {
  COLD.particles.push({
    x: Math.random(), y: Math.random(),
    len: 8 + Math.random() * 15,
    vy: 0.002 + Math.random() * 0.003,
    alpha: 0.15 + Math.random() * 0.25,
    phase: Math.random() * Math.PI * 2,
  });
}

// 诗句
const POEM_TOP = ['愿你走出半生', '归来仍是少年'];
const POEM_BOT = ['此情可待成追忆', '只是当时已惘然'];

function drawRothkoBlock(yStart, yEnd, colors, breath) {
  // Rothko风格：柔边巨大色块，多层叠加
  const h = yEnd - yStart;
  for (let layer = 0; layer < colors.length; layer++) {
    const c = colors[layer];
    const margin = W * (0.06 + layer * 0.02);
    const yMargin = h * (0.04 + layer * 0.02);
    const x = margin + Math.sin(time * 0.3 + layer) * 8;
    const y = yStart + yMargin + Math.cos(time * 0.25 + layer * 0.5) * 5;
    const w = W - margin * 2 + Math.sin(time * 0.2 + layer * 0.7) * 10;
    const bh = h - yMargin * 2 + breath * Math.sin(time * 0.15 + layer) * h * 0.05;

    // 超柔化边缘
    ctx.shadowBlur = 40 + layer * 10;
    ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.3)`;
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.12 - layer * 0.015})`;

    // 圆角矩形
    const cr = 8;
    ctx.beginPath();
    ctx.moveTo(x + cr, y); ctx.lineTo(x + w - cr, y);
    ctx.arcTo(x+w, y, x+w, y+cr, cr);
    ctx.lineTo(x+w, y+bh-cr);
    ctx.arcTo(x+w, y+bh, x+w-cr, y+bh, cr);
    ctx.lineTo(x+cr, y+bh);
    ctx.arcTo(x, y+bh, x, y+bh-cr, cr);
    ctx.lineTo(x, y+cr);
    ctx.arcTo(x, y, x+cr, y, cr);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function draw() {
  requestAnimationFrame(draw);
  time += 0.016;

  // 鼠标影响分割线
  if (mouseX > 0) {
    targetSplit = mouseY / H;
  } else {
    targetSplit = 0.5 + Math.sin(time * 0.2) * 0.04;
  }
  splitY += (targetSplit - splitY) * 0.02;

  // 深色底（Rothko画框感）
  ctx.fillStyle = '#0d0a08';
  ctx.fillRect(0, 0, W, H);

  const splitPx = splitY * H;

  // 暖区（上）
  drawRothkoBlock(0, splitPx, WARM.colors, 1);

  // 冷区（下）
  drawRothkoBlock(splitPx, H, COLD.colors, 1);

  // ── 交界处：柔光融合带 ──
  const bandH = H * 0.08;
  const bandGrad = ctx.createLinearGradient(0, splitPx - bandH, 0, splitPx + bandH);
  bandGrad.addColorStop(0, 'rgba(200,120,40,0.06)');
  bandGrad.addColorStop(0.5, 'rgba(120,70,80,0.1)');
  bandGrad.addColorStop(1, 'rgba(20,30,90,0.06)');
  ctx.fillStyle = bandGrad;
  ctx.fillRect(0, splitPx - bandH, W, bandH * 2);

  // ── 萤火虫（暖区）──
  for (const p of WARM.particles) {
    p.x += p.vx + Math.sin(time * 2 + p.phase) * 0.0003;
    p.y += p.vy;
    if (p.y < -0.05) { p.y = splitY - 0.02; p.x = Math.random(); }
    if (p.y > splitY) p.vy = -Math.abs(p.vy);

    const px = p.x * W, py = p.y * H;
    const pulse = 0.3 + Math.sin(time * 3 + p.phase) * 0.2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `rgba(255,200,80,${pulse})`;
    ctx.fillStyle = `rgba(255,220,120,${pulse})`;
    ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // ── 雨滴（冷区）──
  for (const p of COLD.particles) {
    p.y += p.vy;
    if (p.y > 1.05) { p.y = splitY + 0.02; p.x = Math.random(); }

    const px = p.x * W, py = p.y * H;
    ctx.strokeStyle = `rgba(80,100,200,${p.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px, py + p.len);
    ctx.stroke();
  }

  // ── 诗句（交界处若隐若现）──
  const fontSize = Math.min(W, H) * 0.04;
  ctx.font = `300 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
  ctx.textAlign = 'center';

  // 上方诗（暖色，微微上移）
  const topAlpha = 0.25 + Math.sin(time * 0.5) * 0.15;
  ctx.fillStyle = `rgba(255,220,160,${topAlpha})`;
  POEM_TOP.forEach((line, i) => {
    ctx.fillText(line, W/2, splitPx - fontSize * (2.2 - i * 1.5) + Math.sin(time * 0.3 + i) * 5);
  });

  // 下方诗（冷色，微微下移）
  const botAlpha = 0.25 + Math.cos(time * 0.5) * 0.15;
  ctx.fillStyle = `rgba(140,160,255,${botAlpha})`;
  POEM_BOT.forEach((line, i) => {
    ctx.fillText(line, W/2, splitPx + fontSize * (1.2 + i * 1.5) + Math.cos(time * 0.3 + i) * 5);
  });
}

// 事件
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseleave', () => { mouseX = -1; });
window.addEventListener('touchmove', e => {
  e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, {passive:false});
window.addEventListener('touchend', () => { mouseX = -1; });

draw();
</script>
</body>
</html>
