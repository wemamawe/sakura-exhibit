<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>愿与愁 · Wish & Sorrow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f2eb;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════════════════════
//  愿与愁 — 手写笔记本信风格
//  Phase 1: 工整手写信 + 气泡鱼
//  Phase 2: 情感涂鸦 + 泪滴鱼 + 离别
//  Phase 3: 书法艺术 + 有机形态 + 昆虫
// ══════════════════════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, S;

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  S = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

let time = 0;
let phaseSmooth = 0;
const PHASE_DUR = 450;
const TRANS = 130;
const TOTAL = (PHASE_DUR + TRANS) * 3;
let cycleFrame = 0;

// ── 信件内容 ──
const LETTER1 = [
  '亲爱的：',
  '',
  '今天又下雨了。',
  '窗外的梧桐叶被打得啪啪响，',
  '我坐在桌前，突然很想你。',
  '',
  '你说过，愿是一条鱼，',
  '可以在任何水域里自由游动。',
  '我想了很久，觉得愿更像是',
  '一颗投入湖心的石子——',
  '水花溅起的瞬间很美，',
  '但涟漪终会消散。',
  '',
  '你还好吗？',
];

const LETTER2 = [
  '我们说好不说再见的。',
  '',
  '可是每一封信，',
  '都像是一次小小的告别。',
  '你走了以后，',
  '我开始画一些奇怪的东西——',
  '圆圈，波浪，还有鱼。',
  '',
  '也许鱼不需要眼泪，',
  '因为它们一直住在水里。',
  '但我不是鱼啊。',
  '',
  '想你的时候，',
  '连笔迹都是弯的。',
];

const LETTER3 = [
  '有些念头像细胞一样分裂。',
  '',
  '一个想你的念头，',
  '变成两个，四个，八个……',
  '最后长成奇怪的形状，',
  '在稿纸上蔓延开来。',
  '',
  '我在纸上画了一只虫。',
  '它很小，但翅膀很精致。',
  '我想它大概也不知道',
  '自己为什么会飞。',
  '',
  '就像我不知道',
  '这封信该寄往哪里。',
];

// ── 笔记本横线 ──
function drawNotebookLines(marginAlpha) {
  const lineSpacing = S * 0.035;
  const marginX = W * 0.12;
  const startY = H * 0.08;

  // 蓝色横线
  ctx.strokeStyle = `rgba(160,190,220,${0.25 * marginAlpha})`;
  ctx.lineWidth = 0.6;
  for (let y = startY; y < H * 0.95; y += lineSpacing) {
    ctx.beginPath();
    ctx.moveTo(W * 0.05, y);
    ctx.lineTo(W * 0.95, y);
    ctx.stroke();
  }

  // 红色竖线（页边距）
  ctx.strokeStyle = `rgba(200,100,100,${0.3 * marginAlpha})`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(marginX, H * 0.03);
  ctx.lineTo(marginX, H * 0.97);
  ctx.stroke();
}

// ── 手写文字（带墨水抖动感）──
function drawHandwriting(lines, alpha, style) {
  if (alpha <= 0.01) return;
  const lineSpacing = S * 0.035;
  const startY = H * 0.08;
  const startX = W * 0.15;

  // 逐行逐字绘制
  const charPerFrame = 0.35; // 每帧显示0.35个字
  const phaseInCycle = cycleFrame % (PHASE_DUR + TRANS);
  const totalCharsToShow = Math.floor(phaseInCycle * charPerFrame);

  let charCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const y = startY + i * lineSpacing + lineSpacing * 0.7;

    if (!line) continue;

    const isGreeting = i === 0 && line.endsWith('：');

    for (let j = 0; j < line.length; j++) {
      charCount++;
      if (charCount > totalCharsToShow) return; // 还没显示到这里

      const charAlpha = Math.min(1, (totalCharsToShow - charCount + 1) * 0.5) * alpha;
      if (charAlpha <= 0) continue;

      // 手写抖动
      const jitterX = Math.sin(charCount * 2.7 + i * 0.5) * 1.2;
      const jitterY = Math.cos(charCount * 3.1 + j * 0.8) * 0.8;
      const x = startX + j * S * 0.032 + jitterX;

      let fontSize;
      if (style === 'neat') {
        fontSize = S * 0.026;
        ctx.font = `400 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
      } else if (style === 'casual') {
        fontSize = S * (0.024 + Math.sin(charCount) * 0.003);
        ctx.font = `400 ${fontSize}px "STXingkai","STKaiti","KaiTi",serif`;
      } else {
        fontSize = S * (0.025 + Math.sin(charCount * 0.5) * 0.004);
        ctx.font = `500 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
      }

      // 墨水浓淡变化
      const inkVar = style === 'casual'
        ? 0.55 + Math.sin(charCount * 0.3) * 0.15
        : 0.65 + Math.sin(charCount * 0.2) * 0.1;

      ctx.fillStyle = `rgba(30,50,100,${charAlpha * inkVar})`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(line[j], x, y + jitterY);
    }
  }
}

// ── 气泡中的鱼（Phase 1）──
function drawBubbleFish(cx, cy, size, alpha) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // 水滴/气泡形状
  ctx.strokeStyle = 'rgba(60,90,140,0.4)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  // 泪滴形：上圆下尖
  ctx.moveTo(cx, cy - size);
  ctx.bezierCurveTo(cx + size * 0.8, cy - size * 0.8,
                     cx + size * 0.7, cy + size * 0.2,
                     cx, cy + size * 0.9);
  ctx.bezierCurveTo(cx - size * 0.7, cy + size * 0.2,
                     cx - size * 0.8, cy - size * 0.8,
                     cx, cy - size);
  ctx.stroke();

  // 内部淡蓝水色
  ctx.fillStyle = 'rgba(180,210,240,0.08)';
  ctx.fill();

  // 小鱼
  const fx = cx, fy = cy - size * 0.1;
  const fs = size * 0.35;
  ctx.strokeStyle = 'rgba(40,70,130,0.6)';
  ctx.lineWidth = 1;
  // 鱼身
  ctx.beginPath();
  ctx.ellipse(fx, fy, fs, fs * 0.45, 0, 0, Math.PI * 2);
  ctx.stroke();
  // 鱼尾
  ctx.beginPath();
  ctx.moveTo(fx + fs * 0.85, fy);
  ctx.lineTo(fx + fs * 1.4, fy - fs * 0.4);
  ctx.lineTo(fx + fs * 1.4, fy + fs * 0.4);
  ctx.closePath();
  ctx.stroke();
  // 鱼眼
  ctx.fillStyle = 'rgba(40,70,130,0.7)';
  ctx.beginPath();
  ctx.arc(fx - fs * 0.35, fy - fs * 0.05, fs * 0.08, 0, Math.PI * 2);
  ctx.fill();
  // 鱼鳞（几条弧线）
  for (let i = 0; i < 3; i++) {
    const sx = fx - fs * 0.1 + i * fs * 0.25;
    ctx.strokeStyle = 'rgba(40,70,130,0.2)';
    ctx.beginPath();
    ctx.arc(sx, fy, fs * 0.2, -0.5, 0.5);
    ctx.stroke();
  }

  // 小气泡
  for (let i = 0; i < 3; i++) {
    const bx = fx - fs * 0.6 - i * fs * 0.25;
    const by = fy - fs * 0.2 - i * fs * 0.15;
    const br = fs * (0.04 + i * 0.02);
    ctx.strokeStyle = 'rgba(60,100,160,0.3)';
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

// ── 涂鸦+泪滴鱼（Phase 2）──
function drawDoodleFish(cx, cy, size, alpha) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // 随性圆圈涂鸦
  ctx.strokeStyle = 'rgba(40,70,140,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const dx = cx + Math.sin(i * 2.3 + time * 0.005) * size * 0.7;
    const dy = cy + Math.cos(i * 1.7 + time * 0.004) * size * 0.5;
    const dr = size * (0.15 + Math.random() * 0.15);
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 泪滴形水域
  ctx.strokeStyle = 'rgba(40,70,140,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx, cy - size * 0.7);
  ctx.bezierCurveTo(cx + size * 0.6, cy - size * 0.5,
                     cx + size * 0.5, cy + size * 0.3,
                     cx, cy + size * 0.6);
  ctx.bezierCurveTo(cx - size * 0.5, cy + size * 0.3,
                     cx - size * 0.6, cy - size * 0.5,
                     cx, cy - size * 0.7);
  ctx.stroke();
  ctx.fillStyle = 'rgba(160,200,240,0.06)';
  ctx.fill();

  // 鱼（更随性的笔触）
  const fx = cx, fy = cy;
  const fs = size * 0.25;
  ctx.strokeStyle = 'rgba(40,60,130,0.55)';
  ctx.lineWidth = 1.5;
  // 随性鱼身
  ctx.beginPath();
  ctx.moveTo(fx - fs, fy);
  ctx.bezierCurveTo(fx - fs * 0.5, fy - fs * 0.7,
                     fx + fs * 0.5, fy - fs * 0.6,
                     fx + fs, fy);
  ctx.bezierCurveTo(fx + fs * 0.5, fy + fs * 0.6,
                     fx - fs * 0.5, fy + fs * 0.7,
                     fx - fs, fy);
  ctx.stroke();
  // 尾巴
  ctx.beginPath();
  ctx.moveTo(fx + fs * 0.8, fy);
  ctx.lineTo(fx + fs * 1.5, fy - fs * 0.5);
  ctx.moveTo(fx + fs * 0.8, fy);
  ctx.lineTo(fx + fs * 1.5, fy + fs * 0.5);
  ctx.stroke();
  // 眼
  ctx.fillStyle = 'rgba(40,60,130,0.6)';
  ctx.beginPath();
  ctx.arc(fx - fs * 0.4, fy - fs * 0.1, fs * 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 波浪线涂鸦
  ctx.strokeStyle = 'rgba(40,70,140,0.2)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  for (let i = 0; i < 30; i++) {
    const wx = cx - size * 0.6 + i * size * 0.04;
    const wy = cy + size * 0.8 + Math.sin(i * 0.5 + time * 0.02) * size * 0.05;
    i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
  }
  ctx.stroke();

  ctx.restore();
}

// ── 有机形态+昆虫（Phase 3）──
function drawOrganicInsect(cx, cy, size, alpha) {
  if (alpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  // 有机细胞形态
  ctx.strokeStyle = 'rgba(30,60,130,0.35)';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 7; i++) {
    const angle = time * 0.003 + i * Math.PI * 2 / 7;
    const r = size * (0.25 + Math.sin(i * 1.3) * 0.15);
    const ox = cx + Math.cos(angle) * size * 0.35;
    const oy = cy + Math.sin(angle) * size * 0.25;
    ctx.beginPath();
    // 不规则形状
    for (let j = 0; j <= 12; j++) {
      const a = (j / 12) * Math.PI * 2;
      const rr = r * (1 + Math.sin(a * 3 + i) * 0.2);
      const px = ox + Math.cos(a) * rr;
      const py = oy + Math.sin(a) * rr;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    // 内部点
    ctx.fillStyle = 'rgba(30,60,130,0.06)';
    ctx.fill();
  }

  // 连接线（细胞间）
  ctx.strokeStyle = 'rgba(30,60,130,0.15)';
  ctx.lineWidth = 0.4;
  for (let i = 0; i < 15; i++) {
    const a1 = Math.random() * Math.PI * 2;
    const a2 = a1 + (Math.random() - 0.5) * 2;
    const r1 = size * (0.2 + Math.random() * 0.3);
    const r2 = size * (0.2 + Math.random() * 0.3);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a1) * r1, cy + Math.sin(a1) * r1 * 0.7);
    ctx.lineTo(cx + Math.cos(a2) * r2, cy + Math.sin(a2) * r2 * 0.7);
    ctx.stroke();
  }

  // 昆虫
  const ix = cx + size * 0.3;
  const iy = cy - size * 0.15;
  const is = size * 0.12;

  // 身体（三节）
  ctx.fillStyle = 'rgba(25,40,80,0.65)';
  ctx.beginPath();
  ctx.ellipse(ix, iy, is * 0.3, is * 0.2, 0, 0, Math.PI * 2); // 头
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(ix + is * 0.45, iy, is * 0.35, is * 0.25, 0, 0, Math.PI * 2); // 胸
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(ix + is * 1, iy, is * 0.45, is * 0.28, 0, 0, Math.PI * 2); // 腹
  ctx.fill();

  // 翅膀
  ctx.strokeStyle = 'rgba(40,70,140,0.4)';
  ctx.fillStyle = 'rgba(180,210,240,0.1)';
  ctx.lineWidth = 0.6;
  // 上翅
  ctx.beginPath();
  ctx.ellipse(ix + is * 0.5, iy - is * 0.3, is * 0.7, is * 0.35, -0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // 下翅
  ctx.beginPath();
  ctx.ellipse(ix + is * 0.5, iy + is * 0.3, is * 0.55, is * 0.25, 0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // 翅脉
  ctx.strokeStyle = 'rgba(40,70,140,0.2)';
  ctx.lineWidth = 0.3;
  for (let v = 0; v < 4; v++) {
    ctx.beginPath();
    ctx.moveTo(ix + is * 0.4, iy - is * 0.1);
    const va = -0.8 + v * 0.4;
    ctx.lineTo(ix + is * 0.4 + Math.cos(va) * is * 0.6,
               iy - is * 0.1 + Math.sin(va) * is * 0.3);
    ctx.stroke();
  }

  // 腿
  ctx.strokeStyle = 'rgba(25,40,80,0.5)';
  ctx.lineWidth = 0.5;
  for (let l = 0; l < 3; l++) {
    const lx = ix + is * (0.3 + l * 0.3);
    // 上腿
    ctx.beginPath();
    ctx.moveTo(lx, iy + is * 0.2);
    ctx.lineTo(lx + is * 0.15, iy + is * 0.55);
    ctx.lineTo(lx + is * 0.05, iy + is * 0.7);
    ctx.stroke();
    // 下腿
    ctx.beginPath();
    ctx.moveTo(lx, iy + is * 0.2);
    ctx.lineTo(lx - is * 0.1, iy + is * 0.5);
    ctx.stroke();
  }

  // 触角
  ctx.strokeStyle = 'rgba(25,40,80,0.5)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(ix - is * 0.15, iy);
  ctx.bezierCurveTo(ix - is * 0.4, iy - is * 0.4,
                     ix - is * 0.5, iy - is * 0.6,
                     ix - is * 0.35, iy - is * 0.7);
  ctx.moveTo(ix - is * 0.15, iy);
  ctx.bezierCurveTo(ix - is * 0.3, iy - is * 0.5,
                     ix - is * 0.2, iy - is * 0.7,
                     ix - is * 0.05, iy - is * 0.75);
  ctx.stroke();

  ctx.restore();
}

// ── 纸张纹理 ──
function drawPaperTexture() {
  ctx.globalAlpha = 0.015;
  for (let i = 0; i < 300; i++) {
    const tx = (i * 97 + time * 0.1) % W;
    const ty = (i * 157) % H;
    ctx.fillStyle = i % 3 === 0 ? '#c8c0b0' : '#d8d0c0';
    ctx.fillRect(tx, ty, 1 + Math.random() * 2, 1);
  }
  ctx.globalAlpha = 1;
}

// ── 墨水滴落动画 ──
const INKDROPS = [];
function spawnInkDrop() {
  INKDROPS.push({
    x: W * (0.2 + Math.random() * 0.6),
    y: H * (0.3 + Math.random() * 0.5),
    r: 0,
    maxR: 2 + Math.random() * 4,
    life: 1,
  });
}

// ── 主循环 ──
function draw() {
  requestAnimationFrame(draw);
  time++;
  cycleFrame = time % TOTAL;

  const seg = PHASE_DUR + TRANS;
  if (cycleFrame < PHASE_DUR) phaseSmooth = 0;
  else if (cycleFrame < seg) phaseSmooth = (cycleFrame - PHASE_DUR) / TRANS;
  else if (cycleFrame < seg + PHASE_DUR) phaseSmooth = 1;
  else if (cycleFrame < seg * 2) phaseSmooth = 1 + (cycleFrame - seg - PHASE_DUR) / TRANS;
  else if (cycleFrame < seg * 2 + PHASE_DUR) phaseSmooth = 2;
  else {
    phaseSmooth = 2 + (cycleFrame - seg * 2 - PHASE_DUR) / TRANS;
    if (phaseSmooth > 2.99) phaseSmooth = 0;
  }

  const w1 = Math.max(0, 1 - Math.abs(phaseSmooth));
  const w2 = Math.max(0, 1 - Math.abs(phaseSmooth - 1));
  const w3 = Math.max(0, 1 - Math.abs(phaseSmooth - 2));
  const wR = phaseSmooth > 2 ? phaseSmooth - 2 : 0;
  const w1e = Math.min(1, w1 + wR);

  // ── 纸张底色 ──
  ctx.fillStyle = '#f5f2eb';
  ctx.fillRect(0, 0, W, H);
  drawPaperTexture();
  drawNotebookLines(Math.max(w1e, w2, w3));

  // ── Phase 1: 工整手写 + 气泡鱼 ──
  if (w1e > 0.01) {
    drawHandwriting(LETTER1, w1e, 'neat');
    drawBubbleFish(W * 0.28, H * 0.78, S * 0.09, w1e);
  }

  // ── Phase 2: 随性涂鸦 + 泪滴鱼 ──
  if (w2 > 0.01) {
    drawHandwriting(LETTER2, w2, 'casual');
    drawDoodleFish(W * 0.7, H * 0.65, S * 0.12, w2);
  }

  // ── Phase 3: 书法 + 有机形态 + 昆虫 ──
  if (w3 > 0.01) {
    drawHandwriting(LETTER3, w3, 'artistic');
    drawOrganicInsect(W * 0.65, H * 0.55, S * 0.18, w3);
  }

  // ── 墨滴 ──
  if (Math.random() < 0.01) spawnInkDrop();
  for (let i = INKDROPS.length - 1; i >= 0; i--) {
    const d = INKDROPS[i];
    d.r = Math.min(d.maxR, d.r + 0.15);
    d.life -= 0.008;
    if (d.life <= 0) { INKDROPS.splice(i, 1); continue; }
    ctx.fillStyle = `rgba(30,50,100,${d.life * 0.15})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 阶段指示 ──
  for (let i = 0; i < 3; i++) {
    const dx = W / 2 + (i - 1) * 16;
    const isAct = Math.round(phaseSmooth) === i || (phaseSmooth > 2.5 && i === 0);
    ctx.fillStyle = isAct ? 'rgba(40,60,120,0.6)' : 'rgba(160,170,190,0.3)';
    ctx.beginPath();
    ctx.arc(dx, H * 0.96, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── 事件 ──
window.addEventListener('resize', resize);
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
window.addEventListener('click', () => {
  const seg = PHASE_DUR + TRANS;
  const cur = Math.floor(cycleFrame / seg);
  time = time - cycleFrame + ((cur + 1) % 3) * seg;
});

draw();
</script>
</body>
</html>
