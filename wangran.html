<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>惘然 · 锦瑟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2f0ea;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════
//  惘然 — 倪瓒/八大山人极简水墨留白
//  大面积留白，一角烟岚，竖排锦瑟全诗
// ══════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, time = 0;

function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const POEM = ['锦瑟无端五十弦','一弦一柱思华年','庄生晓梦迷蝴蝶','望帝春心托杜鹃',
              '沧海月明珠有泪','蓝田日暖玉生烟','此情可待成追忆','只是当时已惘然'];

// ── 烟雾粒子（淡墨，从右下角升起）──
const SMOKE = [];
function addSmoke() {
  SMOKE.push({
    x: W * (0.6 + Math.random() * 0.35),
    y: H * (0.5 + Math.random() * 0.4),
    r: 20 + Math.random() * 60,
    vx: -0.2 - Math.random() * 0.5,
    vy: -0.3 - Math.random() * 0.6,
    life: 1,
    decay: 0.002 + Math.random() * 0.003,
    ink: Math.random() * 40 + 30, // 墨色深浅
  });
}
for (let i = 0; i < 20; i++) addSmoke();

// ── 蝴蝶 ──
const BUTTERFLIES = [];
function spawnButterfly() {
  BUTTERFLIES.push({
    x: W * 0.7 + Math.random() * W * 0.2,
    y: H * 0.4 + Math.random() * H * 0.3,
    vx: -0.8 - Math.random() * 1.2,
    vy: -0.3 + (Math.random() - 0.5) * 0.8,
    size: 8 + Math.random() * 10,
    phase: Math.random() * Math.PI * 2,
    wingSpeed: 0.15 + Math.random() * 0.08,
    life: 1,
    ink: 20 + Math.random() * 40,
  });
}

// ── 珍珠光点（沧海珠泪）──
const PEARLS = [];
for (let i = 0; i < 20; i++) {
  PEARLS.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 1.5 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
  });
}

function drawButterfly(b) {
  const wingAngle = Math.sin(time * b.wingSpeed * 60 + b.phase) * 0.6;
  const sz = b.size;
  const alpha = b.life * 0.6;
  const ink = b.ink;

  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.globalAlpha = alpha;

  // 左翅
  ctx.save(); ctx.scale(1, Math.cos(wingAngle));
  ctx.fillStyle = `rgba(${ink},${ink*0.8},${ink*0.6},0.7)`;
  ctx.beginPath();
  ctx.ellipse(-sz * 0.4, 0, sz * 0.55, sz * 0.35, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 右翅
  ctx.save(); ctx.scale(1, Math.cos(wingAngle + 0.3));
  ctx.fillStyle = `rgba(${ink},${ink*0.8},${ink*0.6},0.7)`;
  ctx.beginPath();
  ctx.ellipse(sz * 0.4, 0, sz * 0.55, sz * 0.35, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 身体
  ctx.fillStyle = `rgba(${ink*0.5},${ink*0.4},${ink*0.3},0.8)`;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.06, sz * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function draw() {
  requestAnimationFrame(draw);
  time += 0.016;

  // 留白底（宣纸色）
  ctx.fillStyle = '#f2f0ea';
  ctx.fillRect(0, 0, W, H);

  // 极淡的宣纸纹理
  ctx.globalAlpha = 0.02;
  for (let i = 0; i < 200; i++) {
    const tx = (i * 97.3 + time * 0.5) % W;
    const ty = (i * 137.5) % H;
    ctx.fillStyle = i % 2 ? '#d8d4c8' : '#e8e4d8';
    ctx.fillRect(tx, ty, 2 + Math.random() * 3, 1);
  }
  ctx.globalAlpha = 1;

  // ── 烟雾 ──
  if (Math.random() < 0.08) addSmoke();
  for (let i = SMOKE.length - 1; i >= 0; i--) {
    const s = SMOKE[i];
    s.x += s.vx; s.y += s.vy;
    s.life -= s.decay;
    s.r += 0.2;
    if (s.life <= 0) { SMOKE.splice(i, 1); continue; }

    const alpha = s.life * 0.06;
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    grad.addColorStop(0, `rgba(${s.ink},${s.ink},${s.ink},${alpha})`);
    grad.addColorStop(0.6, `rgba(${s.ink+20},${s.ink+20},${s.ink+15},${alpha*0.4})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // ── 竖排诗句（从右到左，倪瓒极简风）──
  const fontSize = Math.min(W, H) * 0.033;
  const lineSpacing = fontSize * 2.6;
  const charSpacing = fontSize * 1.6;
  const startX = W * 0.42; // 偏左留出烟雾空间
  const startY = H * 0.12;

  ctx.font = `400 ${fontSize}px "STKaiti","KaiTi","Songti SC","SimSun",serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let col = 0; col < POEM.length; col++) {
    const line = POEM[col];
    const x = startX - col * lineSpacing;
    for (let row = 0; row < line.length; row++) {
      const y = startY + row * charSpacing;
      // 墨色浓淡变化（水墨感）
      const inkVar = 30 + Math.sin(col * 0.7 + row * 0.5 + time * 0.5) * 15;
      // 字的边缘微微"冒烟"
      const smokeAlpha = 0.03 + Math.sin(time * 2 + col + row * 0.3) * 0.02;
      ctx.shadowColor = `rgba(${inkVar},${inkVar},${inkVar-5},${smokeAlpha})`;
      ctx.shadowBlur = 8 + Math.sin(time + row) * 3;
      ctx.fillStyle = `rgba(${inkVar},${inkVar-5},${inkVar-10},0.85)`;
      ctx.fillText(line[row], x, y);
    }
  }
  ctx.shadowBlur = 0;

  // 落款（右下角小字）
  ctx.font = `${fontSize * 0.55}px "STKaiti","KaiTi",serif`;
  ctx.fillStyle = 'rgba(60,55,50,0.4)';
  ctx.fillText('李商隐', startX - POEM.length * lineSpacing - lineSpacing * 0.5, startY + 3 * charSpacing);

  // 印章（朱红小方块）
  const sealX = startX - POEM.length * lineSpacing - lineSpacing * 0.5;
  const sealY = startY + 4.5 * charSpacing;
  const sealSize = fontSize * 0.8;
  ctx.fillStyle = 'rgba(180,40,30,0.55)';
  ctx.fillRect(sealX - sealSize/2, sealY - sealSize/2, sealSize, sealSize);
  ctx.font = `${sealSize * 0.5}px serif`;
  ctx.fillStyle = 'rgba(240,220,200,0.8)';
  ctx.fillText('义山', sealX, sealY);

  // ── 蝴蝶 ──
  if (Math.random() < 0.005) spawnButterfly();
  for (let i = BUTTERFLIES.length - 1; i >= 0; i--) {
    const b = BUTTERFLIES[i];
    b.x += b.vx; b.y += b.vy;
    b.vy += Math.sin(time * 2 + b.phase) * 0.02;
    b.life -= 0.003;
    if (b.life <= 0 || b.x < -50) { BUTTERFLIES.splice(i, 1); continue; }
    drawButterfly(b);
  }

  // ── 珍珠光点（沧海珠泪）──
  for (const p of PEARLS) {
    const px = p.x + Math.sin(time * 0.8 + p.phase) * 8;
    const py = p.y + Math.cos(time * 0.6 + p.phase) * 6;
    const pa = 0.12 + Math.sin(time * 1.5 + p.phase) * 0.08;
    ctx.fillStyle = `rgba(180,175,165,${pa})`;
    ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI * 2); ctx.fill();
  }
}

// 事件
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

draw();
</script>
</body>
</html>
