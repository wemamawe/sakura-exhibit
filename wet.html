<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湿帘</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 520, H = 700;
canvas.width = W; canvas.height = H;

// ══════════════════════════════════════
//  背景城市灯光层（离屏）
// ══════════════════════════════════════
const bgCanvas = document.createElement('canvas');
bgCanvas.width = W; bgCanvas.height = H;
const bgCtx = bgCanvas.getContext('2d');

function drawCityBg() {
  // 夜空渐变
  const sky = bgCtx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#050810');
  sky.addColorStop(0.5, '#0a1020');
  sky.addColorStop(1, '#121830');
  bgCtx.fillStyle = sky; bgCtx.fillRect(0, 0, W, H);

  // 城市轮廓
  bgCtx.fillStyle = '#0d1525';
  const buildings = [
    [0,420,60,280],[55,380,50,320],[100,400,40,300],[135,350,70,350],
    [200,370,55,330],[250,420,45,280],[290,360,80,340],[365,390,50,310],
    [410,340,65,360],[470,410,50,290],
  ];
  buildings.forEach(([x,y,w,h]) => bgCtx.fillRect(x, y, w, h));

  // 建筑窗户灯光
  const winColors = ['rgba(255,230,150,0.7)','rgba(180,210,255,0.6)','rgba(255,200,180,0.5)'];
  for (let i = 0; i < 120; i++) {
    const bx = Math.random() * W;
    const by = 350 + Math.random() * 300;
    const ws = 3 + Math.random() * 5;
    bgCtx.fillStyle = winColors[Math.floor(Math.random() * winColors.length)];
    bgCtx.fillRect(bx, by, ws, ws * 1.4);
  }

  // 霓虹反光（地面）
  const neons = [
    { x: 80,  color: 'rgba(255,60,80,0.15)'  },
    { x: 200, color: 'rgba(60,120,255,0.12)' },
    { x: 360, color: 'rgba(255,160,30,0.10)' },
    { x: 450, color: 'rgba(80,220,180,0.08)' },
  ];
  neons.forEach(n => {
    const g = bgCtx.createRadialGradient(n.x, H-80, 0, n.x, H-80, 100);
    g.addColorStop(0, n.color); g.addColorStop(1, 'transparent');
    bgCtx.fillStyle = g; bgCtx.fillRect(0, H-180, W, 180);
  });
}
drawCityBg();

// ══════════════════════════════════════
//  水珠系统
// ══════════════════════════════════════
class Drop {
  constructor() { this.reset(true); }

  reset(init = false) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -10;
    this.r = 2 + Math.random() * 4;       // 半径
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = 0;
    this.gravity = 0.012 + Math.random() * 0.018;
    this.friction = 0.985;
    this.sliding = false;
    this.slideSpeed = 0;
    this.trail = [];                        // 滑落轨迹
    this.alpha = 0.7 + Math.random() * 0.3;
    this.mergeTimer = 0;
    this.alive = true;
    this.age = 0;
    // 雨滴撞击扩散环
    this.splashR = 0;
    this.splashAlpha = 0;
    this.splashing = false;
  }

  update(drops) {
    this.age++;

    // 撞击扩散动画
    if (this.splashing) {
      this.splashR += 1.8;
      this.splashAlpha -= 0.04;
      if (this.splashAlpha <= 0) this.splashing = false;
    }

    if (this.sliding) {
      // 滑落模式
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 22) this.trail.shift();
      this.slideSpeed += this.gravity * 1.4;
      this.slideSpeed *= this.friction;
      this.y += this.slideSpeed;
      this.x += this.vx * 0.5;
      // 出屏重置
      if (this.y > H + 20) { this.reset(); }
    } else {
      // 静止水珠：轻微震动，等待合并或积累到临界
      this.r += 0.004;   // 雨水积累，半径慢慢变大
      if (this.r > 9) {  // 超过临界，开始滑落
        this.sliding = true;
        this.slideSpeed = 0.5;
      }
      // 检测附近水珠合并
      if (this.age % 8 === 0) {
        for (let d of drops) {
          if (d === this || !d.alive || d.sliding) continue;
          const dist = Math.hypot(d.x - this.x, d.y - this.y);
          if (dist < this.r + d.r + 1) {
            // 合并：吸收小水珠
            if (d.r < this.r) {
              this.r = Math.sqrt(this.r*this.r + d.r*d.r * 0.7);
              this.r = Math.min(this.r, 10);
              d.alive = false;
            }
          }
        }
      }
    }
  }

  draw() {
    if (!this.alive) return;

    // 滑落轨迹（水痕）
    if (this.trail.length > 2) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `rgba(180,210,255,0.12)`;
      ctx.lineWidth = this.r * 0.6;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // 撞击扩散环
    if (this.splashing) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.splashR, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(180,210,255,${this.splashAlpha})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // 水珠本体（带折射感）
    const grd = ctx.createRadialGradient(
      this.x - this.r*0.3, this.y - this.r*0.3, this.r*0.05,
      this.x, this.y, this.r
    );
    grd.addColorStop(0,   `rgba(220,235,255,${this.alpha * 0.95})`);
    grd.addColorStop(0.4, `rgba(160,195,240,${this.alpha * 0.55})`);
    grd.addColorStop(0.8, `rgba(100,150,220,${this.alpha * 0.30})`);
    grd.addColorStop(1,   `rgba(60,100,180,${this.alpha * 0.10})`);

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // 高光
    ctx.beginPath();
    ctx.arc(this.x - this.r*0.28, this.y - this.r*0.28, this.r*0.22, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * 0.6})`;
    ctx.fill();
  }
}

// ══════════════════════════════════════
//  雨线（快速下落的细雨）
// ══════════════════════════════════════
const rainLines = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  len: 8 + Math.random() * 14,
  speed: 8 + Math.random() * 6,
  alpha: 0.08 + Math.random() * 0.14,
}));

function updateRain() {
  for (const r of rainLines) {
    r.y += r.speed;
    if (r.y > H + 20) { r.y = -20; r.x = Math.random() * W; }
  }
}

function drawRain() {
  ctx.save();
  for (const r of rainLines) {
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 1, r.y + r.len);
    ctx.strokeStyle = `rgba(180,210,255,${r.alpha})`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════
//  玻璃模糊效果（用离屏canvas模拟）
// ══════════════════════════════════════
// 水珠下方区域：将背景稍微采样扭曲，模拟折射
function drawDropRefraction(drop) {
  if (!drop.alive || drop.r < 2) return;
  const r = drop.r;
  // 从背景截取并翻转（折射感）
  try {
    ctx.save();
    ctx.beginPath();
    ctx.arc(drop.x, drop.y, r, 0, Math.PI*2);
    ctx.clip();
    // 翻转背景（模拟凸透镜折射）
    ctx.translate(drop.x, drop.y);
    ctx.scale(-1.1, -1.1);
    ctx.translate(-drop.x, -drop.y);
    ctx.globalAlpha = 0.7;
    ctx.drawImage(bgCanvas, 0, 0);
    ctx.restore();
  } catch(e) {}
}

// ══════════════════════════════════════
//  水珠池管理
// ══════════════════════════════════════
let drops = Array.from({length: 60}, () => new Drop());
let frame = 0;
const RAIN_INTERVAL = 4; // 每4帧新增一个雨滴落下

// ══════════════════════════════════════
//  标题文字
// ══════════════════════════════════════
function drawLabel() {
  ctx.save();
  ctx.font = '13px "Songti SC","SimSun",serif';
  ctx.fillStyle = 'rgba(180,210,255,0.35)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('湿  帘', W - 20, H - 20);
  ctx.restore();
}

// ══════════════════════════════════════
//  主循环
// ══════════════════════════════════════
function tick() {
  requestAnimationFrame(tick);
  frame++;

  // 玻璃背景（轻微模糊感 - 用半透明叠加实现）
  ctx.globalAlpha = 1;
  ctx.drawImage(bgCanvas, 0, 0);

  // 玻璃遮罩（轻微磨砂质感）
  ctx.fillStyle = 'rgba(10,15,30,0.35)';
  ctx.fillRect(0, 0, W, H);

  // 雨线
  drawRain();
  updateRain();

  // 新雨滴落下：触发撞击
  if (frame % RAIN_INTERVAL === 0 && drops.length < 120) {
    const nd = new Drop();
    nd.y = Math.random() * H * 0.7;
    nd.sliding = false;
    nd.splashing = true;
    nd.splashR = nd.r;
    nd.splashAlpha = 0.6;
    drops.push(nd);
  }

  // 清理死亡水珠
  if (frame % 60 === 0) {
    drops = drops.filter(d => d.alive);
    // 补充到最低数量
    while (drops.length < 55) drops.push(new Drop());
  }

  // 水珠折射 + 绘制
  for (const d of drops) {
    d.update(drops);
    drawDropRefraction(d);
    d.draw();
  }

  drawLabel();
}

tick();
</script>
</body>
</html>
