<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>陷阱 · Trap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:serif}
canvas{display:block;position:fixed;top:0;left:0}
#title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:10;text-align:center;opacity:0;transition:opacity 4s}
#title.show{opacity:1}
#title h1{font-size:clamp(28px,6vw,52px);color:rgba(180,30,30,0);letter-spacing:0.6em;
  font-weight:100;mix-blend-mode:screen;
  background:linear-gradient(0deg,rgba(120,0,0,0.8),rgba(255,60,60,0.6),rgba(120,0,0,0.8));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title"><h1>陷 阱</h1></div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

let W = window.innerWidth, H = window.innerHeight;
let mouseX = 0, mouseY = 0;

// ── 场景 ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.035);

const camera = new THREE.PerspectiveCamera(75, W/H, 0.1, 200);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

// ── 无限隧道：多层旋转几何环 ──
const RINGS = [];
const ringCount = 60;
const spacing = 2.5;

function createRing(z, i) {
  const sides = [4, 6, 8, 3][i % 4]; // 方/六/八/三角交替
  const radius = 3.5 + Math.sin(i * 0.3) * 1.2;
  const geo = new THREE.RingGeometry(radius - 0.04, radius, sides, 1);
  const hue = 0.0 + (i % 10) * 0.008; // 微妙的红色变化
  const color = new THREE.Color().setHSL(hue, 0.9, 0.15 + (i % 5) * 0.06);
  const mat = new THREE.MeshBasicMaterial({
    color, side: THREE.DoubleSide, transparent: true, opacity: 0.85,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.z = -z;
  mesh.rotation.z = i * 0.18;
  mesh.userData = { baseZ: -z, index: i, sides, radius };
  scene.add(mesh);
  RINGS.push(mesh);
}

for (let i = 0; i < ringCount; i++) {
  createRing(i * spacing, i);
}

// ── 中心发光点（深渊之眼）──
const eyeGeo = new THREE.SphereGeometry(0.3, 16, 16);
const eyeMat = new THREE.MeshBasicMaterial({color: 0xff1010});
const eye = new THREE.Mesh(eyeGeo, eyeMat);
eye.position.z = -ringCount * spacing;
scene.add(eye);

// 光晕
const glowGeo = new THREE.PlaneGeometry(8, 8);
const glowMat = new THREE.ShaderMaterial({
  transparent: true, side: THREE.DoubleSide, depthWrite: false,
  uniforms: { time: {value: 0} },
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    uniform float time;
    varying vec2 vUv;
    void main(){
      float d = distance(vUv, vec2(0.5));
      float pulse = 0.3 + sin(time * 2.0) * 0.15;
      float glow = smoothstep(pulse + 0.2, pulse, d);
      gl_FragColor = vec4(0.8, 0.05, 0.05, glow * 0.6);
    }
  `
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
glowMesh.position.z = -ringCount * spacing + 1;
scene.add(glowMesh);

// ── 粒子尘埃（被吸入的碎片）──
const dustCount = 300;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
const dustVel = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 2 + Math.random() * 4;
  dustPos[i*3]   = Math.cos(angle) * r;
  dustPos[i*3+1] = Math.sin(angle) * r;
  dustPos[i*3+2] = -Math.random() * ringCount * spacing;
  dustVel[i*3]   = (Math.random() - 0.5) * 0.02;
  dustVel[i*3+1] = (Math.random() - 0.5) * 0.02;
  dustVel[i*3+2] = -(0.05 + Math.random() * 0.1);
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0xff3030, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending,
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ── 裂纹线条（从中心辐射）──
const crackGroup = new THREE.Group();
scene.add(crackGroup);

function spawnCrack() {
  const pts = [new THREE.Vector3(0, 0, camera.position.z - 8)];
  let x = 0, y = 0, z = camera.position.z - 8;
  const segs = 8 + Math.floor(Math.random() * 12);
  const baseAngle = Math.random() * Math.PI * 2;
  for (let i = 0; i < segs; i++) {
    const a = baseAngle + (Math.random() - 0.5) * 1.2;
    const step = 0.3 + Math.random() * 0.5;
    x += Math.cos(a) * step;
    y += Math.sin(a) * step;
    z += (Math.random() - 0.5) * 0.3;
    pts.push(new THREE.Vector3(x, y, z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({
    color: 0xff2020, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending,
  });
  const line = new THREE.Line(geo, mat);
  line.userData = { life: 1.0 };
  crackGroup.add(line);
}

// ── 动画 ──
let time = 0;
const speed = 0.6;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // 相机持续向前推进
  camera.position.z -= speed * 0.016 * 8;

  // 鼠标微偏移
  camera.position.x += (mouseX * 0.8 - camera.position.x) * 0.03;
  camera.position.y += (-mouseY * 0.8 - camera.position.y) * 0.03;
  camera.lookAt(camera.position.x * 0.3, camera.position.y * 0.3, camera.position.z - 20);

  // 环旋转 + 回收
  const farZ = camera.position.z - ringCount * spacing;
  for (const ring of RINGS) {
    ring.rotation.z += (0.003 + ring.userData.index * 0.0005) * (ring.userData.sides % 2 === 0 ? 1 : -1);
    // 脉冲缩放
    const pulse = 1 + Math.sin(time * 2 + ring.userData.index * 0.4) * 0.08;
    ring.scale.setScalar(pulse);

    // 回收：当环被相机甩在后面时，移到最前面
    if (ring.position.z > camera.position.z + 5) {
      ring.position.z = farZ - 5;
    }
  }

  // 深渊之眼始终在最远处
  eye.position.z = camera.position.z - ringCount * spacing * 0.9;
  eye.scale.setScalar(1 + Math.sin(time * 3) * 0.3);
  glowMesh.position.z = eye.position.z + 1;
  glowMat.uniforms.time.value = time;

  // 尘埃粒子
  const pos = dustGeo.attributes.position.array;
  for (let i = 0; i < dustCount; i++) {
    pos[i*3]   += dustVel[i*3];
    pos[i*3+1] += dustVel[i*3+1];
    pos[i*3+2] += dustVel[i*3+2] * 2;
    // 向中心吸
    pos[i*3]   *= 0.998;
    pos[i*3+1] *= 0.998;
    // 回收
    if (pos[i*3+2] < camera.position.z - ringCount * spacing) {
      const a = Math.random() * Math.PI * 2;
      const r = 2 + Math.random() * 4;
      pos[i*3]   = Math.cos(a) * r;
      pos[i*3+1] = Math.sin(a) * r;
      pos[i*3+2] = camera.position.z + 2;
    }
  }
  dustGeo.attributes.position.needsUpdate = true;

  // 裂纹
  if (Math.random() < 0.015) spawnCrack();
  for (let i = crackGroup.children.length - 1; i >= 0; i--) {
    const c = crackGroup.children[i];
    c.userData.life -= 0.012;
    c.material.opacity = c.userData.life;
    if (c.userData.life <= 0) {
      c.geometry.dispose(); c.material.dispose();
      crackGroup.remove(c);
    }
  }

  renderer.render(scene, camera);
}

// 标题延迟出现
setTimeout(() => document.getElementById('title').classList.add('show'), 2000);

// ── 事件 ──
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / W - 0.5) * 2;
  mouseY = (e.clientY / H - 0.5) * 2;
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = (e.touches[0].clientX / W - 0.5) * 2;
  mouseY = (e.touches[0].clientY / H - 0.5) * 2;
}, {passive: false});
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H; camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

animate();
</script>
</body>
</html>
