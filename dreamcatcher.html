<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>捕梦 · Dreamcatcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

let W = window.innerWidth, H = window.innerHeight;
let mouseX = 0, mouseY = 0, time = 0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 800);
camera.position.set(0, 0, 12);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:false});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x020210);

// ── 星空背景（草间弥生风：大量圆点）──
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
const starColors = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  // 分布在巨大球壳中
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 50 + Math.random() * 300;
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
  starSizes[i] = 0.3 + Math.random() * 2;
  // 颜色：金/银白/淡紫 草间弥生配色
  const palette = [[1,0.9,0.5],[0.9,0.92,1],[0.7,0.5,0.9],[1,0.7,0.3]][Math.floor(Math.random()*4)];
  starColors[i*3] = palette[0]; starColors[i*3+1] = palette[1]; starColors[i*3+2] = palette[2];
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

const starMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexColors: true,
  uniforms: { time: {value:0} },
  vertexShader:`
    attribute float size;
    varying vec3 vColor;
    varying float vSize;
    uniform float time;
    void main(){
      vColor = color;
      vSize = size;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mv.z) * (0.8 + sin(time*2.0 + position.x*0.1) * 0.2);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader:`
    varying vec3 vColor;
    void main(){
      float d = distance(gl_PointCoord, vec2(0.5));
      float alpha = smoothstep(0.5, 0.1, d);
      gl_FragColor = vec4(vColor, alpha * 0.7);
    }
  `
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ── 捕梦网：3D结构 ──
const netGroup = new THREE.Group();
scene.add(netGroup);

// 外环
const ringGeo = new THREE.TorusGeometry(3, 0.04, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({color: 0xccaa66});
const ring = new THREE.Mesh(ringGeo, ringMat);
netGroup.add(ring);

// 内部编织网（螺旋线）
const webMat = new THREE.LineBasicMaterial({color: 0x887744, transparent: true, opacity: 0.6});
const spirals = 8;
for (let s = 0; s < spirals; s++) {
  const pts = [];
  const baseAngle = (s / spirals) * Math.PI * 2;
  for (let t = 0; t <= 1; t += 0.02) {
    const r = 3 * (1 - t * 0.92);
    const a = baseAngle + t * Math.PI * 3;
    pts.push(new THREE.Vector3(Math.cos(a) * r, Math.sin(a) * r, t * 0.3));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  netGroup.add(new THREE.Line(geo, webMat));
}

// 同心环
for (let i = 1; i <= 6; i++) {
  const r = 3 * (1 - i * 0.13);
  const pts = [];
  for (let a = 0; a <= Math.PI * 2; a += 0.08) {
    pts.push(new THREE.Vector3(Math.cos(a) * r, Math.sin(a) * r, i * 0.04));
  }
  pts.push(pts[0].clone());
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  netGroup.add(new THREE.Line(geo, webMat));
}

// 挂绳
const ropePts = [new THREE.Vector3(0, 3, 0), new THREE.Vector3(0, 6, 0)];
const ropeGeo = new THREE.BufferGeometry().setFromPoints(ropePts);
netGroup.add(new THREE.Line(ropeGeo, new THREE.LineBasicMaterial({color:0x886644})));

// 垂饰（4条）
for (let i = 0; i < 4; i++) {
  const angle = -Math.PI/2 + (i - 1.5) * 0.35;
  const x = Math.cos(angle) * 2.8;
  const y = Math.sin(angle) * 2.8;
  const len = 1.5 + Math.random() * 1.5;
  const pts2 = [new THREE.Vector3(x, y, 0)];
  for (let j = 1; j <= 5; j++) {
    pts2.push(new THREE.Vector3(x + Math.sin(j * 0.5) * 0.15, y - j * len/5, j * 0.05));
  }
  const geo2 = new THREE.BufferGeometry().setFromPoints(pts2);
  netGroup.add(new THREE.Line(geo2, new THREE.LineBasicMaterial({color:0x886644, transparent:true, opacity:0.5})));
  
  // 珠子
  const beadGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const beadMat = new THREE.MeshBasicMaterial({color: [0xffd700, 0xccaaff, 0xffffff][i%3]});
  const bead = new THREE.Mesh(beadGeo, beadMat);
  bead.position.set(pts2[3].x, pts2[3].y, pts2[3].z);
  netGroup.add(bead);

  // 羽毛（简化为扁椭圆）
  const featherGeo = new THREE.PlaneGeometry(0.25, 0.8, 1, 4);
  const featherMat = new THREE.MeshBasicMaterial({
    color: [0xeeddaa, 0xccbbdd, 0xddccaa][i%3],
    transparent:true, opacity:0.5, side: THREE.DoubleSide
  });
  const feather = new THREE.Mesh(featherGeo, featherMat);
  feather.position.copy(pts2[pts2.length-1]);
  feather.rotation.z = Math.random() * 0.4 - 0.2;
  netGroup.add(feather);
}

// ── 梦境粒子（从四方汇聚）──
const dreamCount = 200;
const dreamGeo = new THREE.BufferGeometry();
const dreamPos = new Float32Array(dreamCount * 3);
const dreamVel = new Float32Array(dreamCount * 3);
const dreamLife = new Float32Array(dreamCount);
const dreamColors = new Float32Array(dreamCount * 3);

function resetDream(i) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 15 + Math.random() * 25;
  dreamPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  dreamPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  dreamPos[i*3+2] = r * Math.cos(phi);
  dreamLife[i] = 1;
  const p = [[1,0.85,0.3],[0.85,0.9,1],[0.6,0.4,0.85]][Math.floor(Math.random()*3)];
  dreamColors[i*3]=p[0]; dreamColors[i*3+1]=p[1]; dreamColors[i*3+2]=p[2];
}
for (let i = 0; i < dreamCount; i++) resetDream(i);
dreamGeo.setAttribute('position', new THREE.BufferAttribute(dreamPos, 3));
dreamGeo.setAttribute('color', new THREE.BufferAttribute(dreamColors, 3));

const dreamMat = new THREE.PointsMaterial({
  size: 0.15, vertexColors: true, transparent: true, opacity: 0.8,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const dreams = new THREE.Points(dreamGeo, dreamMat);
scene.add(dreams);

// ── 文字精灵 ──
const textWords = ['捕一场旧梦', '网住月光', '放走星辰', '夜风轻语', '星河入梦'];
const textSprites = [];

function makeTextSprite(text) {
  const cvs = document.createElement('canvas');
  cvs.width = 256; cvs.height = 64;
  const c = cvs.getContext('2d');
  c.font = '28px "STKaiti","KaiTi",serif';
  c.fillStyle = 'rgba(220,200,150,0.8)';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, blending: THREE.AdditiveBlending, depthWrite:false});
  const sp = new THREE.Sprite(mat);
  sp.scale.set(4, 1, 1);
  return sp;
}

function spawnText() {
  const word = textWords[Math.floor(Math.random() * textWords.length)];
  const sp = makeTextSprite(word);
  const theta = Math.random() * Math.PI * 2;
  const r = 12 + Math.random() * 10;
  sp.position.set(Math.cos(theta)*r, (Math.random()-0.5)*6, Math.sin(theta)*r);
  sp.userData = {life: 1, vel: new THREE.Vector3(-sp.position.x, -sp.position.y, -sp.position.z).normalize().multiplyScalar(0.02)};
  scene.add(sp);
  textSprites.push(sp);
}

// ── 发光环效果（捕梦网中心）──
const glowRingGeo = new THREE.RingGeometry(2.5, 3.1, 64);
const glowRingMat = new THREE.ShaderMaterial({
  transparent:true, side:THREE.DoubleSide, depthWrite:false,
  uniforms:{time:{value:0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`
    uniform float time;
    varying vec2 vUv;
    void main(){
      float glow = sin(vUv.x * 30.0 + time * 3.0) * 0.5 + 0.5;
      gl_FragColor = vec4(0.8, 0.7, 0.3, glow * 0.25);
    }
  `
});
const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
glowRing.position.z = 0.1;
netGroup.add(glowRing);

// ── 动画 ──
function animate() {
  requestAnimationFrame(animate);
  time += 0.012;

  // 捕梦网轻摆
  const sway = Math.sin(time * 0.5) * 0.08;
  netGroup.rotation.z = sway;
  netGroup.rotation.x = Math.sin(time * 0.3) * 0.03 + mouseY * 0.1;
  netGroup.rotation.y = Math.cos(time * 0.4) * 0.03 + mouseX * 0.15;

  // 星空缓旋
  stars.rotation.y = time * 0.01;
  stars.rotation.x = time * 0.005;
  starMat.uniforms.time.value = time;

  // 发光环
  glowRingMat.uniforms.time.value = time;

  // 梦境粒子向捕梦网汇聚
  for (let i = 0; i < dreamCount; i++) {
    const dx = -dreamPos[i*3];
    const dy = -dreamPos[i*3+1];
    const dz = -dreamPos[i*3+2];
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const speed = 0.03;
    dreamPos[i*3]   += dx / dist * speed;
    dreamPos[i*3+1] += dy / dist * speed;
    dreamPos[i*3+2] += dz / dist * speed;
    
    // 到达捕梦网附近：被捕获或穿过
    if (dist < 3.5) {
      dreamLife[i] -= 0.02;
      if (dreamLife[i] <= 0) resetDream(i);
    }
  }
  dreamGeo.attributes.position.needsUpdate = true;

  // 文字粒子
  if (Math.random() < 0.008) spawnText();
  for (let i = textSprites.length - 1; i >= 0; i--) {
    const sp = textSprites[i];
    sp.position.add(sp.userData.vel);
    sp.userData.life -= 0.003;
    sp.material.opacity = sp.userData.life * 0.6;
    if (sp.userData.life <= 0) {
      scene.remove(sp); sp.material.map.dispose(); sp.material.dispose();
      textSprites.splice(i, 1);
    }
  }

  // 相机微动
  camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
  camera.position.y += (mouseY * 1.5 - camera.position.y) * 0.02;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

// ── 事件 ──
window.addEventListener('mousemove', e => {
  mouseX = (e.clientX / W - 0.5) * 2;
  mouseY = (e.clientY / H - 0.5) * 2;
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = (e.touches[0].clientX / W - 0.5) * 2;
  mouseY = (e.touches[0].clientY / H - 0.5) * 2;
}, {passive:false});
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W/H; camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

animate();
</script>
</body>
</html>
