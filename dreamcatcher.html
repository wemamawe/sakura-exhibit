<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>捕梦 · Dreamcatcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════════════════
//  捕梦 — 从空到满的渐变
//  Phase 1: 方格纸 + 蓝色椭圆气球 + 细线 (极简)
//  Phase 2: 线框3D地形 + 小花萌芽 + 绿点 (理性诗意)
//  Phase 3: 花朵密覆 + 花瓣飘散 (盛放)
//  灵感：费尔南多·佩索阿
// ══════════════════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, S; // S = min(W,H) 基准尺寸

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  S = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

// ── 全局状态 ──
let time = 0;
let phase = 0;        // 0→1→2 三阶段
let phaseSmooth = 0;  // 平滑插值
const PHASE_DURATION = 420; // 每阶段帧数 (~7秒)
const TRANSITION = 120;     // 过渡帧数 (~2秒)
const TOTAL_CYCLE = PHASE_DURATION * 3 + TRANSITION * 3;
let cycleFrame = 0;

// 诗句
const POEM_LINES = [
  '我的心略大于整个宇宙',
  '',
  '我将宇宙拿起来',
  '放在网兜里',
  '像一朵花',
  '慢慢开放',
  '',
  '— 费尔南多·佩索阿'
];

// ── 花朵数据 ──
const FLOWERS = [];
const PETALS = [];  // 飘散花瓣
const LEAVES = [];  // 绿叶
const GREEN_DOTS = []; // 绿点(phase2)

// 在网兜上预设花朵位置
function initFlowers() {
  FLOWERS.length = 0;
  for (let i = 0; i < 35; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.85;
    FLOWERS.push({
      ox: Math.cos(angle) * r,
      oy: Math.sin(angle) * r - 0.1,
      size: 0.02 + Math.random() * 0.035,
      type: Math.floor(Math.random() * 3), // 0=粉, 1=黄, 2=白
      phase: Math.random() * Math.PI * 2,
      bloomDelay: Math.random(), // 0~1 在phase3中的开放延迟
    });
  }
  // 绿叶
  LEAVES.length = 0;
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.9;
    LEAVES.push({
      ox: Math.cos(angle) * r,
      oy: Math.sin(angle) * r - 0.1,
      size: 0.012 + Math.random() * 0.018,
      rot: Math.random() * Math.PI * 2,
      phase: Math.random() * Math.PI * 2,
    });
  }
  // 绿点
  GREEN_DOTS.length = 0;
  for (let i = 0; i < 40; i++) {
    GREEN_DOTS.push({
      ox: (Math.random() - 0.5) * 1.6,
      oy: (Math.random() - 0.5) * 1.2 - 0.1,
      size: 0.003 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initFlowers();

// ── 方格纸背景 ──
function drawGrid() {
  const gridSize = S * 0.03;
  ctx.strokeStyle = 'rgba(200,210,220,0.25)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let x = 0; x < W; x += gridSize) {
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();
}

// ── 椭圆气球/网兜轮廓 ──
function drawBalloonOutline(cx, cy, rx, ry, alpha, color) {
  ctx.strokeStyle = color || `rgba(140,180,220,${alpha})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
}

// ── 细线悬挂 ──
function drawString(cx, cy, ry, alpha) {
  const startY = cy + ry;
  const endY = H * 0.92;
  ctx.strokeStyle = `rgba(60,70,80,${alpha * 0.5})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, startY);
  // 微弧线
  ctx.bezierCurveTo(cx + S * 0.005, startY + (endY - startY) * 0.3,
                     cx - S * 0.003, startY + (endY - startY) * 0.7,
                     cx, endY);
  ctx.stroke();
}

// ── 线框3D地形网格 ──
function drawWireframe(cx, cy, rx, ry, t, alpha) {
  ctx.strokeStyle = `rgba(160,180,210,${alpha * 0.4})`;
  ctx.lineWidth = 0.6;

  const cols = 16, rows = 12;
  // 水平线（带3D起伏）
  for (let r = 0; r < rows; r++) {
    const v = r / (rows - 1) * 2 - 1; // -1~1
    ctx.beginPath();
    for (let c = 0; c <= cols; c++) {
      const u = c / cols * 2 - 1; // -1~1
      // 椭圆内判定
      const eu = u / 1;
      const ev = v / 1;
      if (eu * eu + ev * ev > 1) continue;

      // 3D高度（波纹）
      const wave = Math.sin(u * 3 + t * 0.02) * Math.cos(v * 2.5 + t * 0.015) * 0.12;
      const x = cx + u * rx;
      const y = cy + v * ry - wave * ry;

      if (c === 0 || eu * eu + ev * ev > 0.95) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // 垂直线
  for (let c = 0; c <= cols; c++) {
    const u = c / cols * 2 - 1;
    ctx.beginPath();
    for (let r = 0; r < rows; r++) {
      const v = r / (rows - 1) * 2 - 1;
      const eu = u / 1;
      const ev = v / 1;
      if (eu * eu + ev * ev > 1) continue;

      const wave = Math.sin(u * 3 + t * 0.02) * Math.cos(v * 2.5 + t * 0.015) * 0.12;
      const x = cx + u * rx;
      const y = cy + v * ry - wave * ry;

      if (r === 0 || eu * eu + ev * ev > 0.95) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ── 网兜网格（phase3可见）──
function drawNetMesh(cx, cy, rx, ry, alpha) {
  ctx.strokeStyle = `rgba(80,100,80,${alpha * 0.2})`;
  ctx.lineWidth = 0.4;
  const segs = 12;
  for (let i = 0; i < segs; i++) {
    const u = i / segs * 2 - 1;
    ctx.beginPath();
    for (let j = 0; j <= 20; j++) {
      const v = j / 20 * 2 - 1;
      if (u*u + v*v > 1) continue;
      const x = cx + u * rx;
      const y = cy + v * ry;
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  for (let j = 0; j < segs; j++) {
    const v = j / segs * 2 - 1;
    ctx.beginPath();
    for (let i = 0; i <= 20; i++) {
      const u = i / 20 * 2 - 1;
      if (u*u + v*v > 1) continue;
      const x = cx + u * rx;
      const y = cy + v * ry;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ── 小花 ──
function drawFlower(x, y, size, type, bloom) {
  if (bloom <= 0) return;
  const sz = size * S * bloom;

  ctx.save();
  ctx.translate(x, y);

  const petalCount = type === 1 ? 8 : 6;
  for (let i = 0; i < petalCount; i++) {
    const a = (i / petalCount) * Math.PI * 2;
    const px = Math.cos(a) * sz * 0.6;
    const py = Math.sin(a) * sz * 0.6;

    ctx.beginPath();
    ctx.ellipse(px, py, sz * 0.45, sz * 0.28, a, 0, Math.PI * 2);

    if (type === 0) ctx.fillStyle = `rgba(240,170,180,${0.8 * bloom})`; // 粉
    else if (type === 1) ctx.fillStyle = `rgba(240,220,90,${0.85 * bloom})`; // 黄
    else ctx.fillStyle = `rgba(245,240,235,${0.8 * bloom})`; // 白
    ctx.fill();
  }

  // 花心
  ctx.beginPath();
  ctx.arc(0, 0, sz * 0.2, 0, Math.PI * 2);
  if (type === 0) ctx.fillStyle = `rgba(220,180,60,${bloom})`;
  else if (type === 1) ctx.fillStyle = `rgba(180,80,50,${bloom})`;
  else ctx.fillStyle = `rgba(220,200,100,${bloom})`;
  ctx.fill();

  ctx.restore();
}

// ── 绿叶 ──
function drawLeaf(x, y, size, rot, alpha) {
  if (alpha <= 0) return;
  const sz = size * S;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = `rgba(80,170,80,${0.7 * alpha})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 1.5, sz * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  // 叶脉
  ctx.strokeStyle = `rgba(60,130,60,${0.4 * alpha})`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-sz * 1.3, 0); ctx.lineTo(sz * 1.3, 0);
  ctx.stroke();
  ctx.restore();
}

// ── 飘散花瓣 ──
function spawnPetal(cx, cy, rx, ry) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.7;
  PETALS.push({
    x: cx + Math.cos(angle) * r * rx,
    y: cy + Math.sin(angle) * r * ry,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -0.5 - Math.random() * 1.5,
    rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.05,
    size: 3 + Math.random() * 5,
    life: 1,
    type: Math.floor(Math.random() * 3),
  });
}

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.life * 0.7;
  const colors = ['rgba(240,170,180,0.8)', 'rgba(240,220,90,0.8)', 'rgba(245,240,235,0.8)'];
  ctx.fillStyle = colors[p.type];
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── 诗句排版 ──
function drawPoem(alpha) {
  if (alpha <= 0) return;
  const fontSize = S * 0.028;
  ctx.font = `400 ${fontSize}px "STKaiti","KaiTi","Songti SC","PingFang SC",serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const startY = H * 0.06;
  const lineH = fontSize * 1.8;

  for (let i = 0; i < POEM_LINES.length; i++) {
    const line = POEM_LINES[i];
    if (!line) continue;

    const isAuthor = line.startsWith('—');
    const y = startY + i * lineH;
    const delay = i * 0.08;

    // 逐行淡入
    const lineAlpha = Math.max(0, Math.min(1, (alpha - delay) * 3));
    if (lineAlpha <= 0) continue;

    if (isAuthor) {
      ctx.font = `300 ${fontSize * 0.75}px "STKaiti","KaiTi","Songti SC",serif`;
      ctx.fillStyle = `rgba(120,130,140,${lineAlpha * 0.5})`;
    } else {
      ctx.font = `400 ${fontSize}px "STKaiti","KaiTi","Songti SC","PingFang SC",serif`;
      ctx.fillStyle = `rgba(40,45,50,${lineAlpha * 0.75})`;
    }
    ctx.fillText(line, W * 0.5, y);
  }
}

// ── 小黄花（phase2单朵标志花）──
function drawIconFlower(x, y, size, bloom) {
  if (bloom <= 0) return;
  ctx.save();
  ctx.translate(x, y);
  const sz = size * bloom;
  // 5片黄色花瓣
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    ctx.fillStyle = `rgba(240,210,60,${0.85 * bloom})`;
    ctx.beginPath();
    ctx.ellipse(Math.cos(a) * sz * 0.5, Math.sin(a) * sz * 0.5,
                sz * 0.35, sz * 0.2, a, 0, Math.PI * 2);
    ctx.fill();
  }
  // 红心
  ctx.fillStyle = `rgba(200,70,50,${bloom})`;
  ctx.beginPath();
  ctx.arc(0, 0, sz * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── 主循环 ──
function draw() {
  requestAnimationFrame(draw);
  time++;
  cycleFrame = time % TOTAL_CYCLE;

  // 计算当前阶段和过渡
  const seg = PHASE_DURATION + TRANSITION;
  if (cycleFrame < PHASE_DURATION) {
    phase = 0; phaseSmooth = 0;
  } else if (cycleFrame < seg) {
    phase = 0;
    phaseSmooth = (cycleFrame - PHASE_DURATION) / TRANSITION; // 0→1过渡
  } else if (cycleFrame < seg + PHASE_DURATION) {
    phase = 1; phaseSmooth = 1;
  } else if (cycleFrame < seg * 2) {
    phase = 1;
    phaseSmooth = 1 + (cycleFrame - seg - PHASE_DURATION) / TRANSITION; // 1→2
  } else if (cycleFrame < seg * 2 + PHASE_DURATION) {
    phase = 2; phaseSmooth = 2;
  } else {
    phase = 2;
    phaseSmooth = 2 + (cycleFrame - seg * 2 - PHASE_DURATION) / TRANSITION; // 2→0回归
    if (phaseSmooth > 2.99) phaseSmooth = 0;
  }

  // 三阶段权重
  const w1 = Math.max(0, 1 - Math.abs(phaseSmooth));         // phase1: 0附近=1
  const w2 = Math.max(0, 1 - Math.abs(phaseSmooth - 1));     // phase2: 1附近=1
  const w3 = Math.max(0, 1 - Math.abs(phaseSmooth - 2));     // phase3: 2附近=1
  // 回归过渡（2→0）
  const wReturn = phaseSmooth > 2 ? (phaseSmooth - 2) : 0;
  const w1eff = Math.min(1, w1 + wReturn);

  // ── 清屏 ──
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // ── 方格纸 ──
  drawGrid();

  // ── 中心椭圆参数 ──
  const cx = W * 0.5;
  const cy = H * 0.48;
  const rx = S * 0.2;
  const ry = S * 0.28;

  // ── Phase 1: 蓝色椭圆气球 ──
  if (w1eff > 0.01) {
    // 蓝色填充
    const grad = ctx.createRadialGradient(cx, cy - ry * 0.2, 0, cx, cy, ry);
    grad.addColorStop(0, `rgba(190,215,240,${w1eff * 0.15})`);
    grad.addColorStop(0.7, `rgba(160,195,230,${w1eff * 0.08})`);
    grad.addColorStop(1, `rgba(140,180,220,${w1eff * 0.02})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();

    drawBalloonOutline(cx, cy, rx, ry, w1eff * 0.6, `rgba(140,180,220,${w1eff * 0.6})`);
    drawString(cx, cy, ry, w1eff);
  }

  // ── Phase 2: 线框3D地形 ──
  if (w2 > 0.01) {
    drawWireframe(cx, cy, rx, ry, time, w2);

    // 蓝色椭圆轮廓（放大镜感）
    drawBalloonOutline(cx, cy, rx * 1.05, ry * 1.05, w2 * 0.4,
                       `rgba(100,150,210,${w2 * 0.4})`);
    drawString(cx, cy, ry * 1.05, w2);

    // 散落绿点
    for (const d of GREEN_DOTS) {
      const dotAlpha = w2 * 0.5 * (0.5 + Math.sin(time * 0.03 + d.phase) * 0.5);
      if (dotAlpha < 0.05) continue;
      const dx = cx + d.ox * rx;
      const dy = cy + d.oy * ry;
      ctx.fillStyle = `rgba(80,170,80,${dotAlpha})`;
      ctx.beginPath();
      ctx.arc(dx, dy, d.size * S, 0, Math.PI * 2);
      ctx.fill();
    }

    // 小黄花（标志性单朵）
    const iconBloom = Math.max(0, w2 * 1.5 - 0.3);
    drawIconFlower(cx + rx * 0.15, cy - ry * 0.1, S * 0.015, Math.min(1, iconBloom));

    // 小茎
    if (iconBloom > 0) {
      ctx.strokeStyle = `rgba(60,120,60,${Math.min(1, iconBloom) * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + rx * 0.15, cy - ry * 0.1 + S * 0.015);
      ctx.lineTo(cx + rx * 0.15, cy + ry * 0.05);
      ctx.stroke();
    }
  }

  // ── Phase 3: 花覆盖的网兜 ──
  if (w3 > 0.01) {
    // 淡网兜网格
    drawNetMesh(cx, cy, rx, ry, w3);
    drawString(cx, cy, ry, w3);

    // 绿叶
    for (const lf of LEAVES) {
      const leafAlpha = w3 * Math.max(0, (phaseSmooth - 1.5) * 2);
      const lx = cx + lf.ox * rx;
      const ly = cy + lf.oy * ry;
      drawLeaf(lx, ly, lf.size, lf.rot + Math.sin(time * 0.02 + lf.phase) * 0.1, leafAlpha);
    }

    // 花朵逐朵绽放
    for (const f of FLOWERS) {
      const bloomProgress = Math.max(0, Math.min(1, (w3 - f.bloomDelay * 0.6) * 2.5));
      const fx = cx + f.ox * rx;
      const fy = cy + f.oy * ry;
      drawFlower(fx, fy, f.size, f.type, bloomProgress);
    }

    // 花瓣飘散
    if (w3 > 0.5 && Math.random() < 0.08) {
      spawnPetal(cx, cy, rx, ry);
    }
  }

  // 飘散花瓣（独立于phase，一旦生成就自由飘动）
  for (let i = PETALS.length - 1; i >= 0; i--) {
    const p = PETALS[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02; // 重力
    p.vx += (Math.random() - 0.5) * 0.1; // 随风
    p.rot += p.vr;
    p.life -= 0.005;
    if (p.life <= 0 || p.y > H + 20) {
      PETALS.splice(i, 1); continue;
    }
    drawPetal(p);
  }

  // ── 诗句（始终可见，但alpha随阶段微变）──
  const poemAlpha = 0.6 + w3 * 0.4; // phase3时更清晰
  drawPoem(poemAlpha);

  // ── 阶段指示点（底部三个小圆）──
  const dotR = 3;
  const dotY = H * 0.96;
  const dotGap = 16;
  for (let i = 0; i < 3; i++) {
    const dx = cx + (i - 1) * dotGap;
    const isActive = Math.round(phaseSmooth) === i || (phaseSmooth > 2.5 && i === 0);
    ctx.fillStyle = isActive ? 'rgba(60,70,80,0.6)' : 'rgba(180,190,200,0.4)';
    ctx.beginPath();
    ctx.arc(dx, dotY, dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 事件
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
// 点击可跳转阶段
window.addEventListener('click', () => {
  // 快进到下一阶段
  const seg = PHASE_DURATION + TRANSITION;
  const currentPhase = Math.floor(cycleFrame / seg);
  const nextPhase = (currentPhase + 1) % 3;
  // 直接设置time让cycleFrame跳转
  const targetFrame = nextPhase * seg;
  time = time - cycleFrame + targetFrame;
});

draw();
</script>
</body>
</html>
