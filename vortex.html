<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漩涡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06080f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<canvas id="vortex" width="520" height="700"></canvas>
<script>
(function () {
  const canvas = document.getElementById('vortex');
  const ctx = canvas.getContext('2d');
  const W = 520, H = 700;
  const CX = W / 2, CY = H / 2;
  const MAX_R = 210;
  const NUM_PARTICLES = 400;

  // ── Character cycle state ─────────────────────────────────────────────────
  const CHARS = ['归', '散', '念', '逝', '忘', '还'];
  let charIndex = 0;
  let frame = 0;
  const CHAR_PERIOD = 120; // frames per character

  // 0..59  = fade-in phase
  // 60..89 = hold phase
  // 90..119= fade-out / enlarge phase
  function getCharState(f) {
    const t = f % CHAR_PERIOD;
    if (t < 50) {
      // fade in
      return { alpha: t / 50, scale: 1.0, active: true };
    } else if (t < 80) {
      // hold
      return { alpha: 1.0, scale: 1.0, active: true };
    } else {
      // fade out + expand
      const p = (t - 80) / 40; // 0→1
      return { alpha: 1.0 - p, scale: 1.0 + p * 0.08, active: true };
    }
  }

  // ── Particle factory ──────────────────────────────────────────────────────
  function createParticle(forceOuter) {
    const angle = Math.random() * Math.PI * 2;
    const radius = forceOuter
      ? MAX_R * (0.6 + Math.random() * 0.4)
      : Math.random() * MAX_R;
    const speed = 0.012 + Math.random() * 0.025;   // angular speed
    const shrink = 0.18 + Math.random() * 0.22;    // radius shrink per frame
    const size = 1.2;
    const alpha = 0.3 + Math.random() * 0.7;
    return { angle, radius, speed, shrink, size, alpha, x: 0, y: 0 };
  }

  const particles = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(createParticle(false));
  }

  // ── Color interpolation ───────────────────────────────────────────────────
  function particleColor(radius, alpha) {
    const r = Math.max(0, Math.min(1, radius / MAX_R)); // 0=center, 1=outer
    let red, green, blue;
    if (r > 0.5) {
      // outer: blue-purple rgba(120,100,220)
      const t = (r - 0.5) / 0.5;
      red   = Math.round(160 - t * 40);  // 160→120
      green = Math.round(180 - t * 80);  // 180→100
      blue  = 220;
    } else {
      // inner: blue-white rgba(220,230,255)
      const t = r / 0.5;
      red   = Math.round(220 - t * 60);  // 220→160
      green = Math.round(230 - t * 50);  // 230→180
      blue  = 255;
    }
    return `rgba(${red},${green},${blue},${alpha.toFixed(3)})`;
  }

  // ── Particle size by radius ───────────────────────────────────────────────
  function particleSize(radius) {
    const r = Math.max(0, Math.min(1, radius / MAX_R));
    return 1.2 + (1 - r) * 2.5;
  }

  // ── Draw loop ─────────────────────────────────────────────────────────────
  function draw() {
    // 1. Trailing overlay
    ctx.fillStyle = 'rgba(6,8,15,0.18)';
    ctx.fillRect(0, 0, W, H);

    // 2. Central radial glow
    const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, 180);
    grd.addColorStop(0, 'rgba(80,60,200,0.12)');
    grd.addColorStop(1, 'rgba(80,60,200,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // 3. Update & draw particles
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.angle += p.speed;
      p.radius -= p.shrink;

      if (p.radius < 5) {
        // reset to outer ring
        p.angle  = Math.random() * Math.PI * 2;
        p.radius = MAX_R * (0.65 + Math.random() * 0.35);
        p.speed  = 0.012 + Math.random() * 0.025;
        p.shrink = 0.18 + Math.random() * 0.22;
        p.alpha  = 0.3 + Math.random() * 0.7;
      }

      p.x = CX + Math.cos(p.angle) * p.radius;
      p.y = CY + Math.sin(p.angle) * p.radius;

      const sz    = particleSize(p.radius);
      const color = particleColor(p.radius, p.alpha);

      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    // 4. Central character
    const charState = getCharState(frame);
    if (charState.active && charState.alpha > 0.01) {
      const ci = Math.floor(frame / CHAR_PERIOD) % CHARS.length;
      const ch = CHARS[ci];
      const fontSize = Math.round(52 * charState.scale);

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.font = `${fontSize}px 宋体, SimSun, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const a = (charState.alpha * 0.85).toFixed(3);
      ctx.fillStyle = `rgba(200,210,255,${a})`;
      ctx.fillText(ch, CX, CY);
      ctx.restore();
    }

    // 5. Watermark — bottom-right
    ctx.save();
    ctx.font = '13px 宋体, SimSun, serif';
    ctx.fillStyle = 'rgba(120,130,180,0.38)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('漩涡', W - 14, H - 12);
    ctx.restore();

    frame++;
    requestAnimationFrame(draw);
  }

  draw();
})();
</script>
</body>
</html>
// DONE
