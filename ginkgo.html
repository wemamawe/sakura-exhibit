<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>银杏 · Ginkgo Seasons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0800;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}
canvas{display:block;}
#ui{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:10;
}
.btn{
  padding:8px 18px;border-radius:20px;border:1px solid rgba(255,220,100,0.4);
  background:rgba(255,255,255,0.12);color:rgba(255,230,150,0.95);
  font-size:13px;cursor:pointer;backdrop-filter:blur(8px);
  transition:all .25s;
}
.btn:hover{background:rgba(255,200,80,0.3);}
.btn.active{background:rgba(255,180,40,0.45);border-color:rgba(255,200,60,0.9);color:#fff;}
#caption{
  position:fixed;top:36px;left:50%;transform:translateX(-50%);
  color:rgba(255,235,160,0.92);font-size:19px;letter-spacing:6px;
  text-shadow:0 0 20px rgba(255,200,60,0.7), 0 2px 8px rgba(0,0,0,0.5);
  transition:opacity .5s;pointer-events:none;
}
#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  color:rgba(255,220,120,0.4);font-size:11px;letter-spacing:2px;pointer-events:none;
}
#home-btn{
  position:fixed;top:24px;left:24px;z-index:20;
  padding:6px 14px;border-radius:20px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,220,100,0.3);
  color:rgba(255,230,150,0.8);font-size:12px;letter-spacing:2px;
  text-decoration:none;cursor:pointer;backdrop-filter:blur(8px);
  transition:all .2s;
}
#home-btn:hover{background:rgba(255,200,80,0.2);}
</style>
</head>
<body>
<a id="home-btn" href="home.html">← 展览馆</a>
<div id="caption">嫩叶初生</div>
<div id="hint">拖拽旋转 · 滚轮缩放</div>
<div id="ui">
  <button class="btn active" data-stage="0">🌿 新绿</button>
  <button class="btn" data-stage="1">☀️ 夏荫</button>
  <button class="btn" data-stage="2">🍂 金秋</button>
  <button class="btn" data-stage="3">🌬️ 落叶</button>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x100a00,0.016);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,300);
camera.position.set(0,5,20);
camera.lookAt(0,4,0);

// Sky
function makeSkyTex(top,mid,bot){
  const c=document.createElement('canvas');c.width=2;c.height=256;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,top);g.addColorStop(0.5,mid);g.addColorStop(1,bot);
  x.fillStyle=g;x.fillRect(0,0,2,256);
  return new THREE.CanvasTexture(c);
}
const SKIES=[
  ['#0a1a0a','#1a3a18','#2a6020'],  // spring
  ['#0a1a28','#1a4060','#2a7080'],  // summer
  ['#180a00','#4a2000','#c05000'],  // autumn
  ['#080808','#181008','#302010'],  // fall
];
const skyGeo=new THREE.SphereGeometry(200,16,8);
const skyMat=new THREE.MeshBasicMaterial({side:THREE.BackSide,map:makeSkyTex(...SKIES[0])});
scene.add(new THREE.Mesh(skyGeo,skyMat));
function setSky(s){ skyMat.map=makeSkyTex(...SKIES[s]); skyMat.map.needsUpdate=true; skyMat.needsUpdate=true; }

// Lights
const ambient=new THREE.AmbientLight(0xfff0d0,0.6); scene.add(ambient);
const sun=new THREE.DirectionalLight(0xfff5e0,1.8);
sun.position.set(10,18,8); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=1; sun.shadow.camera.far=80;
[-20,20,-20,20].forEach((v,i)=>[sun.shadow.camera.left,sun.shadow.camera.right,sun.shadow.camera.bottom,sun.shadow.camera.top][i]=v);
scene.add(sun);
const fill=new THREE.DirectionalLight(0xd0e8ff,0.3); fill.position.set(-8,5,-10); scene.add(fill);

// Terrain
const tGeo=new THREE.PlaneGeometry(120,120,80,80);
const tPos=tGeo.attributes.position;
for(let i=0;i<tPos.count;i++){
  const x=tPos.getX(i),z=tPos.getY(i);
  const h=Math.sin(x*.10)*1.0+Math.cos(z*.08)*.8+Math.sin(x*.22+z*.15)*.4;
  const d=Math.sqrt(x*x+z*z);
  tPos.setZ(i,h*(1-Math.max(0,1-d/9)));
}
tGeo.computeVertexNormals();
const tColors=new Float32Array(tPos.count*3);
for(let i=0;i<tPos.count;i++){
  const h=tPos.getZ(i);
  new THREE.Color().setHSL(0.27+h*.01,.5,.22+h*.02).toArray(tColors,i*3);
}
tGeo.setAttribute('color',new THREE.BufferAttribute(tColors,3));
const terrain=new THREE.Mesh(tGeo,new THREE.MeshLambertMaterial({vertexColors:true}));
terrain.rotation.x=-Math.PI/2; terrain.receiveShadow=true; scene.add(terrain);

// Clouds
function makeCloud(){
  const g=new THREE.Group();
  for(let i=0;i<5;i++){
    const s=0.7+Math.random();
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(s,6,4),
      new THREE.MeshLambertMaterial({color:0xfff8e8,transparent:true,opacity:0.45})
    );
    m.position.set((Math.random()-.5)*3,(Math.random()-.5)*.7,(Math.random()-.5)*1.2);
    g.add(m);
  }
  return g;
}
const clouds=[];
for(let i=0;i<5;i++){
  const m=makeCloud();
  m.position.set((Math.random()-.5)*100,22+Math.random()*8,(Math.random()-.5)*60);
  m.scale.setScalar(.7+Math.random()*.6);
  scene.add(m); clouds.push({mesh:m,speed:.01+Math.random()*.012});
}

// ── Textures ──
function makeGinkgoLeafTex(hue,sat,light){
  // fan-shaped ginkgo leaf (扇形)
  const c=document.createElement('canvas');c.width=96;c.height=96;
  const x=c.getContext('2d');
  x.clearRect(0,0,96,96);
  x.save();x.translate(48,72);
  x.beginPath();
  x.moveTo(0,0);
  // fan shape: two curved lobes
  x.bezierCurveTo(-8,-10,-28,-30,-30,-48);
  x.bezierCurveTo(-28,-58,-12,-62,0,-52);
  x.bezierCurveTo(12,-62,28,-58,30,-48);
  x.bezierCurveTo(28,-30,8,-10,0,0);
  const g=x.createRadialGradient(0,-30,2,0,-25,38);
  g.addColorStop(0,`hsla(${hue},${sat}%,${light+12}%,1)`);
  g.addColorStop(0.5,`hsla(${hue},${sat}%,${light}%,0.95)`);
  g.addColorStop(1,`hsla(${hue-5},${sat-15}%,${light-8}%,0.7)`);
  x.fillStyle=g;x.fill();
  // fan veins
  x.strokeStyle=`hsla(${hue},${sat-20}%,${light-15}%,0.4)`;x.lineWidth=1;
  for(let i=-4;i<=4;i++){
    const a=i/4*0.55;
    x.beginPath();x.moveTo(0,0);
    x.lineTo(Math.sin(a)*36,-Math.cos(a)*52);x.stroke();
  }
  x.restore();
  return new THREE.CanvasTexture(c);
}

function makeGinkgoFallTex(){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const x=c.getContext('2d');
  x.clearRect(0,0,64,64);
  x.save();x.translate(32,46);
  x.beginPath();
  x.moveTo(0,0);
  x.bezierCurveTo(-5,-6,-18,-18,-18,-30);
  x.bezierCurveTo(-16,-38,-6,-40,0,-34);
  x.bezierCurveTo(6,-40,16,-38,18,-30);
  x.bezierCurveTo(18,-18,5,-6,0,0);
  const g=x.createRadialGradient(0,-20,1,0,-18,24);
  g.addColorStop(0,'rgba(255,235,80,1)');
  g.addColorStop(0.5,'rgba(240,180,20,0.9)');
  g.addColorStop(1,'rgba(200,120,10,0.5)');
  x.fillStyle=g;x.fill();
  x.restore();
  return new THREE.CanvasTexture(c);
}

const springLeafTex  = makeGinkgoLeafTex(100,70,45); // light green
const summerLeafTex  = makeGinkgoLeafTex(108,65,32); // deep green
const autumnLeafTex  = makeGinkgoLeafTex(48,85,55);  // golden yellow
const fallLeafTex    = makeGinkgoFallTex();

// ── Ginkgo tree (tall, columnar — ginkgo characteristic) ──
const bGroup=new THREE.Group(); scene.add(bGroup);
const branches=[];
function buildBranch(px,py,pz,dx,dy,dz,len,rad,depth){
  if(depth>8||len<0.08) return;
  const ex=px+dx*len,ey=py+dy*len,ez=pz+dz*len;
  branches.push({px,py,pz,ex,ey,ez,rad,depth,id:branches.length});
  if(depth>=8) return;
  // ginkgo: narrow columnar shape, branches go more upward than outward
  const spreadBase=depth<2?0.30:depth<5?0.40:0.50;
  const spread=spreadBase+(Math.random()-.5)*.05;
  const lr=len*(.70+depth*.003);
  const up=new THREE.Vector3(0,1,0);
  const dir=new THREE.Vector3(dx,dy,dz).normalize();
  let ax=new THREE.Vector3().crossVectors(dir,up).normalize();
  if(ax.lengthSq()<.01) ax.set(1,0,0);
  const twist=depth<3?(depth%2===0?.35:-.35):(Math.random()-.5)*.3;
  const lDir=dir.clone().applyAxisAngle(ax,spread).applyAxisAngle(up,twist);
  buildBranch(ex,ey,ez,lDir.x,lDir.y,lDir.z,lr,rad*.72,depth+1);
  const rDir=dir.clone().applyAxisAngle(ax,-spread*.9).applyAxisAngle(up,-twist*.85);
  buildBranch(ex,ey,ez,rDir.x,rDir.y,rDir.z,lr*.88,rad*.70,depth+1);
  if(depth<4&&Math.random()<.3){
    const mDir=dir.clone().applyAxisAngle(up,(Math.random()-.5)*.9).applyAxisAngle(ax,(Math.random()-.5)*.2);
    buildBranch(ex,ey,ez,mDir.x,mDir.y,mDir.z,lr*.55,rad*.50,depth+2);
  }
}
buildBranch(0,0,0, 0,1,0, 3.6, 0.22, 0);
const TOTAL=branches.length;

const branchMeshes=[];
for(const b of branches){
  const s=new THREE.Vector3(b.px,b.py,b.pz);
  const e=new THREE.Vector3(b.ex,b.ey,b.ez);
  const d=e.clone().sub(s);
  const l=d.length();
  const light=Math.max(.12,.26-b.depth*.013);
  const geo=new THREE.CylinderGeometry(b.rad*.45,b.rad,l,6,1);
  const mat=new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.06,.30,light)});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(s.clone().lerp(e,.5));
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.normalize());
  m.castShadow=true;
  m.userData={id:b.id,depth:b.depth,baseQuat:m.quaternion.clone(),windPhase:Math.random()*Math.PI*2};
  bGroup.add(m); branchMeshes.push(m);
}

// Per-branch particle generation
function makeParticlesFromBranches(branches,tex,size,perBranch){
  const positions=[];
  for(const b of branches){
    for(let k=0;k<perBranch;k++){
      const t=k/(perBranch-1||1);
      const jitter=size*(b.depth>=5?.5:b.depth>=3?.3:.15);
      const angle=k*2.39996*Math.PI*2;
      positions.push({
        x:b.px+(b.ex-b.px)*t+Math.cos(angle)*jitter,
        y:b.py+(b.ey-b.py)*t+(Math.random()-.5)*jitter*.5,
        z:b.pz+(b.ez-b.pz)*t+Math.sin(angle)*jitter,
      });
    }
  }
  const pa=new Float32Array(positions.length*3);
  positions.forEach((p,i)=>{pa[i*3]=p.x;pa[i*3+1]=p.y;pa[i*3+2]=p.z;});
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pa,3));
  const mat=new THREE.PointsMaterial({map:tex,size,transparent:true,opacity:0,
    depthWrite:false,alphaTest:.06,sizeAttenuation:true,blending:THREE.NormalBlending});
  return new THREE.Points(geo,mat);
}

const springPts = makeParticlesFromBranches(branches,springLeafTex,.40,6);
const summerPts = makeParticlesFromBranches(branches,summerLeafTex,.44,8);
const autumnPts = makeParticlesFromBranches(branches,autumnLeafTex,.46,8);
scene.add(springPts);scene.add(summerPts);scene.add(autumnPts);
springPts.visible=false;summerPts.visible=false;autumnPts.visible=false;

// ── Falling ginkgo leaves ──
const FALL=550;
const fallGeo=new THREE.BufferGeometry();
const fallPos=new Float32Array(FALL*3);
const fallVel=[];
const fallState=new Array(FALL).fill('falling');
let restCount=0;

const allBranchMids=[];
for(const b of branches) allBranchMids.push(new THREE.Vector3(
  (b.px+b.ex)/2,(b.py+b.ey)/2,(b.pz+b.ez)/2));

function resetLeaf(i){
  const src=allBranchMids[Math.floor(Math.random()*allBranchMids.length)];
  fallPos[i*3]  =src.x+(Math.random()-.5)*.6;
  fallPos[i*3+1]=src.y+(Math.random()-.5)*.3;
  fallPos[i*3+2]=src.z+(Math.random()-.5)*.6;
  fallVel[i]={vx:(Math.random()-.5)*.045,vy:-(0.022+Math.random()*.032),
              vz:(Math.random()-.5)*.03,phase:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.06};
  fallState[i]='falling';
}
for(let i=0;i<FALL;i++) resetLeaf(i);
fallGeo.setAttribute('position',new THREE.BufferAttribute(fallPos,3));
const fallMat=new THREE.PointsMaterial({map:fallLeafTex,size:.45,transparent:true,
  opacity:0,depthWrite:false,alphaTest:.05,blending:THREE.NormalBlending});
const fallingLeaves=new THREE.Points(fallGeo,fallMat);
fallingLeaves.visible=false;scene.add(fallingLeaves);

// ground leaves
const groundLeafGroup=new THREE.Group();scene.add(groundLeafGroup);groundLeafGroup.visible=false;
function spawnGroundLeaf(x,y,z){
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(.28+Math.random()*.16,.22+Math.random()*.10),
    new THREE.MeshLambertMaterial({map:fallLeafTex,transparent:true,alphaTest:.05,
      side:THREE.DoubleSide,opacity:.80})
  );
  m.position.set(x,y+.02,z);m.rotation.x=-Math.PI/2;m.rotation.z=Math.random()*Math.PI*2;
  groundLeafGroup.add(m);
}

// ── State ──
const CAPTIONS=['嫩叶初生','绿荫如盖','金叶满树','落叶归根'];
let targetStage=0;
const state={spring:0,summer:0,autumn:0,fall:0};

window.goStage=s=>{
  targetStage=s;
  document.querySelectorAll('.btn').forEach((b,i)=>b.classList.toggle('active',i===s));
  const cap=document.getElementById('caption');
  cap.style.opacity='0';
  setTimeout(()=>{cap.textContent=CAPTIONS[s];cap.style.opacity='1';},350);
  setSky(s);
  const si=[1.4,1.8,2.2,1.0];sun.intensity=si[s];
  const ac=[0xfff5d0,0xe0f8d0,0xfff0a0,0xf0e0c0];ambient.color.setHex(ac[s]);
  if(s===3){
    restCount=0;
    while(groundLeafGroup.children.length>0) groundLeafGroup.remove(groundLeafGroup.children[0]);
    for(let i=0;i<FALL;i++) resetLeaf(i);
    fallGeo.getAttribute('position').needsUpdate=true;
  }
};
document.querySelectorAll('#ui .btn').forEach(btn=>{
  btn.addEventListener('click',()=>goStage(parseInt(btn.dataset.stage)));
});

// Orbit
let orbitTheta=0,orbitPhi=Math.PI/9,orbitRadius=18;
let isDragging=false,lastX=0,lastY=0;
const TARGET=new THREE.Vector3(0,3.5,0);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  orbitTheta-=(e.clientX-lastX)*.005;
  orbitPhi=clamp(orbitPhi-(e.clientY-lastY)*.005,.05,Math.PI*.45);
  lastX=e.clientX;lastY=e.clientY;
});
window.addEventListener('wheel',e=>{orbitRadius=clamp(orbitRadius+e.deltaY*.02,5,45);},{passive:true});
let ltd=0,ltx=0,lty=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;ltx=e.touches[0].clientX;lty=e.touches[0].clientY;}
  if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
});
renderer.domElement.addEventListener('touchend',()=>{isDragging=false;});
renderer.domElement.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    orbitTheta-=(e.touches[0].clientX-ltx)*.005;
    orbitPhi=clamp(orbitPhi-(e.touches[0].clientY-lty)*.005,.05,Math.PI*.45);
    ltx=e.touches[0].clientX;lty=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    orbitRadius=clamp(orbitRadius-(d-ltd)*.05,5,45);ltd=d;
  }
},{passive:false});

// Helpers
const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const easeOut=t=>1-Math.pow(1-Math.min(1,Math.max(0,t)),2);
const clock=new THREE.Clock();
let elapsed=0;

renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();elapsed+=dt;
  const sp=dt*.75;

  state.spring=lerp(state.spring,targetStage===0?1:0,sp*.7);
  state.summer=lerp(state.summer,targetStage===1?1:0,sp*.6);
  state.autumn=lerp(state.autumn,targetStage===2?1:0,sp*.6);
  state.fall  =lerp(state.fall,  targetStage===3?1:0,sp*.5);

  // Wind
  const windStrength=Math.max(0,Math.sin(elapsed*.20)*.5+Math.sin(elapsed*.09)*.4+Math.max(0,Math.sin(elapsed*.43))*.7);
  const treeSwayX=Math.sin(elapsed*1.5)*windStrength*.04+Math.sin(elapsed*2.7)*windStrength*.015;
  const treeSwayZ=Math.sin(elapsed*1.2+.5)*windStrength*.02;
  bGroup.rotation.x=treeSwayX;bGroup.rotation.z=treeSwayZ;

  // Branch tremor
  for(const m of branchMeshes){
    if(m.userData.depth<4) continue;
    const ang=Math.sin(elapsed*4.2+m.userData.windPhase)*windStrength*(0.012+m.userData.depth*.007);
    const q=m.userData.baseQuat.clone();
    m.quaternion.copy(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),ang).multiply(q));
  }

  // Particles
  springPts.visible=targetStage===0;
  summerPts.visible=targetStage===1;
  autumnPts.visible=targetStage===2;
  [springPts,summerPts,autumnPts].forEach(p=>{p.rotation.x=treeSwayX*.8;p.rotation.z=treeSwayZ*.8;});

  springPts.material.opacity=easeOut(state.spring)*.90;
  summerPts.material.opacity=easeOut(state.summer)*.92;
  autumnPts.material.opacity=easeOut(state.autumn)*.94;

  // Falling leaves
  fallingLeaves.visible=targetStage===3&&state.fall>.02;
  groundLeafGroup.visible=targetStage===3;
  fallMat.opacity=easeOut(state.fall)*.90;
  if(state.fall>.05){
    const pa=fallGeo.getAttribute('position');
    let anyMoving=false;
    for(let i=0;i<FALL;i++){
      if(fallState[i]==='resting') continue;
      anyMoving=true;
      const v=fallVel[i];
      pa.array[i*3]  +=v.vx+Math.sin(elapsed*.9+v.phase)*.025+v.spin+windStrength*.02;
      pa.array[i*3+1]+=v.vy*state.fall;
      pa.array[i*3+2]+=v.vz+Math.cos(elapsed*.7+v.phase)*.015;
      const lx=pa.array[i*3],lz=pa.array[i*3+2];
      const gH=(Math.sin(lx*.10)*1.0+Math.cos(lz*.08)*.8+Math.sin(lx*.22+lz*.15)*.4)
               *(1-Math.max(0,1-Math.sqrt(lx*lx+lz*lz)/9));
      if(pa.array[i*3+1]<=gH+.05){
        spawnGroundLeaf(lx,gH,lz);
        pa.array[i*3+1]=-10;
        fallState[i]='resting';restCount++;
        v.vx=0;v.vy=0;v.vz=0;
      }
    }
    if(!anyMoving&&restCount>=FALL) fallMat.opacity=Math.max(0,fallMat.opacity-dt*.12);
    pa.needsUpdate=true;
  }

  // Camera
  if(!isDragging) orbitTheta+=dt*.05;
  camera.position.set(
    TARGET.x+orbitRadius*Math.sin(orbitPhi)*Math.sin(orbitTheta),
    TARGET.y+orbitRadius*Math.cos(orbitPhi),
    TARGET.z+orbitRadius*Math.sin(orbitPhi)*Math.cos(orbitTheta)
  );
  camera.lookAt(TARGET);

  // Clouds
  for(const c of clouds){c.mesh.position.x+=c.speed;if(c.mesh.position.x>65)c.mesh.position.x=-65;}
  sun.position.x=10+Math.sin(elapsed*.03)*5;
  sun.position.z=14+Math.cos(elapsed*.03)*5;

  renderer.render(scene,camera);
});
</script>
</body>
</html>
