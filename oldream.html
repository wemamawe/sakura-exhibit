<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>旧梦 · Old Dream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0818;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════
//  旧梦 — 透纳（Turner）光雾风格
//  金色光晕弥漫，诗句如蒲公英种子飘散
// ══════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, time = 0;
let mouseX = -1, mouseY = -1;

function resize() {
  W = C.width = innerWidth; H = C.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 诗句
const LINES = ['旧梦如烟', '散作满天星', '你来过', '却又走了', '留一地月光'];
let poemPhase = 0; // 当前显示哪行
let poemTimer = 0;
const POEM_SHOW = 220;   // 显示帧数
const POEM_FADE = 120;   // 溶解帧数
const POEM_GAP  = 60;    // 间隔

// ── 光晕粒子（Turner的金色薄雾）──
const GLOWS = [];
for (let i = 0; i < 90; i++) {
  GLOWS.push({
    x: Math.random(), y: Math.random(),
    r: 0.03 + Math.random() * 0.15,
    vx: (Math.random() - 0.5) * 0.0003,
    vy: (Math.random() - 0.5) * 0.0002 - 0.0001,
    hue: 30 + Math.random() * 30,
    sat: 60 + Math.random() * 30,
    lit: 40 + Math.random() * 25,
    alpha: 0.02 + Math.random() * 0.06,
    phase: Math.random() * Math.PI * 2,
  });
}

// ── 溶解粒子（文字碎片）──
const DISSOLVE = [];

function spawnDissolve(x, y, char) {
  const count = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 1.2;
    DISSOLVE.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      r: 1.5 + Math.random() * 3,
      life: 1,
      decay: 0.005 + Math.random() * 0.008,
      hue: 30 + Math.random() * 35,
      char: Math.random() < 0.15 ? char : null, // 少量保留字符
    });
  }
}

// ── 珍珠光点（远景漂浮）──
const PEARLS = [];
for (let i = 0; i < 40; i++) {
  PEARLS.push({
    x: Math.random() * W, y: Math.random() * H,
    r: 1 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.5,
  });
}

function draw() {
  requestAnimationFrame(draw);
  time++;

  // 不清屏，用半透明覆盖实现拖尾（Turner雾感）
  ctx.fillStyle = 'rgba(10,8,24,0.06)';
  ctx.fillRect(0, 0, W, H);

  // ── 光晕层（大面积柔光圆）──
  for (const g of GLOWS) {
    g.x += g.vx + Math.sin(time * 0.005 + g.phase) * 0.0002;
    g.y += g.vy + Math.cos(time * 0.004 + g.phase) * 0.0001;
    if (g.x < -0.2) g.x = 1.2;
    if (g.x > 1.2) g.x = -0.2;
    if (g.y < -0.2) g.y = 1.2;
    if (g.y > 1.2) g.y = -0.2;

    const gx = g.x * W, gy = g.y * H, gr = g.r * Math.min(W, H);
    const pulse = g.alpha * (0.7 + Math.sin(time * 0.02 + g.phase) * 0.3);

    // 鼠标影响：附近光晕被推开
    if (mouseX > 0) {
      const dx = gx - mouseX, dy = gy - mouseY;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 200) {
        const push = (1 - d / 200) * 0.003;
        g.x += (dx / d) * push;
        g.y += (dy / d) * push;
      }
    }

    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
    grad.addColorStop(0, `hsla(${g.hue},${g.sat}%,${g.lit}%,${pulse})`);
    grad.addColorStop(0.5, `hsla(${g.hue+10},${g.sat-10}%,${g.lit-10}%,${pulse*0.4})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gx, gy, gr, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 珍珠光点 ──
  for (const p of PEARLS) {
    const px = p.x + Math.sin(time * 0.01 + p.phase) * 15;
    const py = p.y + Math.cos(time * 0.008 + p.phase) * 10;
    const pa = 0.3 + Math.sin(time * 0.03 + p.phase) * 0.2;
    ctx.fillStyle = `rgba(255,240,200,${pa})`;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── 诗句系统 ──
  poemTimer++;
  const totalCycle = POEM_SHOW + POEM_FADE + POEM_GAP;
  const lineIdx = Math.floor(poemPhase) % LINES.length;
  const cycleT = poemTimer % totalCycle;

  if (cycleT < POEM_SHOW) {
    // 显示文字（逐字淡入）
    const text = LINES[lineIdx];
    const fontSize = Math.min(W, H) * 0.065;
    ctx.font = `300 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const charW = fontSize * 1.3;
    const startX = W / 2 - (text.length - 1) * charW / 2;

    for (let i = 0; i < text.length; i++) {
      const charDelay = i * 12;
      const charAlpha = Math.min(1, Math.max(0, (cycleT - charDelay) / 30));
      ctx.fillStyle = `rgba(255,230,180,${charAlpha * 0.85})`;
      ctx.shadowColor = `rgba(255,200,100,${charAlpha * 0.6})`;
      ctx.shadowBlur = 25;
      ctx.fillText(text[i], startX + i * charW, H * 0.48);
    }
    ctx.shadowBlur = 0;
  } else if (cycleT < POEM_SHOW + POEM_FADE) {
    // 溶解阶段：每帧从字符位置喷射粒子
    const dissolveT = cycleT - POEM_SHOW;
    if (dissolveT < 10) { // 前10帧生成溶解粒子
      const text = LINES[lineIdx];
      const fontSize = Math.min(W, H) * 0.065;
      const charW = fontSize * 1.3;
      const startX = W / 2 - (text.length - 1) * charW / 2;
      for (let i = 0; i < text.length; i++) {
        if (dissolveT === Math.floor(i * 2)) {
          spawnDissolve(startX + i * charW, H * 0.48, text[i]);
        }
      }
    }
    // 残影文字渐隐
    const fadeAlpha = Math.max(0, 1 - (dissolveT / POEM_FADE));
    if (fadeAlpha > 0.05) {
      const text = LINES[lineIdx];
      const fontSize = Math.min(W, H) * 0.065;
      ctx.font = `300 ${fontSize}px "STKaiti","KaiTi","Songti SC",serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255,230,180,${fadeAlpha * 0.3})`;
      ctx.fillText(text, W/2, H * 0.48);
    }
  } else if (cycleT === POEM_SHOW + POEM_FADE + POEM_GAP - 1) {
    poemPhase++;
  }

  // ── 溶解粒子 ──
  for (let i = DISSOLVE.length - 1; i >= 0; i--) {
    const d = DISSOLVE[i];
    d.x += d.vx;
    d.y += d.vy;
    d.vy -= 0.01; // 微微上飘
    d.life -= d.decay;
    if (d.life <= 0) { DISSOLVE.splice(i, 1); continue; }

    if (d.char) {
      // 字符碎片
      ctx.font = `${10 + d.r * 2}px "STKaiti",serif`;
      ctx.fillStyle = `rgba(255,220,160,${d.life * 0.6})`;
      ctx.shadowColor = `rgba(255,180,80,${d.life * 0.4})`;
      ctx.shadowBlur = 8;
      ctx.textAlign = 'center';
      ctx.fillText(d.char, d.x, d.y);
      ctx.shadowBlur = 0;
    } else {
      // 光点碎片
      ctx.fillStyle = `hsla(${d.hue},70%,60%,${d.life * 0.5})`;
      ctx.shadowColor = `hsla(${d.hue},80%,50%,${d.life * 0.3})`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * d.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// ── 事件 ──
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });
window.addEventListener('touchmove', e => {
  e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, {passive:false});
window.addEventListener('touchend', () => { mouseX = -1; mouseY = -1; });

draw();
</script>
</body>
</html>
