<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>心事 · Heartbeat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0808;overflow:hidden;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ══════════════════════════════════════════
//  心事 — 南·戈尔丁亲密影像感
//  胶片颗粒质感上的手写心电线，温暖而脆弱
// ══════════════════════════════════════════
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H, time = 0;
let mouseX = -1, mouseY = -1;

function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const WORDS = ['心事重重','欲说还休','却道天凉好个秋','少年不识愁滋味','为赋新词强说愁',
               '人生若只如初见','何事秋风悲画扇','等闲变却故人心','却道故人心易变'];
const PARTICLES = [];
let heartX = 0;
let bpm = 72;
const ecgHistory = [];

// ECG波形生成（真实QRS形态）
function ecgValue(t) {
  t = ((t % 1) + 1) % 1;
  // P波
  if (t < 0.12) return Math.sin(t / 0.12 * Math.PI) * 0.1;
  // PR段
  if (t < 0.18) return 0;
  // Q波
  if (t < 0.22) return -(t - 0.18) / 0.04 * 0.15;
  // R波（尖峰）
  if (t < 0.28) return -0.15 + (t - 0.22) / 0.06 * 1.15;
  // S波
  if (t < 0.34) return 1.0 - (t - 0.28) / 0.06 * 1.2;
  // ST段
  if (t < 0.42) return -0.2 + (t - 0.34) / 0.08 * 0.2;
  // T波
  if (t < 0.58) return Math.sin((t - 0.42) / 0.16 * Math.PI) * 0.2;
  // 静息
  return 0;
}

function spawnWordParticles(x, y) {
  const word = WORDS[Math.floor(Math.random() * WORDS.length)];
  for (let i = 0; i < word.length; i++) {
    const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI;
    const speed = 1 + Math.random() * 2.5;
    PARTICLES.push({
      x: x + (i - word.length/2) * 18,
      y,
      vx: Math.cos(angle) * speed * 0.6,
      vy: Math.sin(angle) * speed,
      char: word[i],
      life: 1,
      decay: 0.004 + Math.random() * 0.005,
      size: Math.min(W, H) * 0.025 + Math.random() * 5,
    });
  }
}

function draw() {
  requestAnimationFrame(draw);
  time += 0.016;

  // ── 胶片底色（暗暖调，南·戈尔丁风格）──
  ctx.fillStyle = 'rgba(10,8,8,0.12)';
  ctx.fillRect(0, 0, W, H);

  // 胶片颗粒噪点
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 16) { // 每隔4像素加噪点（性能优化）
    const noise = (Math.random() - 0.5) * 6;
    data[i] = Math.min(255, Math.max(0, data[i] + noise));
    data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise * 0.8));
    data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise * 0.6));
  }
  ctx.putImageData(imgData, 0, 0);

  // ── BPM随鼠标 ──
  if (mouseX > 0) {
    const dx = mouseX - W/2, dy = mouseY - H/2;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = Math.sqrt(W*W + H*H) / 2;
    bpm = 60 + (1 - dist / maxDist) * 80; // 60-140
  } else {
    bpm = 72 + Math.sin(time * 0.3) * 8;
  }

  // ── ECG波形绘制（手写线条感）──
  const beatLen = 60 / bpm; // 每次心跳的秒数
  const ecgY = H * 0.45;
  const ecgH = H * 0.18;
  const phase = (time / beatLen) % 1;

  // 记录历史
  ecgHistory.push({ x: W * 0.65, y: ecgY - ecgValue(phase) * ecgH, t: time });
  if (ecgHistory.length > 300) ecgHistory.shift();

  // R波峰值检测（触发文字爆破）
  if (phase > 0.26 && phase < 0.30 && Math.random() < 0.15) {
    spawnWordParticles(W * 0.65, ecgY - ecgH);
  }

  // 绘制ECG线（手写感：微抖动 + 变粗细）
  if (ecgHistory.length > 2) {
    // 发光拖尾
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'rgba(200,80,60,0.5)';

    ctx.beginPath();
    ctx.moveTo(ecgHistory[0].x - (time - ecgHistory[0].t) * W * 0.3, ecgHistory[0].y);
    for (let i = 1; i < ecgHistory.length; i++) {
      const h = ecgHistory[i];
      const age = time - h.t;
      const x = h.x - age * W * 0.3;
      if (x < -10) continue;
      // 手写抖动
      const jitter = Math.sin(i * 3.7) * 0.8;
      ctx.lineTo(x, h.y + jitter);
    }

    // 渐变线色（从暗红→亮红→暖橙）
    const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
    lineGrad.addColorStop(0, 'rgba(80,20,15,0.2)');
    lineGrad.addColorStop(0.5, 'rgba(200,60,40,0.7)');
    lineGrad.addColorStop(0.8, 'rgba(230,120,50,0.9)');
    lineGrad.addColorStop(1, 'rgba(255,200,100,0.95)');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── 文字粒子 ──
  for (let i = PARTICLES.length - 1; i >= 0; i--) {
    const p = PARTICLES[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.015; // 微弱重力
    p.life -= p.decay;
    if (p.life <= 0) { PARTICLES.splice(i, 1); continue; }

    ctx.font = `${p.size}px "STKaiti","KaiTi","Songti SC",serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(200,160,130,${p.life * 0.7})`;
    ctx.shadowColor = `rgba(200,100,60,${p.life * 0.3})`;
    ctx.shadowBlur = 5;
    ctx.fillText(p.char, p.x, p.y);
  }
  ctx.shadowBlur = 0;

  // ── BPM显示（胶片字体风格）──
  const bpmSize = Math.min(W, H) * 0.028;
  ctx.font = `300 ${bpmSize}px "Courier New",monospace`;
  ctx.fillStyle = `rgba(180,120,90,${0.4 + Math.sin(time * 2) * 0.1})`;
  ctx.textAlign = 'left';
  ctx.fillText(`♡ ${Math.round(bpm)} BPM`, W * 0.05, H * 0.92);

  // 辛弃疾引用
  ctx.font = `${bpmSize * 0.7}px "STKaiti","KaiTi",serif`;
  ctx.fillStyle = 'rgba(160,130,100,0.25)';
  ctx.textAlign = 'right';
  ctx.fillText('辛弃疾 · 丑奴儿', W * 0.95, H * 0.95);
}

// 事件
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseleave', () => { mouseX = -1; });
window.addEventListener('touchmove', e => {
  e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, {passive:false});
window.addEventListener('touchend', () => { mouseX = -1; });

draw();
</script>
</body>
</html>
