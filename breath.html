<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>呼吸 · Breath</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=innerWidth,H=innerHeight;
canvas.width=W;canvas.height=H;

// ═══════════════════════════════════════
//  安尼施·卡普尔(Anish Kapoor)风格
//  虚空与呼吸：深红/暗紫的膨胀收缩
//  核心球体跟随鼠标缓慢移动
//  呼吸节奏自动运行，鼠标靠近时加速
// ═══════════════════════════════════════

let mx = W/2, my = H/2;
let tx = W/2, ty = H/2; // 目标位置（缓动）

// ── 呼吸参数 ──
let breathPhase = 0;
const BREATH_SPEED = .008; // 基础呼吸速度
let breathRadius = 0;
const MIN_R = Math.min(W, H) * .08;
const MAX_R = Math.min(W, H) * .32;

// ── 微尘粒子（被呼吸推拉） ──
const DUST = 200;
const dust = [];
class Dust {
  constructor() {
    this.angle = Math.random() * Math.PI * 2;
    this.dist = 50 + Math.random() * Math.max(W, H) * .5;
    this.baseDist = this.dist;
    this.r = .5 + Math.random() * 1.5;
    this.speed = .001 + Math.random() * .003;
    this.phase = Math.random() * Math.PI * 2;
    this.hue = Math.random() < .5 ? (350 + Math.random()*20) : (270 + Math.random()*30);
  }
  update(cx, cy, breathR, frame) {
    this.angle += this.speed;
    this.phase += .01;
    // 被呼吸推拉
    const breathForce = breathR / MAX_R;
    this.dist = this.baseDist + breathForce * 60 + Math.sin(this.phase) * 10;
    this.x = cx + Math.cos(this.angle) * this.dist;
    this.y = cy + Math.sin(this.angle) * this.dist;
  }
  draw(cx, cy, breathR) {
    const dist = Math.hypot(this.x - cx, this.y - cy);
    const proximity = 1 - Math.min(1, (dist - breathR) / 200);
    const a = .15 + proximity * .4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * (1 + proximity * .5), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},60%,55%,${a})`;
    ctx.fill();
  }
}
for (let i = 0; i < DUST; i++) dust.push(new Dust());

// ── 光环 ──
const RINGS = 6;

function drawRings(cx, cy, breathR, phase) {
  for (let i = 0; i < RINGS; i++) {
    const ringPhase = phase - i * .3;
    const expansion = Math.sin(ringPhase);
    const ringR = breathR + i * 15 + expansion * 20;
    if (ringR < 5) continue;
    const a = .06 - i * .008;
    if (a <= 0) continue;
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(180,50,80,${a})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ── 核心球体 ──
function drawOrb(cx, cy, r, phase) {
  if (r < 2) return;
  // 最外层光晕（卡普尔式深红辐射）
  const outerGlow = ctx.createRadialGradient(cx, cy, r * .5, cx, cy, r * 3);
  outerGlow.addColorStop(0, 'rgba(120,15,40,0.15)');
  outerGlow.addColorStop(.3, 'rgba(80,10,30,0.08)');
  outerGlow.addColorStop(.6, 'rgba(50,5,25,0.03)');
  outerGlow.addColorStop(1, 'rgba(20,0,15,0)');
  ctx.fillStyle = outerGlow;
  ctx.fillRect(0, 0, W, H);

  // 球体本身（深红到暗紫渐变）
  const orbGrad = ctx.createRadialGradient(
    cx - r * .15, cy - r * .15, 0,
    cx, cy, r
  );
  orbGrad.addColorStop(0, 'rgba(160,20,50,0.95)');
  orbGrad.addColorStop(.3, 'rgba(120,10,40,0.90)');
  orbGrad.addColorStop(.6, 'rgba(70,5,35,0.85)');
  orbGrad.addColorStop(.85, 'rgba(40,0,30,0.80)');
  orbGrad.addColorStop(1, 'rgba(15,0,15,0.6)');

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = orbGrad;
  ctx.fill();

  // 球面高光
  const highlight = ctx.createRadialGradient(
    cx - r * .25, cy - r * .3, 0,
    cx - r * .1, cy - r * .1, r * .6
  );
  highlight.addColorStop(0, 'rgba(255,120,140,0.15)');
  highlight.addColorStop(.5, 'rgba(200,60,80,0.05)');
  highlight.addColorStop(1, 'rgba(150,30,50,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = highlight;
  ctx.fill();

  // 深渊核心（黑洞感）
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * .4);
  core.addColorStop(0, 'rgba(0,0,0,0.5)');
  core.addColorStop(.5, 'rgba(10,0,5,0.2)');
  core.addColorStop(1, 'rgba(30,0,15,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r * .4, 0, Math.PI * 2);
  ctx.fillStyle = core;
  ctx.fill();

  // 脉搏光点
  const pulseA = Math.pow(Math.sin(phase * 2), 4) * .3;
  if (pulseA > .02) {
    ctx.beginPath();
    ctx.arc(cx, cy, r * .08, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,180,180,${pulseA})`;
    ctx.fill();
  }
}

// ── 文字 ──
let textAlpha = 0;

function drawText(frame) {
  if (frame < 300) return;
  textAlpha = Math.min(.3, (frame - 300) / 400);
  ctx.save();
  ctx.globalAlpha = textAlpha;
  ctx.textAlign = 'center';
  const fs = Math.min(14, W * .03);
  ctx.font = `200 ${fs}px "Songti SC","SimSun",serif`;
  ctx.fillStyle = 'rgba(180,130,140,1)';
  ctx.fillText('呼', W / 2 - fs, H - 50);
  ctx.fillText('吸', W / 2 + fs, H - 50);

  // 呼吸提示
  const inhale = Math.sin(breathPhase) > 0;
  ctx.globalAlpha = textAlpha * .4;
  ctx.font = `200 ${fs * .6}px "Songti SC","SimSun",serif`;
  ctx.fillStyle = 'rgba(150,100,110,1)';
  ctx.fillText(inhale ? '吸' : '呼', W / 2, H - 28);
  ctx.restore();
}

// ── 主循环 ──
let frame = 0;

function tick() {
  requestAnimationFrame(tick);
  frame++;

  // 缓动跟随鼠标
  tx += (mx - tx) * .015;
  ty += (my - ty) * .015;

  // 呼吸（鼠标距中心越近，呼吸越深）
  const distToCenter = Math.hypot(mx - W/2, my - H/2);
  const proximity = 1 - Math.min(1, distToCenter / (Math.max(W, H) * .5));
  const speed = BREATH_SPEED * (1 + proximity * .5);
  breathPhase += speed;

  // 呼吸半径
  const breathCycle = (Math.sin(breathPhase) + 1) / 2; // 0~1
  breathRadius = MIN_R + (MAX_R - MIN_R) * breathCycle * (.6 + proximity * .4);

  // 纯黑背景
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, W, H);

  // 极微妙的背景脉动
  const bgPulse = breathCycle * .02;
  if (bgPulse > .005) {
    const bgGrad = ctx.createRadialGradient(tx, ty, 0, tx, ty, Math.max(W, H));
    bgGrad.addColorStop(0, `rgba(40,5,15,${bgPulse})`);
    bgGrad.addColorStop(.5, `rgba(20,0,10,${bgPulse * .3})`);
    bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // 微尘
  for (const d of dust) {
    d.update(tx, ty, breathRadius, frame);
    d.draw(tx, ty, breathRadius);
  }

  drawRings(tx, ty, breathRadius, breathPhase);
  drawOrb(tx, ty, breathRadius, breathPhase);
  drawText(frame);
}

// ── 交互 ──
function onMove(x,y){ mx=x; my=y; }
canvas.addEventListener('mousemove', e=>onMove(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e=>{
  e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});

window.addEventListener('resize', ()=>{
  W=innerWidth; H=innerHeight;
  canvas.width=W; canvas.height=H;
});

tick();
</script>

<script>
// 低频呼吸音 + 心跳
let aCtx,master,isActive=false;
function initAudio(){
  if(aCtx)return;
  aCtx=new(AudioContext||webkitAudioContext)();
  master=aCtx.createGain();master.gain.value=0.10;master.connect(aCtx.destination);
  // 持续低频drone
  const drone=aCtx.createOscillator(),dg=aCtx.createGain();
  drone.type='sine';drone.frequency.value=55;dg.gain.value=.06;
  const lp=aCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=80;
  drone.connect(lp);lp.connect(dg);dg.connect(master);drone.start();
  // 第二谐波
  const h2=aCtx.createOscillator(),h2g=aCtx.createGain();
  h2.type='sine';h2.frequency.value=110;h2g.gain.value=.02;
  h2.connect(h2g);h2g.connect(master);h2.start();
  // 心跳
  function heartbeat(){
    if(!isActive)return;
    const now=aCtx.currentTime;
    // lub
    const o1=aCtx.createOscillator(),g1=aCtx.createGain();
    o1.type='sine';o1.frequency.value=60;
    g1.gain.setValueAtTime(0,now);g1.gain.linearRampToValueAtTime(.12,now+.03);
    g1.gain.exponentialRampToValueAtTime(.001,now+.15);
    o1.connect(g1);g1.connect(master);o1.start(now);o1.stop(now+.2);
    // dub
    const o2=aCtx.createOscillator(),g2=aCtx.createGain();
    o2.type='sine';o2.frequency.value=50;
    g2.gain.setValueAtTime(0,now+.18);g2.gain.linearRampToValueAtTime(.08,now+.21);
    g2.gain.exponentialRampToValueAtTime(.001,now+.35);
    o2.connect(g2);g2.connect(master);o2.start(now+.18);o2.stop(now+.4);
    setTimeout(heartbeat,900+Math.random()*200);
  }
  heartbeat();isActive=true;
}
const btn=document.createElement('button');
btn.innerHTML='🔊';
btn.style.cssText='position:fixed;bottom:24px;right:24px;z-index:999;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s';
document.body.appendChild(btn);
btn.onclick=()=>{if(!aCtx)initAudio();else{isActive=!isActive;master.gain.value=isActive?.10:0;btn.style.opacity=isActive?'1':'0.5';}};
document.addEventListener('click',()=>{if(!aCtx)initAudio();},{once:true});
</script>
</body>
</html>
