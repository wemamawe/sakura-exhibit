<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree of Life</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; overflow:hidden; font-family:'PingFang SC','Microsoft YaHei',sans-serif; }
canvas { display:block; }
#ui {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
  display:flex; gap:12px; z-index:10;
}
.btn {
  padding:8px 20px; border-radius:20px; border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.8);
  cursor:pointer; font-size:13px; backdrop-filter:blur(8px);
  transition:all .2s;
}
.btn:hover { background:rgba(255,255,255,0.18); }
.btn.active { background:rgba(255,200,150,0.25); border-color:rgba(255,200,150,0.6); color:#ffd0a0; }
#caption {
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.75); font-size:18px; letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,200,150,0.5);
  pointer-events:none; transition:opacity .8s;
  white-space:nowrap;
}
#stage-label {
  position:fixed; top:32px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.35); font-size:12px; letter-spacing:6px;
  text-transform:uppercase; pointer-events:none;
}
</style>
</head>
<body>
<div id="stage-label">TREE OF LIFE</div>
<div id="caption"></div>
<div id="ui">
  <button class="btn active" onclick="goStage(0)">🌱 发芽</button>
  <button class="btn" onclick="goStage(1)">🌿 生长</button>
  <button class="btn" onclick="goStage(2)">🌸 开花</button>
  <button class="btn" onclick="goStage(3)">🍑 结果</button>
  <button class="btn" onclick="goStage(4)">🍂 落叶</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ── Scene ──
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.035);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 14);
camera.lookAt(0, 3, 0);

// ── Lights ──
const ambient = new THREE.AmbientLight(0x334466, 1.2);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
sun.position.set(5, 12, 6);
sun.castShadow = true;
scene.add(sun);
const fill = new THREE.PointLight(0x8866ff, 1.5, 30);
fill.position.set(-6, 6, 4);
scene.add(fill);

// ── Ground ──
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshLambertMaterial({ color:0x111820 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ── Tree branch data (recursive) ──
// Each branch: {start, end, radius, children[]}
const branchData = [];
function buildBranch(pos, dir, len, radius, depth) {
  if (depth > 7 || len < 0.08) return;
  const end = pos.clone().addScaledVector(dir, len);
  branchData.push({ start: pos.clone(), end: end.clone(), radius, depth });
  if (depth < 7) {
    const spread = 0.45 + Math.random()*0.15;
    // left
    const lDir = dir.clone();
    lDir.applyAxisAngle(new THREE.Vector3(Math.random()-.5, 0, Math.random()-.5).normalize(), spread);
    lDir.normalize();
    buildBranch(end, lDir, len*(0.68+Math.random()*0.08), radius*0.7, depth+1);
    // right
    const rDir = dir.clone();
    rDir.applyAxisAngle(new THREE.Vector3(Math.random()-.5, 0, Math.random()-.5).normalize(), -spread*(0.8+Math.random()*0.4));
    rDir.normalize();
    buildBranch(end, rDir, len*(0.65+Math.random()*0.08), radius*0.68, depth+1);
    // occasional third
    if (depth < 4 && Math.random() < 0.3) {
      const mDir = dir.clone();
      mDir.applyAxisAngle(new THREE.Vector3(Math.random()-.5, 0, Math.random()-.5).normalize(), (Math.random()-.5)*0.5);
      mDir.normalize();
      buildBranch(end, mDir, len*0.55, radius*0.55, depth+2);
    }
  }
}

Math.seedrandom = (s) => { Math.random = () => { s=(s*9301+49297)%233280; return s/233280; }; };
buildBranch(new THREE.Vector3(0,0,0), new THREE.Vector3(0,1,0), 2.2, 0.12, 0);

// ── Build cylinder meshes for branches ──
const branchMeshes = [];
const branchMat = new THREE.MeshLambertMaterial({ color:0x3a2418 });
for (const b of branchData) {
  const dir = b.end.clone().sub(b.start);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(b.radius*0.6, b.radius, len, 6, 1);
  const mesh = new THREE.Mesh(geo, branchMat.clone());
  const mid = b.start.clone().lerp(b.end, 0.5);
  mesh.position.copy(mid);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  mesh.castShadow = true;
  mesh.scale.set(1, 0, 1); // start collapsed
  mesh.userData.targetScale = 1;
  mesh.userData.depth = b.depth;
  mesh.userData.order = branchData.indexOf(b);
  scene.add(mesh);
  branchMeshes.push(mesh);
}

// ── Flower particles ──
const FLOWER_COUNT = 600;
const flowerPositions = new Float32Array(FLOWER_COUNT * 3);
const flowerColors    = new Float32Array(FLOWER_COUNT * 3);
const flowerScales    = new Float32Array(FLOWER_COUNT);

// distribute flowers near branch tips
const tipBranches = branchData.filter(b => b.depth >= 4);
for (let i=0; i<FLOWER_COUNT; i++) {
  const b = tipBranches[Math.floor(Math.random()*tipBranches.length)];
  const t = 0.6 + Math.random()*0.4;
  const pos = b.start.clone().lerp(b.end, t);
  pos.x += (Math.random()-.5)*0.3;
  pos.y += (Math.random()-.5)*0.3;
  pos.z += (Math.random()-.5)*0.3;
  flowerPositions[i*3]   = pos.x;
  flowerPositions[i*3+1] = pos.y;
  flowerPositions[i*3+2] = pos.z;
  const hue = 340 + Math.random()*20;
  const c = new THREE.Color().setHSL(hue/360, 0.7, 0.78);
  flowerColors[i*3]=c.r; flowerColors[i*3+1]=c.g; flowerColors[i*3+2]=c.b;
  flowerScales[i] = 0;
}

const flowerGeo = new THREE.BufferGeometry();
flowerGeo.setAttribute('position', new THREE.BufferAttribute(flowerPositions, 3));
flowerGeo.setAttribute('color',    new THREE.BufferAttribute(flowerColors, 3));
flowerGeo.setAttribute('scale',    new THREE.BufferAttribute(flowerScales, 1));

const flowerMat = new THREE.PointsMaterial({
  size: 0.22, vertexColors: true, transparent: true,
  opacity: 0, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const flowerPoints = new THREE.Points(flowerGeo, flowerMat);
scene.add(flowerPoints);

// ── Fruit spheres ──
const fruitMeshes = [];
const fruitMat = new THREE.MeshLambertMaterial({ color:0xff6633 });
for (let i=0; i<80; i++) {
  const b = tipBranches[Math.floor(Math.random()*tipBranches.length)];
  const pos = b.end.clone();
  pos.x += (Math.random()-.5)*0.4;
  pos.z += (Math.random()-.5)*0.4;
  const geo = new THREE.SphereGeometry(0.06+Math.random()*0.05, 6, 6);
  const mesh = new THREE.Mesh(geo, fruitMat.clone());
  mesh.position.copy(pos);
  mesh.scale.setScalar(0);
  mesh.castShadow = true;
  scene.add(mesh);
  fruitMeshes.push(mesh);
}

// ── Falling leaf particles ──
const LEAF_COUNT = 400;
const leafPos   = new Float32Array(LEAF_COUNT * 3);
const leafCol   = new Float32Array(LEAF_COUNT * 3);
const leafVel   = [];
for (let i=0; i<LEAF_COUNT; i++) {
  leafPos[i*3]   = (Math.random()-.5)*10;
  leafPos[i*3+1] = Math.random()*12 + 1;
  leafPos[i*3+2] = (Math.random()-.5)*6;
  const warm = Math.random();
  const c = new THREE.Color().setHSL(0.07+warm*0.05, 0.9, 0.5+warm*0.2);
  leafCol[i*3]=c.r; leafCol[i*3+1]=c.g; leafCol[i*3+2]=c.b;
  leafVel.push({
    vx:(Math.random()-.5)*0.02, vy:-(0.02+Math.random()*0.03),
    vz:(Math.random()-.5)*0.01, phase:Math.random()*Math.PI*2
  });
}
const leafGeo = new THREE.BufferGeometry();
leafGeo.setAttribute('position', new THREE.BufferAttribute(leafPos, 3));
leafGeo.setAttribute('color',    new THREE.BufferAttribute(leafCol, 3));
const leafMat = new THREE.PointsMaterial({
  size:0.15, vertexColors:true, transparent:true, opacity:0, depthWrite:false,
});
const leafPoints = new THREE.Points(leafGeo, leafMat);
scene.add(leafPoints);

// ── Sprout (stage 0) ──
const sproutGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.4, 6);
const sproutMesh = new THREE.Mesh(sproutGeo, new THREE.MeshLambertMaterial({color:0x5a8a30}));
sproutMesh.position.y = 0.2;
sproutMesh.scale.y = 0;
scene.add(sproutMesh);

// ── Stage system ──
const CAPTIONS = [
  '种子破土', '枝叶生长', '繁花盛开', '硕果累累', '落叶归根'
];
let currentStage = -1;
let stageProgress = 0;
let targetStage = 0;

const buttons = document.querySelectorAll('.btn');
window.goStage = (s) => {
  targetStage = s;
  buttons.forEach((b,i) => b.classList.toggle('active', i===s));
  const cap = document.getElementById('caption');
  cap.style.opacity='0';
  setTimeout(()=>{ cap.textContent=CAPTIONS[s]; cap.style.opacity='1'; }, 400);
};
goStage(0);

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp01(t){ return Math.max(0,Math.min(1,t)); }
function easeInOut(t){ return t<.5?2*t*t:-1+(4-2*t)*t; }
function easeBack(t){ const c=1.7; return 1+c*Math.pow(t-1,3)+(c+1)*Math.pow(t-1,2); }

// Stage state
const state = {
  sprout: 0,       // 0→1
  branches: 0,     // 0→1 (controls branch Y scale)
  flowers: 0,      // 0→1
  fruits: 0,       // 0→1
  leaves: 0,       // 0→1 (fall intensity)
  flowerFade: 0,   // 1→0 when fruit stage
};

// ── Animate ──
let t0 = performance.now();
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  const elapsed = (performance.now()-t0)/1000;

  // Advance state toward target stage
  const sp = dt * 0.8; // speed

  if (targetStage === 0) {
    state.sprout    = clamp01(state.sprout + sp*1.5);
    state.branches  = clamp01(state.branches - sp);
    state.flowers   = clamp01(state.flowers - sp);
    state.fruits    = clamp01(state.fruits - sp*2);
    state.leaves    = clamp01(state.leaves - sp);
    state.flowerFade= clamp01(state.flowerFade - sp);
  } else if (targetStage === 1) {
    state.sprout    = clamp01(state.sprout + sp);
    state.branches  = clamp01(state.branches + sp*0.6);
    state.flowers   = clamp01(state.flowers - sp);
    state.fruits    = clamp01(state.fruits - sp*2);
    state.leaves    = clamp01(state.leaves - sp);
    state.flowerFade= clamp01(state.flowerFade - sp);
  } else if (targetStage === 2) {
    state.sprout    = 1;
    state.branches  = 1;
    state.flowers   = clamp01(state.flowers + sp*0.7);
    state.fruits    = clamp01(state.fruits - sp*2);
    state.leaves    = clamp01(state.leaves - sp);
    state.flowerFade= clamp01(state.flowerFade + sp*0.5);
  } else if (targetStage === 3) {
    state.sprout    = 1;
    state.branches  = 1;
    state.flowers   = clamp01(state.flowers - sp*0.5);
    state.fruits    = clamp01(state.fruits + sp*0.5);
    state.leaves    = clamp01(state.leaves - sp);
    state.flowerFade= clamp01(state.flowerFade - sp*0.5);
  } else if (targetStage === 4) {
    state.sprout    = 1;
    state.branches  = 1;
    state.flowers   = clamp01(state.flowers - sp);
    state.fruits    = clamp01(state.fruits - sp);
    state.leaves    = clamp01(state.leaves + sp*0.6);
    state.flowerFade= clamp01(state.flowerFade - sp);
  }

  // ── Apply: sprout ──
  sproutMesh.scale.y = easeBack(clamp01(state.sprout*1.5));
  sproutMesh.material.opacity = state.branches > 0.3 ? 1-state.branches : 1;

  // ── Apply: branches ──
  const totalB = branchMeshes.length;
  for (let i=0; i<totalB; i++) {
    const m = branchMeshes[i];
    const threshold = m.userData.order / totalB;
    const localT = clamp01((state.branches - threshold) / (1/totalB + 0.15));
    m.scale.y = easeInOut(localT);
  }

  // ── Apply: flowers ──
  flowerMat.opacity = state.flowers * state.flowerFade;
  // Animate individual flower scales
  const fAttr = flowerGeo.getAttribute('scale');
  for (let i=0; i<FLOWER_COUNT; i++) {
    const threshold = i/FLOWER_COUNT;
    const t = clamp01((state.flowers - threshold*0.6) / 0.4);
    fAttr.array[i] = easeBack(t) * state.flowerFade;
  }
  fAttr.needsUpdate = true;
  flowerMat.size = 0.18 + Math.sin(elapsed*2)*0.02; // gentle pulse

  // ── Apply: fruits ──
  for (let i=0; i<fruitMeshes.length; i++) {
    const t = clamp01((state.fruits - i/fruitMeshes.length*0.7)/0.3);
    const s = easeBack(t);
    fruitMeshes[i].scale.setScalar(s);
    // slight sway
    fruitMeshes[i].position.y += Math.sin(elapsed*1.5 + i)*0.0005;
  }

  // ── Apply: falling leaves ──
  leafMat.opacity = state.leaves * 0.85;
  if (state.leaves > 0.1) {
    const posAttr = leafGeo.getAttribute('position');
    for (let i=0; i<LEAF_COUNT; i++) {
      const v = leafVel[i];
      posAttr.array[i*3]   += v.vx + Math.sin(elapsed*0.8+v.phase)*0.008;
      posAttr.array[i*3+1] += v.vy * state.leaves;
      posAttr.array[i*3+2] += v.vz;
      if (posAttr.array[i*3+1] < -0.5) {
        posAttr.array[i*3]   = (Math.random()-.5)*10;
        posAttr.array[i*3+1] = 10 + Math.random()*4;
        posAttr.array[i*3+2] = (Math.random()-.5)*6;
      }
    }
    posAttr.needsUpdate = true;
  }

  // ── Ambient camera drift ──
  camera.position.x = Math.sin(elapsed*0.12)*1.5;
  camera.position.y = 4 + Math.sin(elapsed*0.08)*0.4;
  camera.lookAt(0, 4, 0);

  // ── Sky color by stage ──
  const skyColors = [
    new THREE.Color(0x050810),  // 发芽 — deep night
    new THREE.Color(0x0a1520),  // 生长 — dawn
    new THREE.Color(0x1a0a20),  // 开花 — dusk purple
    new THREE.Color(0x150a08),  // 结果 — warm dusk
    new THREE.Color(0x080808),  // 落叶 — dark
  ];
  const s1 = skyColors[Math.max(0,targetStage-1)] || skyColors[0];
  const s2 = skyColors[targetStage];
  scene.background = s1.clone().lerp(s2, state.leaves||state.fruits||state.flowers||state.branches||state.sprout);

  renderer.render(scene, camera);
});

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
