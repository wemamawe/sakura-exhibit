<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本命字 · 剑来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;overflow:hidden;touch-action:none}
canvas{display:block}
#playBtn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1s}
#playBtn .inner{text-align:center;color:#d4c8a0}
#playBtn .title{font:36px "Songti SC","SimSun","KaiTi",serif;letter-spacing:12px;margin-bottom:14px;
  text-shadow:0 0 30px rgba(255,200,80,.3)}
#playBtn .sub{font:14px "Songti SC","SimSun",serif;opacity:.45;margin-bottom:28px}
#playBtn .circle{width:70px;height:70px;border-radius:50%;
  border:1.5px solid rgba(212,200,160,.35);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#playBtn .circle:hover{background:rgba(212,200,160,.08);border-color:rgba(212,200,160,.6)}
#playBtn .tri{width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;
  border-left:20px solid rgba(212,200,160,.65);margin-left:4px}
</style>
</head>
<body>
<div id="playBtn"><div class="inner">
  <div class="title">本 命 字</div>
  <div class="sub">以文铸剑 · 双锋交击 · 字落如雨</div>
  <div class="circle"><div class="tri"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;
C.width=W;C.height=H;

// ═══════════════════════════════════════
//  经典文字
// ═══════════════════════════════════════
const TXT='学而时习之不亦说乎有朋自远方来不亦乐乎人不知而不愠不亦君子乎'+
'温故而知新可以为师矣学而不思则罔思而不学则殆'+
'己所不欲勿施于人君子坦荡荡小人长戚戚'+
'士不可以不弘毅任重而道远仁以为己任死而后已不亦远乎'+
'大学之道在明明德在亲民在止于至善'+
'格物致知诚意正心修身齐家治国平天下'+
'博学之审问之慎思之明辨之笃行之'+
'天将降大任于是人也必先苦其心志劳其筋骨'+
'富贵不能淫贫贱不能移威武不能屈此之谓大丈夫'+
'天行健君子以自强不息地势坤君子以厚德载物'+
'人心惟危道心惟微惟精惟一允执厥中';
const rc=()=>TXT[Math.floor(Math.random()*TXT.length)];

// ═══════════════════════════════════════
//  文字缓存
// ═══════════════════════════════════════
const SIZES=[9,11,13,15];
const ccache=new Map();
function getCC(ch,sz,hue,lit){
  const k=ch+'_'+sz+'_'+hue+'_'+lit;
  if(ccache.has(k))return ccache.get(k);
  const c=document.createElement('canvas');
  const s=sz*2.5;c.width=s;c.height=s;
  const x=c.getContext('2d');
  x.font=sz+'px "Songti SC","SimSun","KaiTi",serif';
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle='hsl('+hue+',80%,'+lit+'%)';
  x.fillText(ch,s/2,s/2);
  ccache.set(k,c);return c;
}
// 预热
for(let i=0;i<TXT.length;i++) SIZES.forEach(s=>{getCC(TXT[i],s,42,65);getCC(TXT[i],s,210,60);});

// ═══════════════════════════════════════
//  双剑系统
//  剑A：金色（儒剑），剑B：青蓝（道剑）
//  编排一系列交锋动作
// ═══════════════════════════════════════

// 剑的状态
const swords={
  a:{x:0,y:0,angle:0,len:0,hue:42,name:'儒'},  // 金色
  b:{x:0,y:0,angle:0,len:0,hue:210,name:'道'},  // 青蓝
};

// 交锋编排（关键帧）
// 每个 keyframe: {t, ax,ay,aa, bx,by,ba, clash:bool}
// 坐标用 0~1 归一化
const KF=[
  // 0s 入场：双剑从两侧飞入
  {t:0,   ax:-.2,ay:.5,aa:-0.3,  bx:1.2,by:.5,ba:Math.PI+0.3, clash:false},
  // 2s 第一次交锋
  {t:2,   ax:.35,ay:.4,aa:0.8,   bx:.65,by:.4,ba:Math.PI-0.8, clash:false},
  {t:2.5, ax:.48,ay:.38,aa:0.5,  bx:.52,by:.38,ba:Math.PI-0.5, clash:true},
  // 3s 弹开
  {t:3.2, ax:.25,ay:.25,aa:-0.6, bx:.75,by:.25,ba:Math.PI+0.6, clash:false},
  // 4s 交叉飞过
  {t:4,   ax:.7,ay:.55,aa:1.2,   bx:.3,by:.55,ba:Math.PI-1.2, clash:false},
  // 5s 第二次交锋（上方）
  {t:5,   ax:.45,ay:.25,aa:-0.3, bx:.55,by:.25,ba:Math.PI+0.3, clash:false},
  {t:5.4, ax:.49,ay:.22,aa:0.1,  bx:.51,by:.22,ba:Math.PI-0.1, clash:true},
  // 6s 螺旋分开
  {t:6.2, ax:.2,ay:.6,aa:2.0,    bx:.8,by:.3,ba:Math.PI-2.0, clash:false},
  // 7s 追击
  {t:7,   ax:.6,ay:.65,aa:0.4,   bx:.7,by:.35,ba:Math.PI+1.5, clash:false},
  // 7.5s 第三次交锋（右侧）
  {t:7.5, ax:.62,ay:.45,aa:0.9,  bx:.64,by:.42,ba:Math.PI-0.7, clash:true},
  // 8.5 大回旋
  {t:8.5, ax:.15,ay:.3,aa:-1.5,  bx:.85,by:.7,ba:Math.PI+1.0, clash:false},
  // 9.5 从下方对冲
  {t:9.5, ax:.3,ay:.75,aa:-0.8,  bx:.7,by:.75,ba:Math.PI+0.8, clash:false},
  {t:10,  ax:.48,ay:.5,aa:-0.2,  bx:.52,by:.5,ba:Math.PI+0.2, clash:true},
  // 10.5 最终交锋 — 两剑交叉定格
  {t:10.8,ax:.35,ay:.35,aa:0.6,  bx:.65,by:.35,ba:Math.PI-0.6, clash:false},
  {t:11.5,ax:.49,ay:.4,aa:0.78,  bx:.51,by:.4,ba:Math.PI-0.78, clash:true},
  // 12s 碎裂
  {t:12.5,ax:.49,ay:.4,aa:0.78,  bx:.51,by:.4,ba:Math.PI-0.78, clash:false},
  // 14s 归寂
  {t:16,  ax:.3,ay:1.3,aa:1.5,   bx:.7,by:1.3,ba:Math.PI-1.5, clash:false},
];

function lerpKF(t){
  // 找到当前所在的两个关键帧
  let i=0;
  while(i<KF.length-1&&KF[i+1].t<=t) i++;
  if(i>=KF.length-1) return KF[KF.length-1];
  const a=KF[i],b=KF[i+1];
  const p=(t-a.t)/(b.t-a.t);
  // smooth step
  const s=p*p*(3-2*p);
  return{
    ax:a.ax+(b.ax-a.ax)*s, ay:a.ay+(b.ay-a.ay)*s, aa:a.aa+(b.aa-a.aa)*s,
    bx:a.bx+(b.bx-a.bx)*s, by:a.by+(b.by-a.by)*s, ba:a.ba+(b.ba-a.ba)*s,
    clash:b.clash&&p>.85, // 接近下一帧时触发碰撞
  };
}

// 检测碰撞帧
function getClashes(t){
  const clashes=[];
  KF.forEach(kf=>{
    if(kf.clash&&Math.abs(t-kf.t)<.15){
      clashes.push({x:(kf.ax+kf.bx)/2*W, y:(kf.ay+kf.by)/2*H, strength:1-Math.abs(t-kf.t)/.15});
    }
  });
  return clashes;
}

// ═══════════════════════════════════════
//  绘制剑（文字构成）
// ═══════════════════════════════════════
function drawSword(x,y,angle,len,hue,alpha,t){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);

  const bladeW=len*.08;
  const bladeL=len;
  const guardW=len*.15;
  const handleL=len*.25;

  // 剑身光晕
  ctx.globalAlpha=alpha*.15;
  const glow=ctx.createLinearGradient(0,-bladeL,0,handleL);
  glow.addColorStop(0,'hsla('+hue+',80%,70%,1)');
  glow.addColorStop(.7,'hsla('+hue+',60%,50%,.5)');
  glow.addColorStop(1,'hsla('+hue+',40%,30%,0)');
  ctx.fillStyle=glow;
  ctx.beginPath();
  ctx.moveTo(0,-bladeL-10);
  ctx.lineTo(-bladeW*1.5,-bladeL*.3);
  ctx.lineTo(-bladeW*1.5,0);
  ctx.lineTo(bladeW*1.5,0);
  ctx.lineTo(bladeW*1.5,-bladeL*.3);
  ctx.closePath();
  ctx.fill();

  // 剑身轮廓（极淡）
  ctx.globalAlpha=alpha*.08;
  ctx.strokeStyle='hsla('+hue+',70%,75%,1)';
  ctx.lineWidth=1;
  ctx.beginPath();
  // 剑尖
  ctx.moveTo(0,-bladeL);
  // 左刃
  ctx.lineTo(-bladeW*.4,-bladeL*.85);
  ctx.lineTo(-bladeW,-bladeL*.1);
  // 护手
  ctx.lineTo(-guardW,2);
  ctx.lineTo(-guardW,6);
  ctx.lineTo(-bladeW*.5,6);
  // 剑柄
  ctx.lineTo(-bladeW*.4,handleL);
  ctx.lineTo(bladeW*.4,handleL);
  // 右侧对称
  ctx.lineTo(bladeW*.5,6);
  ctx.lineTo(guardW,6);
  ctx.lineTo(guardW,2);
  ctx.lineTo(bladeW,-bladeL*.1);
  ctx.lineTo(bladeW*.4,-bladeL*.85);
  ctx.closePath();
  ctx.stroke();

  // 剑脊线
  ctx.beginPath();
  ctx.moveTo(0,-bladeL);
  ctx.lineTo(0,0);
  ctx.strokeStyle='hsla('+hue+',60%,65%,.06)';
  ctx.lineWidth=.5;
  ctx.stroke();

  // 文字填充剑身
  ctx.globalAlpha=alpha;
  const charCount=Math.floor(bladeL/8);
  for(let i=0;i<charCount;i++){
    const ct=i/charCount;
    // 沿剑身分布
    const cy=-bladeL*ct;
    // 剑身宽度在该位置
    let localW;
    if(ct<.1) localW=bladeW*.4*ct/.1; // 尖端
    else if(ct<.85) localW=bladeW*(0.4+0.6*Math.min(1,(ct-.1)/.2));
    else localW=bladeW;
    const cols=Math.max(1,Math.floor(localW*2/9));
    for(let j=0;j<cols;j++){
      const cx=-localW+(j+.5)*localW*2/cols;
      const ch=rc();
      const sz=SIZES[Math.floor(Math.random()*SIZES.length)];
      const lit=55+Math.floor(ct*20); // 尖端更亮
      const shimmer=Math.sin(t*3+i*.5+j)*.08;
      ctx.globalAlpha=alpha*(.4+ct*.4+shimmer);
      const cc=getCC(ch,sz,hue,lit);
      const hs=cc.width/2;
      ctx.drawImage(cc,cx-hs,cy-hs);
    }
  }

  // 护手上的文字
  ctx.globalAlpha=alpha*.5;
  for(let j=-2;j<=2;j++){
    const ch=rc();
    const cc=getCC(ch,10,hue,70);
    ctx.drawImage(cc,j*10-cc.width/2,0-cc.height/2);
  }

  ctx.restore();
}

// ═══════════════════════════════════════
//  落字粒子系统
// ═══════════════════════════════════════
const MAX_FALL=2000;
// 用struct of arrays
const fx=new Float32Array(MAX_FALL);
const fy=new Float32Array(MAX_FALL);
const fvx=new Float32Array(MAX_FALL);
const fvy=new Float32Array(MAX_FALL);
const fa=new Float32Array(MAX_FALL);  // alpha
const frot=new Float32Array(MAX_FALL);
const frotv=new Float32Array(MAX_FALL);
const fph=new Float32Array(MAX_FALL); // wobble phase
const fhue=new Uint16Array(MAX_FALL);
const fcache=new Array(MAX_FALL);
let fcount=0;

function spawnFallingChars(cx,cy,count,hueA,hueB,strength){
  for(let i=0;i<count&&fcount<MAX_FALL;i++){
    const idx=fcount;
    const a=Math.random()*Math.PI*2;
    const spd=(2+Math.random()*6)*strength;
    fx[idx]=cx+(Math.random()-.5)*20;
    fy[idx]=cy+(Math.random()-.5)*20;
    fvx[idx]=Math.cos(a)*spd;
    fvy[idx]=Math.sin(a)*spd-1;// 微微向上喷
    fa[idx]=.6+Math.random()*.3;
    frot[idx]=Math.random()*Math.PI*2;
    frotv[idx]=(Math.random()-.5)*.06;
    fph[idx]=Math.random()*Math.PI*2;
    const hue=Math.random()<.5?hueA:hueB;
    fhue[idx]=hue;
    const ch=rc();
    const sz=SIZES[Math.floor(Math.random()*SIZES.length)];
    const lit=55+Math.floor(Math.random()*25);
    fcache[idx]=getCC(ch,sz,hue,lit);
    fcount++;
  }
}

function updateFallingChars(){
  let alive=0;
  for(let i=0;i<fcount;i++){
    fvx[i]*=.985;
    fvy[i]+=.035; // 重力
    fvy[i]*=.995;
    fx[i]+=fvx[i]+Math.sin(fph[i])*.3; // 飘摆
    fy[i]+=fvy[i];
    frot[i]+=frotv[i];
    frotv[i]*=.998;
    fph[i]+=.02+Math.random()*.01;
    fa[i]-=.0015;
    // 存活判断
    if(fa[i]>.01&&fy[i]<H+50){
      if(alive!==i){
        fx[alive]=fx[i];fy[alive]=fy[i];
        fvx[alive]=fvx[i];fvy[alive]=fvy[i];
        fa[alive]=fa[i];frot[alive]=frot[i];frotv[alive]=frotv[i];
        fph[alive]=fph[i];fhue[alive]=fhue[i];fcache[alive]=fcache[i];
      }
      alive++;
    }
  }
  fcount=alive;
}

function drawFallingChars(){
  for(let i=0;i<fcount;i++){
    if(fa[i]<.02)continue;
    const cc=fcache[i];
    const hs=cc.width/2;
    ctx.globalAlpha=fa[i];
    if(Math.abs(frot[i])>.01){
      ctx.save();
      ctx.translate(fx[i],fy[i]);
      ctx.rotate(frot[i]);
      ctx.drawImage(cc,-hs,-hs);
      ctx.restore();
    }else{
      ctx.drawImage(cc,fx[i]-hs,fy[i]-hs);
    }
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  火花
// ═══════════════════════════════════════
const MAX_SP=300;
const spx=new Float32Array(MAX_SP);
const spy=new Float32Array(MAX_SP);
const spvx=new Float32Array(MAX_SP);
const spvy=new Float32Array(MAX_SP);
const spl=new Float32Array(MAX_SP); // life
const spr=new Float32Array(MAX_SP);
const sphue=new Uint16Array(MAX_SP);
let spc=0;

function addSparks(cx,cy,n,hueA,hueB){
  for(let i=0;i<n&&spc<MAX_SP;i++){
    const a=Math.random()*Math.PI*2;
    const s=4+Math.random()*12;
    spx[spc]=cx;spy[spc]=cy;
    spvx[spc]=Math.cos(a)*s;spvy[spc]=Math.sin(a)*s;
    spl[spc]=1;spr[spc]=1+Math.random()*2.5;
    sphue[spc]=Math.random()<.5?hueA:hueB;
    spc++;
  }
}

function updateDrawSparks(){
  let alive=0;
  for(let i=0;i<spc;i++){
    spx[i]+=spvx[i];spy[i]+=spvy[i];
    spvx[i]*=.94;spvy[i]*=.94;spvy[i]+=.06;
    spl[i]-=.02;
    if(spl[i]<=0)continue;
    ctx.beginPath();
    ctx.arc(spx[i],spy[i],spr[i]*spl[i],0,Math.PI*2);
    ctx.fillStyle='hsla('+sphue[i]+',100%,75%,'+spl[i]*.8+')';
    ctx.fill();
    // 尾迹
    ctx.beginPath();
    ctx.moveTo(spx[i],spy[i]);
    ctx.lineTo(spx[i]-spvx[i]*2,spy[i]-spvy[i]*2);
    ctx.strokeStyle='hsla('+sphue[i]+',90%,65%,'+spl[i]*.3+')';
    ctx.lineWidth=spr[i]*spl[i]*.5;
    ctx.stroke();
    if(alive!==i){spx[alive]=spx[i];spy[alive]=spy[i];spvx[alive]=spvx[i];spvy[alive]=spvy[i];spl[alive]=spl[i];spr[alive]=spr[i];sphue[alive]=sphue[i];}
    alive++;
  }
  spc=alive;
}

// ═══════════════════════════════════════
//  剑气残影
// ═══════════════════════════════════════
const TRAIL_LEN=12;
const trailA=Array.from({length:TRAIL_LEN},()=>({x:0,y:0,a:0}));
const trailB=Array.from({length:TRAIL_LEN},()=>({x:0,y:0,a:0}));

function pushTrail(trail,x,y,angle){
  trail.pop();
  trail.unshift({x,y,a:angle});
}

function drawTrail(trail,hue){
  ctx.lineWidth=2;ctx.lineCap='round';
  for(let i=1;i<trail.length;i++){
    const a=1-i/trail.length;
    ctx.globalAlpha=a*.12;
    ctx.strokeStyle='hsla('+hue+',70%,65%,1)';
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  背景：文字雨（稀疏的底层氛围）
// ═══════════════════════════════════════
const BG_COUNT=80;
const bgx=new Float32Array(BG_COUNT);
const bgy=new Float32Array(BG_COUNT);
const bgvy=new Float32Array(BG_COUNT);
const bga=new Float32Array(BG_COUNT);
const bgcc=new Array(BG_COUNT);
for(let i=0;i<BG_COUNT;i++){
  bgx[i]=Math.random()*W;
  bgy[i]=Math.random()*H;
  bgvy[i]=.3+Math.random()*.6;
  bga[i]=.04+Math.random()*.08;
  bgcc[i]=getCC(rc(),SIZES[Math.floor(Math.random()*SIZES.length)],42,40);
}

function drawBgRain(){
  for(let i=0;i<BG_COUNT;i++){
    bgy[i]+=bgvy[i];
    if(bgy[i]>H+20){bgy[i]=-20;bgx[i]=Math.random()*W;}
    ctx.globalAlpha=bga[i];
    ctx.drawImage(bgcc[i],bgx[i],bgy[i]);
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  主循环
// ═══════════════════════════════════════
let started=false,startTime=0,frame=0;
let lastClashFrame=-999;
const swordLen=()=>Math.min(W,H)*.18;

function tick(){
  requestAnimationFrame(tick);
  frame++;
  if(!started){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);return;}

  const t=(performance.now()-startTime)/1000;

  // 清屏
  ctx.fillStyle='#080810';
  ctx.fillRect(0,0,W,H);

  // 背景文字雨
  drawBgRain();

  // 剑碎裂后的阶段
  const shattered=t>12.5;
  const swordAlpha=shattered?Math.max(0,1-(t-12.5)/1.5):Math.min(1,t/1.5);

  if(!shattered||t<14){
    // 插值剑的位置
    const kf=lerpKF(Math.min(t,12.5));
    const sl=swordLen();

    swords.a.x=kf.ax*W; swords.a.y=kf.ay*H; swords.a.angle=kf.aa; swords.a.len=sl;
    swords.b.x=kf.bx*W; swords.b.y=kf.by*H; swords.b.angle=kf.ba; swords.b.len=sl;

    // 残影
    pushTrail(trailA,swords.a.x,swords.a.y,swords.a.angle);
    pushTrail(trailB,swords.b.x,swords.b.y,swords.b.angle);
    drawTrail(trailA,42);
    drawTrail(trailB,210);

    // 画剑
    drawSword(swords.a.x,swords.a.y,swords.a.angle,swords.a.len,42,swordAlpha,t);
    drawSword(swords.b.x,swords.b.y,swords.b.angle,swords.b.len,210,swordAlpha,t);

    // 碰撞检测
    const clashes=getClashes(t);
    clashes.forEach(cl=>{
      if(frame-lastClashFrame>8){
        lastClashFrame=frame;
        // 文字迸溅
        spawnFallingChars(cl.x,cl.y,40+Math.floor(cl.strength*30),42,210,cl.strength);
        // 火花
        addSparks(cl.x,cl.y,15+Math.floor(cl.strength*15),42,210);
      }
    });

    // 碰撞闪光
    clashes.forEach(cl=>{
      if(cl.strength>.3){
        const g=ctx.createRadialGradient(cl.x,cl.y,2,cl.x,cl.y,150*cl.strength);
        g.addColorStop(0,'rgba(255,255,230,'+cl.strength*.4+')');
        g.addColorStop(.3,'rgba(255,220,150,'+cl.strength*.15+')');
        g.addColorStop(1,'rgba(200,150,80,0)');
        ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      }
    });
  }

  // 碎裂时大爆发
  if(t>12.3&&t<12.7&&frame%2===0){
    spawnFallingChars(W*.5,H*.4,25,42,210,1.2);
    addSparks(W*.5,H*.4,10,42,210);
  }

  // 更新 & 绘制落字
  updateFallingChars();
  drawFallingChars();
  updateDrawSparks();

  // 「儒」字蓄势
  if(t>.3&&t<3){
    const ra=t<1?(t-.3)/.7:Math.max(0,1-(t-1.5)/1.5);
    ctx.save();ctx.globalAlpha=ra*.4;
    ctx.font='100px "Songti SC","SimSun","KaiTi",serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,200,50,.4)';ctx.shadowBlur=35;
    ctx.fillStyle='rgba(255,215,80,1)';
    ctx.fillText('儒',W/2,H/2);
    ctx.shadowBlur=0;ctx.restore();
  }

  // 暗角
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.15,W/2,H/2,Math.max(W,H)*.7);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // 结尾文字
  if(t>15){
    const ea=Math.min(.5,(t-15)/3);
    ctx.save();ctx.globalAlpha=ea;ctx.textAlign='center';
    ctx.font='24px "Songti SC","SimSun","KaiTi",serif';
    ctx.fillStyle='rgba(200,180,120,1)';
    ctx.fillText('以文铸剑  双锋交击  字落如雨',W/2,H/2-15);
    ctx.font='14px "Songti SC","SimSun",serif';
    ctx.globalAlpha=ea*.6;ctx.fillStyle='rgba(160,145,100,1)';
    ctx.fillText('— 剑来 · 本命字',W/2,H/2+15);
    ctx.restore();
  }
}

document.getElementById('playBtn').addEventListener('click',()=>{
  const btn=document.getElementById('playBtn');
  btn.style.opacity='0';setTimeout(()=>btn.style.display='none',1000);
  started=true;startTime=performance.now();
  initAudio();
},{once:true});

window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;C.width=W;C.height=H;});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

tick();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudio(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.12;m.connect(ac.destination);

  // 底噪 drone
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=45;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.06,ac.currentTime+2);
  dg.gain.setValueAtTime(.06,ac.currentTime+12);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+16);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=100;
  dr.connect(lp);lp.connect(dg);dg.connect(m);
  dr.start();dr.stop(ac.currentTime+18);

  // 碰撞音效（每次碰撞时间点）
  const clashTimes=[2.5,5.4,7.5,10,11.5,12.5];
  clashTimes.forEach(ct=>{
    setTimeout(()=>{
      // 金属碰撞
      const sz=ac.sampleRate*.08;
      const b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/sz*8);
      const s=ac.createBufferSource();s.buffer=b;
      const g=ac.createGain();g.gain.value=.2;
      s.connect(g);g.connect(m);s.start();
      // 金属共鸣
      const ring=ac.createOscillator(),rg=ac.createGain();
      ring.type='sine';ring.frequency.value=800+Math.random()*400;
      rg.gain.setValueAtTime(.08,ac.currentTime);
      rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);
      ring.connect(rg);rg.connect(m);ring.start();ring.stop(ac.currentTime+.5);
    },ct*1000);
  });

  // 12.5s 大碎裂
  setTimeout(()=>{
    const sz=ac.sampleRate*.5,b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/sz*4);
    const s=ac.createBufferSource();s.buffer=b;
    const g=ac.createGain();g.gain.value=.35;
    s.connect(g);g.connect(m);s.start();
    // 低频冲击
    const imp=ac.createOscillator(),ig=ac.createGain();
    imp.type='sine';imp.frequency.setValueAtTime(100,ac.currentTime);
    imp.frequency.exponentialRampToValueAtTime(20,ac.currentTime+.6);
    ig.gain.setValueAtTime(.3,ac.currentTime);
    ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+1);
    imp.connect(ig);ig.connect(m);imp.start();imp.stop(ac.currentTime+1.2);
  },12500);

  // 余韵
  setTimeout(()=>{
    [196,294,392,523].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.4);
      g.gain.linearRampToValueAtTime(.025,ac.currentTime+i*.4+.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
      o.connect(g);g.connect(m);
      o.start(ac.currentTime+i*.4);o.stop(ac.currentTime+5);
    });
  },13000);
}
</script>
