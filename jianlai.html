<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本命字 · 剑来</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;overflow:hidden;touch-action:none}
canvas{display:block}
#playBtn{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1.2s}
#playBtn .inner{text-align:center;color:#d4c8a0}
#playBtn .title{font:38px "Songti SC","SimSun","KaiTi",serif;letter-spacing:14px;margin-bottom:14px;
  text-shadow:0 0 40px rgba(255,200,80,.3)}
#playBtn .sub{font:13px "Songti SC","SimSun",serif;opacity:.4;margin-bottom:30px;letter-spacing:4px}
#playBtn .circle{width:72px;height:72px;border-radius:50%;
  border:1.5px solid rgba(212,200,160,.3);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#playBtn .circle:hover{background:rgba(212,200,160,.08)}
#playBtn .tri{width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;
  border-left:22px solid rgba(212,200,160,.6);margin-left:5px}
</style>
</head>
<body>
<div id="playBtn"><div class="inner">
  <div class="title">本 命 字</div>
  <div class="sub">蓄势 · 凝形 · 厮杀 · 落字 · 归无</div>
  <div class="circle"><div class="tri"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;C.width=W;C.height=H;

// ═══════════════════════════════════════
//  经典
// ═══════════════════════════════════════
const TXT='学而时习之不亦说乎有朋自远方来不亦乐乎人不知而不愠不亦君子乎'+
'温故而知新可以为师矣学而不思则罔思而不学则殆'+
'己所不欲勿施于人君子坦荡荡小人长戚戚'+
'士不可以不弘毅任重而道远仁以为己任死而后已不亦远乎'+
'大学之道在明明德在亲民在止于至善'+
'格物致知诚意正心修身齐家治国平天下'+
'天命之谓性率性之谓道修道之谓教'+
'博学之审问之慎思之明辨之笃行之'+
'天将降大任于是人也必先苦其心志劳其筋骨'+
'富贵不能淫贫贱不能移威武不能屈此之谓大丈夫'+
'天行健君子以自强不息地势坤君子以厚德载物'+
'人心惟危道心惟微惟精惟一允执厥中'+
'穷则独善其身达则兼善天下民为贵社稷次之君为轻';
const rc=()=>TXT[Math.floor(Math.random()*TXT.length)];

// 文字缓存
const SZ=[8,10,12,14,16,20];
const ccm=new Map();
function gCC(ch,sz,hue,lit){
  const k=ch+sz+hue+lit;if(ccm.has(k))return ccm.get(k);
  const c=document.createElement('canvas'),s=Math.ceil(sz*2.5);c.width=s;c.height=s;
  const x=c.getContext('2d');
  x.font=sz+'px "Songti SC","SimSun","KaiTi",serif';
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle='hsl('+hue+',80%,'+lit+'%)';
  x.fillText(ch,s/2,s/2);
  ccm.set(k,c);return c;
}
for(let i=0;i<TXT.length;i++)SZ.forEach(s=>{gCC(TXT[i],s,42,65);gCC(TXT[i],s,210,60);gCC(TXT[i],s,42,40);});

// ═══════════════════════════════════════
//  时间轴（秒）
//  0-5    蓄势：文字暴雨
//  5-9    凝形：汇聚成双剑（镜头近景→远景）
//  9-17   厮杀：交锋碰撞
//  17-21  落字：密集碰撞大量落字
//  21+    归无：碎裂散尽
// ═══════════════════════════════════════

// ═══════════════════════════════════════
//  文字雨粒子（蓄势+凝形+剑身粒子共用）
// ═══════════════════════════════════════
const N=1500;
const px=new Float32Array(N),py=new Float32Array(N);
const pvx=new Float32Array(N),pvy=new Float32Array(N);
const pa=new Float32Array(N);
const pst=new Uint8Array(N); // 0rain 1gather 2insword
const ptx=new Float32Array(N),pty=new Float32Array(N);
const psd=new Uint8Array(N); // 0=A 1=B
const pcc=new Array(N);
const prot=new Float32Array(N);
const protv=new Float32Array(N);
for(let i=0;i<N;i++){
  px[i]=Math.random()*W;
  py[i]=-Math.random()*H*3;
  pvx[i]=(Math.random()-.5)*.4;
  pvy[i]=2+Math.random()*4;
  pa[i]=.08+Math.random()*.35;
  pst[i]=0;
  psd[i]=i<N/2?0:1;
  const hue=psd[i]===0?42:210;
  const sz=SZ[Math.floor(Math.random()*SZ.length)];
  pcc[i]=gCC(rc(),sz,hue,50+Math.floor(Math.random()*25));
  prot[i]=(Math.random()-.5)*.2;
  protv[i]=(Math.random()-.5)*.01;
}

// ═══════════════════════════════════════
//  剑绘制（带镜头缩放）
// ═══════════════════════════════════════
// 剑的基础长度（很大）
function baseSwordLen(){return Math.min(W,H)*.42;}

// 镜头 zoom：凝形阶段先看细节（zoom大），慢慢拉远
// zoom=3 → 看到剑身局部文字细节
// zoom=1 → 看到完整的剑
function getZoom(t){
  if(t<5) return 1; // 雨阶段不缩放
  if(t<6) return 1+2*((t-5)/1); // 5-6s 推近
  if(t<8) return 3; // 6-8s 停在近景
  if(t<10) return 3-2*((t-8)/2); // 8-10s 拉远
  return 1;
}

function drawTextSword(cx,cy,angle,len,hue,alpha,t,zoom){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);

  const bw=len*.07;
  const bl=len;

  // 剑身光晕
  ctx.globalAlpha=alpha*.15;
  const g1=ctx.createLinearGradient(0,-bl*1.05,0,bl*.15);
  g1.addColorStop(0,'hsla('+hue+',90%,80%,1)');
  g1.addColorStop(.4,'hsla('+hue+',70%,60%,.6)');
  g1.addColorStop(1,'hsla('+hue+',50%,40%,0)');
  ctx.fillStyle=g1;
  ctx.beginPath();
  ctx.moveTo(0,-bl*1.05);
  ctx.lineTo(-bw*2.5,-bl*.35);
  ctx.lineTo(-bw*2.5,0);
  ctx.lineTo(bw*2.5,0);
  ctx.lineTo(bw*2.5,-bl*.35);
  ctx.closePath();
  ctx.fill();

  // 剑身轮廓
  ctx.globalAlpha=alpha*.08;
  ctx.strokeStyle='hsla('+hue+',70%,75%,1)';
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(0,-bl); // 尖端
  ctx.lineTo(-bw*.3,-bl*.92);
  ctx.lineTo(-bw,-bl*.12);
  ctx.lineTo(-bw*1.8,2);
  ctx.lineTo(-bw*1.8,10);
  ctx.lineTo(-bw*.45,10);
  ctx.lineTo(-bw*.38,bl*.18);
  ctx.lineTo(bw*.38,bl*.18);
  ctx.lineTo(bw*.45,10);
  ctx.lineTo(bw*1.8,10);
  ctx.lineTo(bw*1.8,2);
  ctx.lineTo(bw,-bl*.12);
  ctx.lineTo(bw*.3,-bl*.92);
  ctx.closePath();
  ctx.stroke();
  // 剑脊
  ctx.globalAlpha=alpha*.04;
  ctx.beginPath();ctx.moveTo(0,-bl);ctx.lineTo(0,0);
  ctx.strokeStyle='hsla('+hue+',60%,70%,1)';ctx.lineWidth=.6;ctx.stroke();

  // 文字填充：zoom 大时文字更多更密（看细节）
  const density=Math.max(1,zoom);
  const step=Math.max(5,10/density);
  const rows=Math.floor(bl/step);
  for(let i=0;i<rows;i++){
    const ct=i/rows; // 0=柄端 1=尖端
    const cy2=-bl*ct;
    let localW;
    if(ct>.95) localW=bw*.2;
    else if(ct>.12) localW=bw*(.3+.7*Math.min(1,(ct-.12)/.15));
    else localW=bw*1.5;
    const cols=Math.max(1,Math.floor(localW*2/step));
    for(let j=0;j<cols;j++){
      const cx2=-localW+(j+.5)*(localW*2)/cols;
      const ch=rc();
      const szIdx=zoom>2?Math.floor(Math.random()*SZ.length):Math.min(SZ.length-1,Math.floor(Math.random()*4));
      const sz=SZ[szIdx];
      const lit=45+Math.floor(ct*28);
      const shimmer=Math.sin(t*3.5+i*.7+j*1.3)*.08;
      ctx.globalAlpha=alpha*(.3+ct*.45+shimmer);
      const c=gCC(ch,sz,hue,lit);
      ctx.drawImage(c,cx2-c.width/2,cy2-c.height/2);
    }
  }

  // 护手文字
  ctx.globalAlpha=alpha*.5;
  for(let j=-3;j<=3;j++){
    const c=gCC(rc(),12,hue,70);
    ctx.drawImage(c,j*10-c.width/2,4-c.height/2);
  }

  ctx.restore();
}

// 剑身上的采样点
function swordPoints(cx,cy,angle,len,count){
  const pts=[];
  const bw=len*.07;
  const cos=Math.cos(angle),sin=Math.sin(angle);
  for(let i=0;i<count;i++){
    const t=Math.random();
    const yL=-len*(1-t);
    let w;
    if(t>.95)w=bw*.2;
    else if(t>.12)w=bw;
    else w=bw*1.5;
    const xL=(Math.random()-.5)*w*2;
    pts.push({x:cx+xL*cos-yL*sin, y:cy+xL*sin+yL*cos});
  }
  return pts;
}

// ═══════════════════════════════════════
//  落字粒子
// ═══════════════════════════════════════
const FM=3000;
const fx=new Float32Array(FM),fy=new Float32Array(FM);
const fvx=new Float32Array(FM),fvy=new Float32Array(FM);
const fa=new Float32Array(FM);
const fr=new Float32Array(FM),frv=new Float32Array(FM),fph=new Float32Array(FM);
const fcc=new Array(FM);
let fc=0;

function spawnFall(cx,cy,n,str){
  for(let i=0;i<n&&fc<FM;i++){
    const a=Math.random()*Math.PI*2;
    const s=(2+Math.random()*7)*str;
    fx[fc]=cx+(Math.random()-.5)*20;
    fy[fc]=cy+(Math.random()-.5)*20;
    fvx[fc]=Math.cos(a)*s;
    fvy[fc]=Math.sin(a)*s-2;
    fa[fc]=.55+Math.random()*.35;
    fr[fc]=Math.random()*Math.PI*2;
    frv[fc]=(Math.random()-.5)*.05;
    fph[fc]=Math.random()*Math.PI*2;
    const hue=Math.random()<.5?42:210;
    const sz=SZ[Math.floor(Math.random()*SZ.length)];
    fcc[fc]=gCC(rc(),sz,hue,50+Math.floor(Math.random()*25));
    fc++;
  }
}

function updateDrawFall(){
  let alive=0;
  for(let i=0;i<fc;i++){
    fvx[i]*=.988;fvy[i]+=.03;fvy[i]*=.998;
    fx[i]+=fvx[i]+Math.sin(fph[i])*.25;
    fy[i]+=fvy[i];
    fr[i]+=frv[i];frv[i]*=.999;fph[i]+=.018;
    fa[i]-=.0012;
    if(fa[i]<.02||fy[i]>H+60)continue;
    const c=fcc[i],hs=c.width/2;
    ctx.globalAlpha=fa[i];
    ctx.save();ctx.translate(fx[i],fy[i]);ctx.rotate(fr[i]);
    ctx.drawImage(c,-hs,-hs);ctx.restore();
    if(alive!==i){fx[alive]=fx[i];fy[alive]=fy[i];fvx[alive]=fvx[i];fvy[alive]=fvy[i];
      fa[alive]=fa[i];fr[alive]=fr[i];frv[alive]=frv[i];fph[alive]=fph[i];fcc[alive]=fcc[i];}
    alive++;
  }
  fc=alive;
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  火花
// ═══════════════════════════════════════
const SM=300;
const sx2=new Float32Array(SM),sy2=new Float32Array(SM);
const svx2=new Float32Array(SM),svy2=new Float32Array(SM);
const sl2=new Float32Array(SM),sr2=new Float32Array(SM),sh2=new Uint16Array(SM);
let sc2=0;
function addSpark(cx,cy,n){
  for(let i=0;i<n&&sc2<SM;i++){
    const a=Math.random()*Math.PI*2,s=5+Math.random()*14;
    sx2[sc2]=cx;sy2[sc2]=cy;
    svx2[sc2]=Math.cos(a)*s;svy2[sc2]=Math.sin(a)*s;
    sl2[sc2]=1;sr2[sc2]=1+Math.random()*2.5;
    sh2[sc2]=Math.random()<.5?42:210;
    sc2++;
  }
}
function drawSparks(){
  let alive=0;
  for(let i=0;i<sc2;i++){
    sx2[i]+=svx2[i];sy2[i]+=svy2[i];
    svx2[i]*=.93;svy2[i]*=.93;svy2[i]+=.07;
    sl2[i]-=.02;
    if(sl2[i]<=0)continue;
    ctx.beginPath();ctx.arc(sx2[i],sy2[i],sr2[i]*sl2[i],0,Math.PI*2);
    ctx.fillStyle='hsla('+sh2[i]+',100%,75%,'+sl2[i]*.8+')';ctx.fill();
    ctx.beginPath();ctx.moveTo(sx2[i],sy2[i]);
    ctx.lineTo(sx2[i]-svx2[i]*2,sy2[i]-svy2[i]*2);
    ctx.strokeStyle='hsla('+sh2[i]+',90%,60%,'+sl2[i]*.3+')';
    ctx.lineWidth=sr2[i]*sl2[i]*.5;ctx.stroke();
    if(alive!==i){sx2[alive]=sx2[i];sy2[alive]=sy2[i];svx2[alive]=svx2[i];svy2[alive]=svy2[i];
      sl2[alive]=sl2[i];sr2[alive]=sr2[i];sh2[alive]=sh2[i];}
    alive++;
  }
  sc2=alive;
}

// ═══════════════════════════════════════
//  剑气残影
// ═══════════════════════════════════════
const TL=15;
const tA=[],tB=[];
for(let i=0;i<TL;i++){tA.push({x:-99,y:-99});tB.push({x:-99,y:-99});}
function pushT(tr,x,y){tr.pop();tr.unshift({x,y});}
function drawTrail(tr,hue){
  for(let i=1;i<tr.length;i++){
    if(tr[i].x<-50)continue;
    const a=(1-i/tr.length)*.12;
    ctx.globalAlpha=a;
    ctx.strokeStyle='hsla('+hue+',70%,65%,1)';
    ctx.lineWidth=2.5-i*.15;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tr[i-1].x,tr[i-1].y);ctx.lineTo(tr[i].x,tr[i].y);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  背景：稀疏文字雨（全程氛围）
// ═══════════════════════════════════════
const BN=100;
const bx=new Float32Array(BN),by=new Float32Array(BN);
const bvy=new Float32Array(BN),ba=new Float32Array(BN);
const bcc=new Array(BN);
for(let i=0;i<BN;i++){
  bx[i]=Math.random()*W;by[i]=Math.random()*H;
  bvy[i]=.2+Math.random()*.5;
  ba[i]=.03+Math.random()*.06;
  bcc[i]=gCC(rc(),SZ[Math.floor(Math.random()*3)],42,35);
}
function drawBg(){
  for(let i=0;i<BN;i++){
    by[i]+=bvy[i];if(by[i]>H+20){by[i]=-20;bx[i]=Math.random()*W;}
    ctx.globalAlpha=ba[i];
    ctx.drawImage(bcc[i],bx[i],by[i]);
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  交锋关键帧
//  坐标 0-1 归一化，sc 是大小缩放
//  所有关键帧时间连续，不留空白
// ═══════════════════════════════════════
// 所有坐标严格限制在 .3~.7 范围，确保巨剑始终在屏幕内
// 非碰撞帧只是短暂弹开（小距离），不飞到边缘
const KF=[
  // 凝形完毕，双剑初现
  {t:8,   ax:.38,ay:.45,aa:-.78, bx:.62,by:.45,ba:Math.PI+.78},
  // ── 厮杀 ──
  // 第1击：正面冲
  {t:9.3, ax:.45,ay:.42,aa:.5,   bx:.55,by:.42,ba:Math.PI-.5, clash:true},
  // 弹开（短距离）
  {t:9.8, ax:.38,ay:.38,aa:-.3,  bx:.62,by:.48,ba:Math.PI+.3},
  // 第2击：斜劈
  {t:10.5,ax:.47,ay:.4,aa:1.0,   bx:.53,by:.45,ba:Math.PI-1.0, clash:true},
  // 弹开
  {t:11,  ax:.4,ay:.5,aa:-.6,    bx:.6,by:.35,ba:Math.PI+.6},
  // 第3击：交叉
  {t:11.8,ax:.48,ay:.38,aa:.7,   bx:.52,by:.38,ba:Math.PI-.7, clash:true},
  // 弹开旋转
  {t:12.3,ax:.42,ay:.35,aa:1.5,  bx:.58,by:.5,ba:Math.PI-1.5},
  // 第4击：从上劈下
  {t:13,  ax:.46,ay:.4,aa:-.5,    bx:.54,by:.4,ba:Math.PI+.5, clash:true},
  // 弹开
  {t:13.5,ax:.38,ay:.45,aa:.8,   bx:.62,by:.4,ba:Math.PI-.8},
  // 第5击：侧击
  {t:14.2,ax:.47,ay:.42,aa:.4,   bx:.53,by:.42,ba:Math.PI-.4, clash:true},
  // 弹开
  {t:14.7,ax:.42,ay:.5,aa:-1.0,  bx:.58,by:.35,ba:Math.PI+1.0},
  // 第6击：重击
  {t:15.5,ax:.48,ay:.4,aa:.6,    bx:.52,by:.4,ba:Math.PI-.6, clash:true},
  // 微弹
  {t:15.9,ax:.44,ay:.38,aa:-.4,  bx:.56,by:.45,ba:Math.PI+.4},
  // 第7击
  {t:16.5,ax:.47,ay:.42,aa:.9,   bx:.53,by:.42,ba:Math.PI-.9, clash:true},
  // ── 落字：更密集 ──
  // 微弹
  {t:16.8,ax:.43,ay:.45,aa:-1.2, bx:.57,by:.38,ba:Math.PI+1.2},
  // 第8击
  {t:17.3,ax:.49,ay:.4,aa:.3,    bx:.51,by:.4,ba:Math.PI-.3, clash:true},
  // 极短弹开
  {t:17.6,ax:.45,ay:.42,aa:.8,   bx:.55,by:.4,ba:Math.PI-.8},
  // 第9击
  {t:18,  ax:.48,ay:.41,aa:-.5,  bx:.52,by:.41,ba:Math.PI+.5, clash:true},
  // 极短弹开
  {t:18.3,ax:.44,ay:.38,aa:1.1,  bx:.56,by:.45,ba:Math.PI-1.1},
  // 第10击
  {t:18.7,ax:.49,ay:.4,aa:.6,    bx:.51,by:.4,ba:Math.PI-.6, clash:true},
  // 极短
  {t:19,  ax:.46,ay:.43,aa:-.7,  bx:.54,by:.4,ba:Math.PI+.7},
  // 第11击
  {t:19.4,ax:.48,ay:.41,aa:.4,   bx:.52,by:.41,ba:Math.PI-.4, clash:true},
  // 第12击：最后一击——交叉定格
  {t:20,  ax:.49,ay:.42,aa:.78,   bx:.51,by:.42,ba:Math.PI-.78, clash:true},
  // 定格
  {t:20.5,ax:.49,ay:.42,aa:.78,  bx:.51,by:.42,ba:Math.PI-.78},
  // 归无
  {t:22,  ax:.49,ay:.42,aa:.78,  bx:.51,by:.42,ba:Math.PI-.78},
];

function lerpKF(t){
  let i=0;
  while(i<KF.length-1&&KF[i+1].t<=t)i++;
  if(i>=KF.length-1)return KF[KF.length-1];
  const a=KF[i],b=KF[i+1];
  const p=Math.min(1,(t-a.t)/(b.t-a.t));
  const s=p*p*(3-2*p);
  return{
    ax:a.ax+(b.ax-a.ax)*s, ay:a.ay+(b.ay-a.ay)*s, aa:a.aa+(b.aa-a.aa)*s,
    bx:a.bx+(b.bx-a.bx)*s, by:a.by+(b.by-a.by)*s, ba:a.ba+(b.ba-a.ba)*s,
    clash:b.clash&&p>.8,
  };
}

// ═══════════════════════════════════════
//  凝形目标
// ═══════════════════════════════════════
let gatherDone=false;
function assignGatherTargets(){
  const sl=baseSwordLen();
  const ptsA=swordPoints(W*.38,H*.45,-.78,sl,N/2);
  const ptsB=swordPoints(W*.62,H*.45,Math.PI+.78,sl,N/2);
  let ai=0,bi=0;
  for(let i=0;i<N;i++){
    if(psd[i]===0){
      const p=ptsA[ai%ptsA.length];ptx[i]=p.x;pty[i]=p.y;ai++;
    }else{
      const p=ptsB[bi%ptsB.length];ptx[i]=p.x;pty[i]=p.y;bi++;
    }
  }
}

// ═══════════════════════════════════════
//  主循环
// ═══════════════════════════════════════
let started=false,startTime=0,frame=0;
let lastClash=-999,finalBurst=false;

function tick(){
  requestAnimationFrame(tick);
  frame++;
  if(!started){ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);return;}
  const t=(performance.now()-startTime)/1000;

  // 凝形分配
  if(t>=4.8&&!gatherDone){gatherDone=true;assignGatherTargets();}

  ctx.fillStyle='#080810';ctx.fillRect(0,0,W,H);

  // 全程背景微雨
  drawBg();

  const zoom=getZoom(t);

  // ─── 蓄势（0-5s）：文字暴雨 ───
  if(t<5){
    for(let i=0;i<N;i++){
      px[i]+=pvx[i];py[i]+=pvy[i];
      if(pa[i]<.5)pa[i]+=.003;
      if(py[i]>H+20){py[i]=-20-Math.random()*50;px[i]=Math.random()*W;}
      if(pa[i]>.02){
        ctx.globalAlpha=pa[i];
        ctx.drawImage(pcc[i],px[i]-pcc[i].width/2,py[i]-pcc[i].height/2);
      }
    }
    ctx.globalAlpha=1;
  }

  // ─── 凝形（5-9s）：汇聚 + 镜头推近再拉远 ───
  if(t>=5&&t<9){
    // 中心点
    const ccx=W/2, ccy=H*.45;
    ctx.save();
    ctx.translate(ccx,ccy);
    ctx.scale(zoom,zoom);
    ctx.translate(-ccx,-ccy);

    for(let i=0;i<N;i++){
      if(pst[i]===0)pst[i]=1;
      const dx=ptx[i]-px[i],dy=pty[i]-py[i];
      const d=Math.sqrt(dx*dx+dy*dy)+.1;
      const gp=Math.min(t-5,4)/4; // 0→1 聚拢程度
      const f=Math.min(.04+gp*.06,500/(d*d+40));
      pvx[i]+=dx*f;pvy[i]+=dy*f;
      pvx[i]*=.89;pvy[i]*=.89;
      px[i]+=pvx[i];py[i]+=pvy[i];
      if(pa[i]<.85)pa[i]+=.005;
      ctx.globalAlpha=pa[i];
      ctx.drawImage(pcc[i],px[i]-pcc[i].width/2,py[i]-pcc[i].height/2);
    }
    ctx.globalAlpha=1;

    // 凝形后期画半透明剑轮廓
    if(t>7){
      const sa=(t-7)/2; // 0→1
      const sl=baseSwordLen();
      drawTextSword(W*.38,H*.45,-.78,sl,42,sa*.4,t,zoom);
      drawTextSword(W*.62,H*.45,Math.PI+.78,sl,210,sa*.4,t,zoom);
    }

    ctx.restore();
  }

  // ─── 厮杀+落字（9-22s）：双剑 ───
  if(t>=9&&t<22){
    const kf=lerpKF(t);
    const sl=baseSwordLen();
    const aX=kf.ax*W,aY=kf.ay*H;
    const bX=kf.bx*W,bY=kf.by*H;

    // zoom 淡出
    if(zoom>1.01){
      const ccx=W/2,ccy=H*.45;
      ctx.save();
      ctx.translate(ccx,ccy);ctx.scale(zoom,zoom);ctx.translate(-ccx,-ccy);
    }

    // 残影
    pushT(tA,aX,aY);pushT(tB,bX,bY);
    drawTrail(tA,42);drawTrail(tB,210);

    // 剑 alpha
    let sA=1;
    if(t<10)sA=(t-9);
    if(t>20.5)sA=Math.max(0,1-(t-20.5)/1.5);

    drawTextSword(aX,aY,kf.aa,sl,42,sA,t,1);
    drawTextSword(bX,bY,kf.ba,sl,210,sA,t,1);

    if(zoom>1.01) ctx.restore();

    // 碰撞
    if(kf.clash&&frame-lastClash>5){
      lastClash=frame;
      const cx=(aX+bX)/2,cy=(aY+bY)/2;
      const n=t>17?65:40;
      spawnFall(cx,cy,n,t>17?1.4:1);
      addSpark(cx,cy,t>17?22:12);
    }

    // 碰撞闪光
    if(kf.clash){
      const cx=(kf.ax+kf.bx)/2*W,cy=(kf.ay+kf.by)/2*H;
      const g=ctx.createRadialGradient(cx,cy,3,cx,cy,220);
      g.addColorStop(0,'rgba(255,255,220,.35)');
      g.addColorStop(.3,'rgba(255,200,120,.12)');
      g.addColorStop(1,'rgba(200,150,80,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }
  }

  // ─── 归无：最终爆发 ───
  if(t>20&&!finalBurst){
    finalBurst=true;
    spawnFall(W*.5,H*.42,250,1.6);
    addSpark(W*.5,H*.42,50);
  }
  if(t>17&&t<20.5&&frame%3===0){
    spawnFall(W*.5+(Math.random()-.5)*W*.3,H*.4+(Math.random()-.5)*H*.15,4,.5);
  }

  // 绘制落字+火花
  updateDrawFall();
  drawSparks();

  // 「儒」字（蓄势阶段）
  if(t>.5&&t<5.5){
    const ra2=t<1.8?(t-.5)/1.3:Math.max(0,1-(t-3)/2.5);
    ctx.save();ctx.globalAlpha=ra2*.4;
    ctx.font='110px "Songti SC","SimSun","KaiTi",serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,200,50,.35)';ctx.shadowBlur=40;
    ctx.fillStyle='rgba(255,215,80,1)';
    ctx.fillText('儒',W/2,H/2);
    ctx.shadowBlur=0;ctx.restore();
  }

  // 暗角
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.15,W/2,H/2,Math.max(W,H)*.7);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // 归无文字
  if(t>24){
    const ea=Math.min(.45,(t-24)/3);
    ctx.save();ctx.globalAlpha=ea;ctx.textAlign='center';
    ctx.font='26px "Songti SC","SimSun","KaiTi",serif';
    ctx.fillStyle='rgba(200,180,120,1)';
    ctx.fillText('以文铸剑  字落如雨  归于虚无',W/2,H/2-15);
    ctx.font='14px "Songti SC","SimSun",serif';
    ctx.globalAlpha=ea*.55;ctx.fillStyle='rgba(160,145,100,1)';
    ctx.fillText('— 剑来 · 本命字',W/2,H/2+18);
    ctx.restore();
  }
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
document.getElementById('playBtn').addEventListener('click',()=>{
  const b=document.getElementById('playBtn');
  b.style.opacity='0';setTimeout(()=>b.style.display='none',1200);
  started=true;startTime=performance.now();
  initAudio();
},{once:true});
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;C.width=W;C.height=H;});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
tick();

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudio(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.12;m.connect(ac.destination);
  // drone
  const dr=ac.createOscillator(),dg=ac.createGain();
  dr.type='sawtooth';dr.frequency.value=42;
  dg.gain.setValueAtTime(0,ac.currentTime);
  dg.gain.linearRampToValueAtTime(.07,ac.currentTime+3);
  dg.gain.setValueAtTime(.07,ac.currentTime+20);
  dg.gain.linearRampToValueAtTime(0,ac.currentTime+25);
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=110;
  dr.connect(lp);lp.connect(dg);dg.connect(m);dr.start();dr.stop(ac.currentTime+27);
  // 凝形上升音
  setTimeout(()=>{
    const r=ac.createOscillator(),rg=ac.createGain();
    r.type='sine';r.frequency.setValueAtTime(70,ac.currentTime);
    r.frequency.exponentialRampToValueAtTime(450,ac.currentTime+4);
    rg.gain.setValueAtTime(.04,ac.currentTime);
    rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+4);
    r.connect(rg);rg.connect(m);r.start();r.stop(ac.currentTime+4.5);
  },5000);
  // 碰撞音效
  const clashTs=[9.3,10.5,11.8,13,14.2,15.5,16.5,17.3,18,18.7,19.4,20];
  clashTs.forEach(ct=>{
    setTimeout(()=>{
      const sz=ac.sampleRate*(ct>17?.12:.07);
      const b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/sz*8);
      const s=ac.createBufferSource();s.buffer=b;
      const g=ac.createGain();g.gain.value=ct>17?.25:.18;
      s.connect(g);g.connect(m);s.start();
      const ring=ac.createOscillator(),rg=ac.createGain();
      ring.type='sine';ring.frequency.value=700+Math.random()*500;
      rg.gain.setValueAtTime(.06,ac.currentTime);
      rg.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);
      ring.connect(rg);rg.connect(m);ring.start();ring.stop(ac.currentTime+.6);
    },ct*1000);
  });
  // 最终碎裂
  setTimeout(()=>{
    const sz=ac.sampleRate*.6,b=ac.createBuffer(1,sz,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/sz*3.5);
    const s=ac.createBufferSource();s.buffer=b;
    const g=ac.createGain();g.gain.value=.4;s.connect(g);g.connect(m);s.start();
    const imp=ac.createOscillator(),ig=ac.createGain();
    imp.type='sine';imp.frequency.setValueAtTime(100,ac.currentTime);
    imp.frequency.exponentialRampToValueAtTime(18,ac.currentTime+.7);
    ig.gain.setValueAtTime(.35,ac.currentTime);
    ig.gain.exponentialRampToValueAtTime(.001,ac.currentTime+1);
    imp.connect(ig);ig.connect(m);imp.start();imp.stop(ac.currentTime+1.2);
  },20000);
  // 余韵
  setTimeout(()=>{
    [196,294,392,523].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*.5);
      g.gain.linearRampToValueAtTime(.02,ac.currentTime+i*.5+.3);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+5);
      o.connect(g);g.connect(m);o.start(ac.currentTime+i*.5);o.stop(ac.currentTime+6);
    });
  },21000);
}
