<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>雨書 · Rain Book</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e0d0;overflow:hidden;touch-action:none}
canvas{display:block}
#p{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  background:rgba(232,224,208,.96);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 1.5s}
#p .i{text-align:center;color:#5a4a3a}
#p .t{font:36px "Songti SC","SimSun","KaiTi",serif;letter-spacing:10px;margin-bottom:12px}
#p .s{font:13px "Songti SC","SimSun",serif;opacity:.4;margin-bottom:28px;letter-spacing:3px}
#p .c{width:68px;height:68px;border-radius:50%;
  border:1.5px solid rgba(90,74,58,.2);display:flex;align-items:center;justify-content:center;
  margin:0 auto;transition:all .3s}
#p .c:hover{background:rgba(90,74,58,.06)}
#p .r{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;
  border-left:18px solid rgba(90,74,58,.45);margin-left:4px}
</style>
</head>
<body>
<div id="p"><div class="i">
  <div class="t">雨 書</div>
  <div class="s">雨落古卷 · 墨散成水 · 纸上空留</div>
  <div class="c"><div class="r"></div></div>
</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=innerWidth,H=innerHeight;C.width=W;C.height=H;
const F='"Songti SC","SimSun","KaiTi",serif';

// ═══════════════════════════════════════
//  诗经·关雎
// ═══════════════════════════════════════
const poem=[
  '關關雎鳩','在河之洲','窈窕淑女','君子好逑',
  '參差荇菜','左右流之','窈窕淑女','寤寐求之',
  '求之不得','寤寐思服','悠哉悠哉','輾轉反側',
  '參差荇菜','左右采之','窈窕淑女','琴瑟友之',
  '參差荇菜','左右芼之','窈窕淑女','鐘鼓樂之',
];

// ═══════════════════════════════════════
//  古籍排版
// ═══════════════════════════════════════
let bookX,bookY,bookW,bookH,charSz,colGap,rowGap;
let chars=[]; // {ch,x,y,ink:1→0,wet:0→1}

function layout(){
  const s=Math.min(W,H);
  charSz=Math.max(14,Math.floor(s*.035));
  colGap=charSz*1.7;
  rowGap=charSz*1.45;
  const cols=poem.length;
  const rows=4;
  bookW=cols*colGap+colGap*.8;
  bookH=rows*rowGap+charSz*2.5;
  bookX=(W-bookW)/2;
  bookY=(H-bookH)/2-H*.02;
  chars=[];
  for(let c=0;c<cols;c++){
    const line=poem[c];
    for(let r=0;r<line.length;r++){
      // 竖排从右到左
      const x=bookX+bookW-colGap*(c+.8);
      const y=bookY+charSz*1.5+r*rowGap;
      chars.push({ch:line[r],x,y,ink:1,wet:0,dissolveRate:0});
    }
  }
}
layout();

// ═══════════════════════════════════════
//  雨滴
// ═══════════════════════════════════════
const RN=120;
const rx=new Float32Array(RN),ry=new Float32Array(RN);
const rvy=new Float32Array(RN),rlen=new Float32Array(RN);
const ral=new Float32Array(RN);
function initRain(){
  for(let i=0;i<RN;i++){
    rx[i]=Math.random()*W;
    ry[i]=-Math.random()*H;
    rvy[i]=4+Math.random()*6;
    rlen[i]=10+Math.random()*20;
    ral[i]=.06+Math.random()*.1;
  }
}
initRain();

// 雨滴落在书上 → 溅开的涟漪
const RM=80;
const rpx=new Float32Array(RM),rpy=new Float32Array(RM);
const rpr=new Float32Array(RM),rpa=new Float32Array(RM);
let rpc=0;

function addRipple(x,y){
  if(rpc>=RM)rpc=0; // 循环覆盖
  rpx[rpc]=x;rpy[rpc]=y;
  rpr[rpc]=0;rpa[rpc]=.3;
  rpc++;
}

function updateRain(t){
  for(let i=0;i<RN;i++){
    ry[i]+=rvy[i];
    if(ry[i]>H+20){
      ry[i]=-rlen[i];
      rx[i]=Math.random()*W;
      rvy[i]=4+Math.random()*6;
    }
    // 雨滴落在书页范围内
    if(ry[i]>=bookY&&ry[i]<=bookY+bookH&&rx[i]>=bookX&&rx[i]<=bookX+bookW){
      // 检查是否打到文字附近
      for(let j=0;j<chars.length;j++){
        const c=chars[j];
        if(c.ink<=0)continue;
        const dx=rx[i]-c.x,dy=ry[i]-c.y;
        if(Math.abs(dx)<charSz*.6&&Math.abs(dy)<charSz*.6){
          // 打湿这个字 → 加速溶解
          c.wet=Math.min(1,c.wet+.015);
          c.dissolveRate=Math.max(c.dissolveRate,.002+c.wet*.003);
        }
      }
      // 溅起涟漪
      if(Math.random()<.03) addRipple(rx[i],ry[i]);
    }
  }
}

function drawRain(){
  ctx.strokeStyle='rgba(140,160,180,.12)';
  ctx.lineWidth=1;
  for(let i=0;i<RN;i++){
    ctx.globalAlpha=ral[i];
    ctx.beginPath();
    ctx.moveTo(rx[i],ry[i]);
    ctx.lineTo(rx[i],ry[i]-rlen[i]);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawRipples(){
  for(let i=0;i<rpc;i++){
    if(rpa[i]<.01)continue;
    rpr[i]+=.4;
    rpa[i]-=.005;
    ctx.globalAlpha=rpa[i];
    ctx.strokeStyle='rgba(160,175,190,.3)';
    ctx.lineWidth=.8;
    ctx.beginPath();
    ctx.ellipse(rpx[i],rpy[i],rpr[i],rpr[i]*.3,0,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  墨水溶解流淌的痕迹
// ═══════════════════════════════════════
const IM=500;
const ix=new Float32Array(IM),iy=new Float32Array(IM);
const ivx=new Float32Array(IM),ivy=new Float32Array(IM);
const ia=new Float32Array(IM),isz=new Float32Array(IM);
let ic=0;

function spawnInk(x,y){
  if(ic>=IM)return;
  ix[ic]=x+(Math.random()-.5)*charSz*.3;
  iy[ic]=y+(Math.random()-.5)*charSz*.2;
  ivx[ic]=(Math.random()-.5)*.15;
  ivy[ic]=.2+Math.random()*.4; // 向下流
  ia[ic]=.15+Math.random()*.15;
  isz[ic]=1+Math.random()*2;
  ic++;
}

function updateDrawInk(){
  let alive=0;
  for(let i=0;i<ic;i++){
    ix[i]+=ivx[i];iy[i]+=ivy[i];
    ivy[i]+=.01; // 微重力
    ivx[i]*=.99;
    ia[i]-=.0008;
    if(ia[i]<.005||iy[i]>bookY+bookH+50)continue;
    ctx.globalAlpha=ia[i];
    ctx.fillStyle='rgba(50,40,30,.6)';
    ctx.beginPath();ctx.arc(ix[i],iy[i],isz[i],0,Math.PI*2);ctx.fill();
    if(alive!==i){ix[alive]=ix[i];iy[alive]=iy[i];ivx[alive]=ivx[i];ivy[alive]=ivy[i];
      ia[alive]=ia[i];isz[alive]=isz[i];}
    alive++;
  }
  ic=alive;ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  绘制古籍书页
// ═══════════════════════════════════════
function drawBook(){
  const bx=bookX-charSz*1.2,by=bookY-charSz*1.2;
  const bw=bookW+charSz*2.4,bh=bookH+charSz*2.4;

  // 阴影
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.1)';ctx.shadowBlur=25;ctx.shadowOffsetY=6;
  ctx.fillStyle='#efe5cb';
  ctx.fillRect(bx,by,bw,bh);
  ctx.shadowBlur=0;ctx.restore();

  // 纸纹
  ctx.globalAlpha=.025;
  ctx.strokeStyle='#9a8a6a';ctx.lineWidth=.5;
  for(let i=0;i<bh;i+=2.5){
    ctx.beginPath();ctx.moveTo(bx,by+i);ctx.lineTo(bx+bw,by+i);ctx.stroke();
  }

  // 湿痕（整体）
  ctx.globalAlpha=.04;
  ctx.fillStyle='rgba(150,165,175,.5)';
  for(let i=0;i<chars.length;i++){
    const c=chars[i];
    if(c.wet>.05){
      ctx.globalAlpha=c.wet*.06;
      ctx.beginPath();
      ctx.ellipse(c.x,c.y,charSz*.6+c.wet*charSz*.3,charSz*.7+c.wet*charSz*.4,0,0,Math.PI*2);
      ctx.fill();
    }
  }

  // 外框
  ctx.globalAlpha=.12;
  ctx.strokeStyle='#6a5a4a';ctx.lineWidth=1.5;
  ctx.strokeRect(bx+5,by+5,bw-10,bh-10);
  ctx.globalAlpha=.06;
  ctx.strokeRect(bx+12,by+12,bw-24,bh-24);

  // 装订线（右侧，竖排古籍右翻）
  ctx.globalAlpha=.1;
  ctx.strokeStyle='#7a6a50';ctx.lineWidth=1.5;
  const bindX=bx+bw-10;
  for(let i=0;i<5;i++){
    const yy=by+bh*.15+i*bh*.175;
    ctx.beginPath();ctx.moveTo(bindX,yy-6);ctx.lineTo(bindX,yy+6);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawChars(t){
  ctx.font=charSz+'px '+F;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<chars.length;i++){
    const c=chars[i];
    if(c.ink<.01)continue;

    // 溶解中 → 产生墨水粒子
    if(c.dissolveRate>0&&c.ink>.05&&Math.random()<c.dissolveRate*8){
      spawnInk(c.x,c.y);
    }
    // 墨水浓度下降
    if(c.dissolveRate>0) c.ink=Math.max(0,c.ink-c.dissolveRate);

    // 绘制文字
    ctx.globalAlpha=c.ink;
    // 墨色随湿润度变化：干=深墨，湿=浅灰偏蓝
    const wetP=c.wet;
    const r2=Math.floor(35+wetP*60+(1-c.ink)*40);
    const g2=Math.floor(28+wetP*55+(1-c.ink)*40);
    const b2=Math.floor(22+wetP*65+(1-c.ink)*50);
    ctx.fillStyle='rgb('+r2+','+g2+','+b2+')';

    // 溶解时文字微微散开
    const spread=(1-c.ink)*.5;
    if(spread>.05){
      // 用 shadow 模拟墨水晕染
      ctx.shadowColor='rgba('+r2+','+g2+','+b2+','+c.ink*.3+')';
      ctx.shadowBlur=spread*charSz*.8;
    }
    ctx.fillText(c.ch,c.x,c.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  主循环
// ═══════════════════════════════════════
let started=false,startTime=0;

function tick(){
  requestAnimationFrame(tick);
  if(!started){ctx.fillStyle='#e8e0d0';ctx.fillRect(0,0,W,H);return;}
  const t=(performance.now()-startTime)/1000;

  // 天色（灰蓝雨天）
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#ddd8cc');bg.addColorStop(.4,'#e2dcd0');bg.addColorStop(1,'#e8e2d6');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 雨
  updateRain(t);
  drawRain();

  // 书页
  drawBook();

  // 墨水流淌
  updateDrawInk();

  // 涟漪
  drawRipples();

  // 文字
  drawChars(t);

  // 结语：所有文字消失后
  const aliveCount=chars.filter(c=>c.ink>.01).length;
  if(aliveCount===0){
    // 从全部消失那一刻开始计时
    if(!this._endT) this._endT=t;
    const et=t-this._endT;
    const ea=Math.min(.55,et*.06);
    if(ea>.01){
      ctx.save();ctx.globalAlpha=ea;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=Math.floor(charSz*1.1)+'px '+F;
      ctx.fillStyle='rgba(90,74,58,.85)';
      ctx.fillText('字已隨水去',W/2,H/2-charSz*.7);
      ctx.fillText('紙上空留痕',W/2,H/2+charSz*.7);
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════
//  音效
// ═══════════════════════════════════════
function initAudio(){
  const ac=new(AudioContext||webkitAudioContext)();
  const m=ac.createGain();m.gain.value=.08;m.connect(ac.destination);
  // 雨声
  const sz=ac.sampleRate*2,buf=ac.createBuffer(1,sz,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*.25;
  const s=ac.createBufferSource();s.buffer=buf;s.loop=true;
  const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;
  const rg=ac.createGain();rg.gain.value=.2;
  s.connect(lp);lp.connect(rg);rg.connect(m);s.start();
  // 随机水滴声
  function drip(){
    if(!started)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';
    const freq=600+Math.random()*600;
    o.frequency.setValueAtTime(freq,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*.3,ac.currentTime+.12);
    g.gain.setValueAtTime(.015+Math.random()*.01,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);
    o.connect(g);g.connect(m);o.start();o.stop(ac.currentTime+.2);
    setTimeout(drip,800+Math.random()*2500);
  }
  setTimeout(drip,500);
}

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
document.getElementById('p').addEventListener('click',()=>{
  const b=document.getElementById('p');
  b.style.opacity='0';setTimeout(()=>b.style.display='none',1500);
  started=true;startTime=performance.now();
  initAudio();
},{once:true});
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;C.width=W;C.height=H;layout();});
C.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
C.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
tick();
</script>
</body>
</html>
